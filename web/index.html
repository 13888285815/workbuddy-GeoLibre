<style>
/* ============ 全局基础样式 ============ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(145deg,#0f1639 0%,#121e54 40%,#161a3c 100%);color:#e6e8f5;-webkit-font-smoothing:antialiased}
button,input{font:inherit;border:none;outline:none;background:none;color:inherit}
/* ============ CSS变量 - 统一布局尺寸 ============ */
:root{
  --top-bar-height:56px;
  --toolbar-height:56px;
  --status-bar-height:46px;
  --sidebar-width:280px;
  --sidebar-width-min:240px;
  --right-panel-width:320px;
  --z-sidebar:200;
  --z-toolbar:150;
  --z-topbar:100;
  --z-modal:1000;
  --z-toast:3000;
}
/* ============ 容器基础布局 ============ */
.container{display:flex;flex-direction:column;width:100vw;height:100vh;max-width:100vw;max-height:100vh;overflow:hidden}
/* ============ 顶部栏 (搜索区 + 功能区入口) ============ */
.top-bar{
  flex-shrink:0;
  height:var(--top-bar-height);
  background:rgba(12,21,55,.94);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  z-index:var(--z-topbar);
}
.top-bar .logo{display:flex;align-items:center;gap:10px;color:#f8f9fc;font-size:16px;font-weight:700;white-space:nowrap;flex-shrink:0}
.top-bar .logo i{font-size:22px;color:#7c5dfc}
.top-bar .logo span{color:#8f98c8;font-size:12px;font-weight:400}
.search-global{position:relative;flex:1;min-width:0;max-width:480px}
.search-global input{width:100%;padding:10px 14px 10px 40px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(18,29,70,.9);color:#f4f6ff;font-size:14px;transition:all .2s}
.search-global input:focus{border-color:#7c5dfc;box-shadow:0 0 0 3px rgba(124,93,252,.12)}
.search-global i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8f98c8;font-size:14px}
.user-area{display:flex;align-items:center;gap:12px;flex-shrink:0}
.user-area .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7c5dfc,#5b3de8);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;box-shadow:0 6px 18px rgba(124,93,252,.25)}
.menu-toggle{display:none;width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#c7d1f4;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.menu-toggle:hover{background:rgba(124,93,252,.1);color:#fff}
/* ============ 主内容区域 (Flex布局自动分配空间) ============ */
.main{
  display:flex;
  flex:1;
  min-height:0;
  overflow:hidden;
}
/* ============ 侧边栏 (树形结构目录) ============ */
.sidebar{
  flex-shrink:0;
  width:var(--sidebar-width);
  min-width:var(--sidebar-width-min);
  background:rgba(10,18,46,.96);
  border-right:1px solid rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:4px 0 20px rgba(0,0,0,.1);
  transition:width .3s ease,margin .3s ease;
}
.sidebar.hidden{width:0;min-width:0;border-right:none;overflow:hidden}
.sidebar-header{padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.sidebar-header h3{font-size:13px;color:#f2f5ff;letter-spacing:.02em;font-weight:600}
.sidebar-header .count{font-size:11px;color:#9aabc7;background:rgba(255,255,255,.06);padding:4px 10px;border-radius:999px;font-weight:500}
.search-box{padding:0 14px 12px;flex-shrink:0}
.search-box input{width:100%;padding:9px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(22,33,70,.9);color:#eef2ff;font-size:13px;transition:border .2s}
.search-box input:focus{border-color:#7c5dfc}
.tree-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:6px 6px 14px}
.tree-wrap::-webkit-scrollbar{width:6px}
.tree-wrap::-webkit-scrollbar-thumb{background:rgba(124,93,252,.3);border-radius:3px}
.tree-wrap::-webkit-scrollbar-track{background:transparent}
/* ============ 树形结构样式 ============ */
.tree-node{position:relative;margin:1px 0}
.tree-label{
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 12px;
  color:#c7d1f4;
  cursor:pointer;
  transition:background .15s,color .15s;
  border-radius:8px;
  margin:2px 4px;
  font-size:13px;
  user-select:none;
  position:relative;
  min-height:38px;
}
.tree-label:hover{background:rgba(124,93,252,.12);color:#fff}
.tree-label.active,.tree-label.selected{color:#fff;background:rgba(124,93,252,.32)}
.tree-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#8f9ecb;transition:transform .2s;font-size:9px;flex-shrink:0}
.tree-arrow.rotated{transform:rotate(90deg)}
.tree-arrow.empty{visibility:hidden}
.tree-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.tree-icon.folder,.tree-icon.level-1{color:#ffd166}
.tree-icon.file{color:#7c5dfc}
.tree-icon.level-2{color:#6bb3ff}
.tree-icon.level-3{color:#8f9cf5}
.tree-name{flex:1;text-overflow:ellipsis;white-space:nowrap;overflow:hidden;line-height:1.4;font-size:13px}
.tree-count{font-size:10px;color:#8f98c8;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:10px;flex-shrink:0}
.tree-children{display:none;flex-direction:column;position:relative}
.tree-children.open{display:flex}
.tree-children::before{content:'';position:absolute;left:20px;top:0;bottom:6px;width:1px;background:rgba(255,255,255,.08)}
.tree-node.level-2>.tree-label{padding-left:28px}
.tree-node.level-3>.tree-label{padding-left:44px}
.highlight-match{background:rgba(124,93,252,.45);color:#fff;border-radius:3px;padding:0 2px}
/* ============ 拖拽分隔条 ============ */
.splitter-v{width:4px;background:transparent;cursor:col-resize;transition:background .2s;flex-shrink:0}
.splitter-v:hover{background:rgba(124,93,252,.2)}
/* ============ 预览区域 (自适应核心) ============ */
.preview-area{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
  background:linear-gradient(180deg,rgba(15,21,55,.98),rgba(9,15,38,.98));
}
/* ============ 预览工具栏 (功能区) ============ */
.preview-toolbar{
  flex-shrink:0;
  height:var(--toolbar-height);
  padding:0 16px;
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(12,20,49,.96);
  border-bottom:1px solid rgba(255,255,255,.06);
  overflow-x:auto;
  overflow-y:hidden;
}
.preview-toolbar::-webkit-scrollbar{height:3px}
.preview-toolbar::-webkit-scrollbar-thumb{background:rgba(124,93,252,.25);border-radius:2px}
.tool-group{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tbtn{width:36px;height:36px;border-radius:10px;border:1px solid transparent;background:rgba(255,255,255,.04);color:#c7d1f4;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:13px}
.tbtn:hover{border-color:rgba(124,93,252,.35);background:rgba(124,93,252,.12);color:#fff}
.tbtn.active{background:#7c5dfc;color:#fff;border-color:#7c5dfc}
.tool-sep{width:1px;height:24px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 4px}
.zoom-info{font-size:12px;color:#9fb4d8;min-width:50px;text-align:center;flex-shrink:0}
.coord-info{display:flex;align-items:center;gap:8px;margin-left:auto;color:#9fb4d8;font-size:12px;flex-shrink:0}
.coord-info input{width:80px;padding:7px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(18,28,61,.95);color:#f4f6ff;text-align:center;font-size:12px}
/* ============ 预览内容区 (浏览区 - 地图) ============ */
.preview-body{
  flex:1;
  min-height:0;
  display:flex;
  align-items:stretch;
  justify-content:stretch;
  position:relative;
  overflow:hidden;
}
.preview-body::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(124,93,252,.14),transparent 30%),radial-gradient(circle at bottom left,rgba(49,90,255,.1),transparent 28%);pointer-events:none}
/* 地图容器 */
#map{width:100%;height:100%;position:relative}
.maplibregl-ctrl-group{background:rgba(12,20,49,.96)!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:10px!important}
.maplibregl-ctrl-group button{background:rgba(255,255,255,.04)!important;color:#c7d1f4!important}
.maplibregl-ctrl-group button:hover{background:rgba(124,93,252,.12)!important;color:#fff!important}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;color:#8f9ecb;gap:12px;text-align:center;padding:20px}
.empty-state i{font-size:56px;opacity:.35}
.empty-state h3{font-size:16px;color:#a2b0d9;font-weight:500}
.empty-state p{font-size:13px;color:#7a89b8;max-width:280px;line-height:1.6}
/* ============ 右侧面板 ============ */
.right-panel{
  flex-shrink:0;
  width:var(--right-panel-width);
  min-width:280px;
  background:rgba(8,16,42,.96);
  border-left:1px solid rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:width .3s,min-width .3s;
}
.right-panel.hidden{width:0;min-width:0;border-left:none;overflow:hidden}
.panel-header{padding:14px 16px;font-size:11px;color:#9aabd9;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px;font-weight:500;letter-spacing:.02em}
.panel-tabs{display:flex;gap:4px;padding:8px 12px;flex-shrink:0}
.panel-tab{padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.04);color:#9fb4d8;font-size:12px;cursor:pointer;transition:all .15s}
.panel-tab:hover{background:rgba(124,93,252,.12);color:#fff}
.panel-tab.active{background:rgba(124,93,252,.25);color:#fff}
.panel-content{flex:1;min-height:0;overflow-y:auto;padding:12px}
.panel-content::-webkit-scrollbar{width:6px}
.panel-content::-webkit-scrollbar-thumb{background:rgba(124,93,252,.3);border-radius:3px}
/* 图层列表 */
.layer-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(255,255,255,.02);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.layer-item:hover{background:rgba(124,93,252,.12)}
.layer-item.active{background:rgba(124,93,252,.25)}
.layer-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#7c5dfc}
.layer-name{flex:1;font-size:13px;color:#eef2ff}
.layer-toggle{width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s}
.layer-toggle.on{background:#7c5dfc}
.layer-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.layer-toggle.on::after{left:18px}
/* ============ 状态栏 ============ */
.status-bar{
  flex-shrink:0;
  height:var(--status-bar-height);
  padding:0 20px;
  display:flex;
  align-items:center;
  gap:18px;
  font-size:12px;
  color:#9fb4d8;
  background:rgba(12,20,47,.94);
  border-top:1px solid rgba(255,255,255,.06);
}
.status-bar span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;margin-right:6px}
.status-dot.offline{background:#f87171}
/* ============ 加载遮罩 ============ */
.loading-overlay{position:absolute;inset:0;background:rgba(10,16,40,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:50}
.loading-overlay.show{display:flex}
.loading-spinner{width:42px;height:42px;border:4px solid rgba(124,93,252,.2);border-top-color:#7c5dfc;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#9fb4d8;font-size:13px}
/* ============ 模态框 ============ */
.modal-bg{position:fixed;inset:0;background:rgba(6,11,28,.85);display:none;align-items:center;justify-content:center;z-index:var(--z-modal);padding:20px}
.modal-bg.show{display:flex}
.modal-box{width:min(420px,100%);background:rgba(17,25,55,.98);border:1px solid rgba(124,93,252,.25);border-radius:18px;padding:24px;box-shadow:0 30px 90px rgba(0,0,0,.4)}
.modal-box h3{font-size:17px;color:#fff;margin-bottom:10px;font-weight:600}
/* 底图选择模态框 */
.modal-overlay{position:fixed;inset:0;background:rgba(6,11,28,.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{width:min(600px,100%);background:rgba(17,25,55,.98);border:1px solid rgba(124,93,252,.25);border-radius:18px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.4)}
.modal-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;color:#fff;font-weight:600}
.close-btn{background:none;border:none;color:#9fb4d8;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .15s}
.close-btn:hover{background:rgba(124,93,252,.12);color:#fff}
.modal-body{padding:20px}
.basemap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.basemap-item{cursor:pointer;border-radius:12px;overflow:hidden;border:2px solid transparent;transition:all .2s;background:rgba(255,255,255,.04)}
.basemap-item:hover{border-color:#7c5dfc;transform:translateY(-2px)}
.basemap-preview{height:80px;background:#1a2342;display:flex;align-items:center;justify-content:center;color:#7a89b8;font-size:32px}
.basemap-preview img{width:100%;height:100%;object-fit:cover}
.basemap-item span{display:block;padding:10px;text-align:center;font-size:13px;color:#eef2ff}
/* 搜索结果 */
.search-results{display:flex;flex-direction:column;gap:8px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.search-result-item:hover{background:rgba(124,93,252,.08);border-color:rgba(124,93,252,.3)}
.result-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(124,93,252,.15);border-radius:8px;color:#7c5dfc;font-size:16px}
.result-info{flex:1;min-width:0}
.result-name{font-size:14px;color:#eef2ff;font-weight:500;margin-bottom:4px}
.result-address{font-size:12px;color:#9fb4d8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* 图层管理 */
.layer-actions{display:flex;gap:8px;margin-bottom:16px}
.layer-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto}
.layer-list .layer-item{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.layer-list .layer-item.hidden{opacity:.5}
.layer-list .layer-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(124,93,252,.15);border-radius:8px;color:#7c5dfc;font-size:14px}
.layer-list .layer-info{flex:1;min-width:0}
.layer-list .layer-name{font-size:13px;color:#eef2ff;font-weight:500}
.layer-list .layer-type{font-size:11px;color:#9fb4d8;margin-top:2px}
.layer-list .layer-controls{display:flex;gap:4px}
.layer-list .layer-controls .tbtn{width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:6px}
.layer-list .layer-controls .tbtn:hover{background:rgba(124,93,252,.12)}
.modal-box p{font-size:13px;color:#a2b0d9;margin-bottom:18px;line-height:1.6}
.modal-box input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(12,21,50,.96);color:#eef2ff;font-size:14px}
.modal-btns{display:flex;justify-content:flex-end;gap:12px;margin-top:18px}
.mbtn{padding:10px 18px;border-radius:12px;border:none;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500}
.mbtn-ok{background:#7c5dfc;color:#fff}
.mbtn-ok:hover{background:#6b4ae8}
.mbtn-cancel{background:rgba(255,255,255,.08);color:#d2d8ff}
.mbtn-cancel:hover{background:rgba(255,255,255,.12)}
/* ============ Toast提示 ============ */
.toast{position:fixed;bottom:28px;right:28px;padding:12px 18px;border-radius:12px;background:rgba(124,93,252,.95);color:#fff;font-size:13px;box-shadow:0 20px 60px rgba(18,25,68,.35);opacity:0;transform:translateY(10px);transition:.25s ease;pointer-events:none;z-index:var(--z-toast);max-width:calc(100vw - 56px)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:rgba(239,68,68,.95)}
.toast.success{background:rgba(34,197,94,.95)}
/* ============ 全屏模式 ============ */
body.fullscreen .top-bar,
body.fullscreen .sidebar,
body.fullscreen .right-panel,
body.fullscreen .status-bar,
body.fullscreen .splitter-v{display:none!important}
body.fullscreen .preview-area{border-radius:0}
body.fullscreen .preview-toolbar{position:sticky;top:0;z-index:10}
/* ============ 快捷键提示 ============ */
.shortcut-hint{position:fixed;bottom:80px;right:28px;background:rgba(17,25,55,.95);border:1px solid rgba(124,93,252,.2);border-radius:14px;padding:14px 18px;font-size:12px;color:#9fb4d8;z-index:2500;display:none;min-width:200px}
.shortcut-hint.show{display:block}
.shortcut-row{display:flex;justify-content:space-between;margin-bottom:6px}
.shortcut-row:last-child{margin-bottom:0}
.shortcut-key{color:#7c5dfc;font-weight:600}
/* ============ 移动端适配 ============ */
@media(max-width:768px){
  :root{--sidebar-width:260px;--right-panel-width:280px}
  .top-bar{padding:0 12px;gap:10px}
  .top-bar .logo span{display:none}
  .search-global{max-width:200px}
  .menu-toggle{display:flex}
  .sidebar{position:fixed;left:0;top:var(--top-bar-height);bottom:var(--status-bar-height);z-index:var(--z-sidebar);transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .right-panel{position:fixed;right:0;top:var(--top-bar-height);bottom:var(--status-bar-height);z-index:var(--z-sidebar);transform:translateX(100%);transition:transform .3s}
  .right-panel.open{transform:translateX(0)}
  .preview-toolbar{padding:0 8px;gap:4px}
  .tbtn{width:32px;height:32px}
  .coord-info{display:none}
}
</style>
</head>
<body>
<div class="container">
  <!-- 顶部栏 -->
  <header class="top-bar">
    <div class="logo">
      <i class="fas fa-globe-americas"></i>
      <span>意念地球</span>
      <small>意念地球</small>
    </div>
    <div class="search-global">

      <button class="tbtn" id="themeToggle" title="切换主题"><i class="fas fa-moon"></i></button>

  <!-- 主内容区 -->
  <div class="main">

          <button class="tbtn" id="zoomReset" title="重置"><i class="fas fa-home"></i></button>

        <div class="tool-group">

          <button class="tbtn" id="importData" title="导入数据"><i class="fas fa-file-import"></i></button>
          <button class="tbtn" id="exportData" title="导出数据"><i class="fas fa-file-export"></i></button>
        </div>
        <div class="coord-info">
          <span>经度:</span>
          <input type="text" id="lngInput" value="105.00" readonly />
          <span>纬度:</span>
          <input type="text" id="latInput" value="35.00" readonly />
        </div>
      </div>

      <!-- 地图浏览区 -->

        <div id="map"></div>
      </div>
    </div>
  </div>

  <!-- 状态栏 -->
  <footer class="status-bar">
    <span><span class="status-dot" id="statusDot"></span>API状态: <strong id="apiStatus">检测中</strong></span>
    <span>图层: <strong id="layerCount">1</strong></span>
    <span>中心: <strong id="mapCenter">105.00, 35.00</strong></span>
    <span style="margin-left:auto">意念地球 v1.0 | Powered by GeoLibre</span>
  </footer>
</div>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">加载中...</div>
</div>

<!-- 快捷键提示 -->
<div class="shortcut-hint" id="shortcutHint">
  <div class="shortcut-row"><span class="shortcut-key">F</span><span>全屏</span></div>
  <div class="shortcut-row"><span class="shortcut-key">+/-</span><span>放大/缩小</span></div>
  <div class="shortcut-row"><span class="shortcut-key">R</span><span>重置视图</span></div>
  <div class="shortcut-row"><span class="shortcut-key">L</span><span>图层面板</span></div>
  <div class="shortcut-row"><span class="shortcut-key">S</span><span>侧边栏</span></div>
  <div class="shortcut-row"><span class="shortcut-key">?</span><span>显示帮助</span></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
// ============ 配置 ============
const CONFIG = {
  apiBase: '/api',
  mapCenter: [105, 35],
  mapZoom: 4,
  minZoom: 1,
  maxZoom: 18,
  catalogUrl: './data/catalog.json'
};

// ============ 状态管理 ============
const state = {
  map: null,
  layers: [],
  activeTool: null,
  theme: localStorage.getItem('geolibre_theme') || 'dark',
  sidebarOpen: true,
  rightPanelOpen: true,
  basemaps: [],
  currentBasemap: null
};

// ============ 全局目录数据 ============
let catalog = [];
let catalogConfig = null;

// ============ 初始化应用 ============
async function initApp() {
  console.log('🌍 意念地球 初始化...');
  
  // 加载目录配置
  await loadCatalogConfig();
  
  initTheme();
  await initTree();
  initMap();
  initUI();
  checkAPI();
  console.log('✅ 意念地球 初始化完成');
  showToast('意念地球 已加载', 'success');
}

// ============ 加载目录配置 ============
async function loadCatalogConfig() {
  try {
    const response = await fetch(CONFIG.catalogUrl);
    if (!response.ok) throw new Error('Failed to load catalog');
    
    catalogConfig = await response.json();
    catalog = catalogConfig.catalog;
    
    // 更新应用名称
    if (catalogConfig.appName) {
      document.querySelector('.top-bar .logo span')?.remove();
      const logo = document.querySelector('.top-bar .logo');
      if (logo) {
        logo.innerHTML = logo.innerHTML.replace('意念地球', catalogConfig.appName);
      }
    }
    
    // 更新默认地图配置
    if (catalogConfig.defaultConfig) {
      CONFIG.mapCenter = catalogConfig.defaultConfig.mapCenter || CONFIG.mapCenter;
      CONFIG.mapZoom = catalogConfig.defaultConfig.mapZoom || CONFIG.mapZoom;
      CONFIG.minZoom = catalogConfig.defaultConfig.minZoom || CONFIG.minZoom;
      CONFIG.maxZoom = catalogConfig.defaultConfig.maxZoom || CONFIG.maxZoom;
    }
    
    // 更新地图源
    if (catalogConfig.basemaps) {
      state.basemaps = catalogConfig.basemaps;
    }
    
    console.log('📁 目录配置加载成功:', catalog.length, '个分类');
  } catch (error) {
    console.error('❌ 目录配置加载失败:', error);
    showToast('目录加载失败，使用默认配置', 'error');
    // 使用内置默认数据
    catalog = getDefaultCatalog();
  }
}

// ============ 默认目录数据（备用） ============
function getDefaultCatalog() {
  return [
    { id: 'basic', label: "基础功能", icon: "fa-cube", children: [] }
  ];
}

// ============ 主题初始化 ============
function initTheme() {
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    themeToggle.innerHTML = state.theme === 'dark'
      ? '<i class="fas fa-sun"></i>'
      : '<i class="fas fa-moon"></i>';
    themeToggle.addEventListener('click', toggleTheme);
  }
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('geolibre_theme', state.theme);
  document.body.style.background = state.theme === 'dark'
    ? 'linear-gradient(145deg,#0f1639 0%,#121e54 40%,#161a3c 100%)'
    : 'linear-gradient(145deg,#f0f4ff 0%,#e8f0ff 40%,#f5f8ff 100%)';
  document.getElementById('themeToggle').innerHTML = state.theme === 'dark'
    ? '<i class="fas fa-sun"></i>'
    : '<i class="fas fa-moon"></i>';
}

// ============ 高性能树形目录初始化 ============
// 数据缓存
const treeCache = {
  data: null,
  expanded: new Set(),
  visibleItems: [],
  itemHeight: 36,
  bufferSize: 10
};

// 异步加载目录数据
async function loadCatalogData() {
  // catalog 已经在 loadCatalogConfig 中加载
  if (catalog.length === 0) {
    // 如果配置加载失败，使用默认数据
    catalog = [
      {
        id: 'basic-map',
        label: '基础地图',
        icon: 'fa-map',
        children: [
          { id: 'basemap', label: '底图切换', icon: 'fa-layer-group', action: 'basemap', description: '切换不同地图底图' },
          { id: 'navigation', label: '地图导航', icon: 'fa-location-arrow', action: 'navigation', description: '地图导航定位' }
        ]
      }
    ];
  }
  return catalog;
}

// 扁平化树数据用于虚拟滚动
function flattenTree(data, expanded, parentLevel = 0) {
  const result = [];
  data.forEach((node, index) => {
    result.push({
      ...node,
      level: parentLevel,
      isExpanded: expanded.has(index),
      hasChildren: node.children && node.children.length > 0
    });
    if (expanded.has(index) && node.children) {
      result.push(...flattenTree(node.children, expanded, parentLevel + 1));
    }
  });
  return result;
}

// 渲染虚拟滚动列表
function renderVirtualTree() {
  const container = document.getElementById('treeContainer');
  const scrollTop = container.scrollTop || 0;
  const containerHeight = container.clientHeight;
  
  const startIndex = Math.max(0, Math.floor(scrollTop / treeCache.itemHeight) - treeCache.bufferSize);
  const endIndex = Math.min(
    treeCache.visibleItems.length,
    Math.ceil((scrollTop + containerHeight) / treeCache.itemHeight) + treeCache.bufferSize
  );
  
  const visibleItems = treeCache.visibleItems.slice(startIndex, endIndex);
  
  let html = `<div style="height: ${treeCache.visibleItems.length * treeCache.itemHeight}px; position: relative;">`;
  
  visibleItems.forEach((item, i) => {
    const actualIndex = startIndex + i;
    const indent = item.level * 20;
    const paddingLeft = indent + 10;
    
    html += `<div class="tree-node level-${item.level + 1}" style="
      position: absolute;
      top: ${actualIndex * treeCache.itemHeight}px;
      left: 0;
      right: 0;
      height: ${treeCache.itemHeight}px;
      display: flex;
      align-items: center;
      padding-left: ${paddingLeft}px;
      cursor: ${item.hasChildren ? 'pointer' : 'pointer'};
      transition: background 0.15s;
    "
    onmouseover="this.style.background='rgba(124,93,252,0.15)'"
    onmouseout="this.style.background='transparent'"
    onclick="handleTreeItemClick(${actualIndex}, event)"
    data-item-index="${actualIndex}"
    data-action="${item.action || ''}"
    data-url="${item.url || ''}"
    data-item-id="${item.id || ''}"
    ${!item.hasChildren ? `title="${item.description || item.label}"` : ''}
    >`;

    if (item.hasChildren) {
      html += `<span class="tree-arrow" onclick="event.stopPropagation();toggleTreeNode(${actualIndex}, event)" style="margin-right: 6px;">
        <i class="fas fa-chevron-${item.isExpanded ? 'down' : 'right'}" style="font-size: 10px; color: #8f98c8;"></i>
      </span>`;
    } else {
      html += `<span style="width: 16px; margin-right: 6px;"></span>`;
    }
    
    const iconColor = item.url ? '#4ade80' : (item.hasChildren ? '#7c5dfc' : '#5b8def');
    html += `<span class="tree-icon" style="margin-right: 8px;">
      <i class="fas ${item.icon}" style="font-size: 13px; color: ${iconColor};"></i>
    </span>
    <span class="tree-name" style="flex: 1; font-size: 13px; color: #e6e8f5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.label}</span>`;

    if (item.hasChildren) {
      html += `<span class="tree-count" style="font-size: 11px; color: #9aabc7; background: rgba(255,255,255,.06); padding: 2px 8px; border-radius: 999px;margin-left:8px">${item.children.length}</span>`;
    } else if (item.url) {
      html += `<i class="fas fa-external-link-alt" style="font-size:10px;color:#4ade80;margin-left:8px" title="外部链接"></i>`;
    }

    html += `</div>`;
  });
  
  html += '</div>';
  container.innerHTML = html;
}

// 切换节点展开/折叠
function toggleTreeNode(index, event) {
  if (event) event.stopPropagation();
  
  const item = treeCache.visibleItems[index];
  if (!item.hasChildren) return;
  
  const nodeIndex = treeCache.data.findIndex(n => n.label === item.label);
  
  if (treeCache.expanded.has(nodeIndex)) {
    treeCache.expanded.delete(nodeIndex);
  } else {
    treeCache.expanded.add(nodeIndex);
  }
  
  treeCache.visibleItems = flattenTree(treeCache.data, treeCache.expanded);
  renderVirtualTree();
}

// 处理树节点点击
function handleTreeItemClick(index, event) {
  if (event) event.stopPropagation();
  
  const item = treeCache.visibleItems[index];
  if (!item) return;
  
  // 如果有外部链接，直接打开
  if (item.url) {
    window.open(item.url, '_blank', 'noopener,noreferrer');
    showToast(`打开: ${item.label}`, 'info');
    return;
  }
  
  // 如果有操作，执行操作
  if (item.action) {
    handleAction(item.action, item);
    return;
  }
  
  // 如果有子节点，切换展开状态
  if (item.hasChildren) {
    toggleTreeNode(index, event);
  }
}

// 执行操作
function handleAction(action, item) {
  console.log('Action:', action, item);
  showToast(`${item.label}`, 'info');
  
  switch(action) {
    case 'fullscreen': toggleFullscreen(); break;
    case 'locate': showLocateModal(); break;
    case 'basemap': showBasemapModal(); break;
    case 'navigation': 
      if (state.map) state.map.flyTo({ center: CONFIG.mapCenter, zoom: CONFIG.mapZoom });
      break;
    case 'layerList': showLayerManager(); break;
    case 'addGeoJSON': addGeoJSONLayer(); break;
    case 'addTileLayer': addTileLayer(); break;
    case 'drawPoint': setActiveTool('point'); break;
    case 'drawLine': setActiveTool('line'); break;
    case 'drawPoly': setActiveTool('polygon'); break;
    case 'measureDistance': setActiveTool('measure'); break;
    case 'geojson': showToast('请上传GeoJSON文件', 'info'); break;
    case 'exportGeoJSON': exportGeoJSON(); break;
    case 'exportPNG': exportMapPNG(); break;
    case 'link': if (item.url) window.open(item.url, '_blank'); break;
    default: showToast('功能开发中...', 'info');
  }
}

function showBasemapModal() {
  const basemaps = state.basemaps || [];
  if (basemaps.length === 0) {
    showToast('没有可用的底图', 'error');
    return;
  }

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>选择底图</h3>
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="basemap-grid">
          ${basemaps.map((bm, i) => `
            <div class="basemap-item" onclick="switchBasemapFromModal(${i})">
              <div class="basemap-preview" style="background:url(${bm.url.replace('{z}', '3').replace('{x}', '4').replace('{y}', '2').replace('{quadkey}', 'b2')}) center/cover"></div>
              <span>${bm.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function switchBasemapFromModal(index) {
  const basemaps = state.basemaps || [];
  if (index >= 0 && index < basemaps.length) {
    switchBasemap(basemaps[index]);
    document.querySelector('.modal-overlay')?.remove();
  }
}

// 导出GeoJSON
function exportGeoJSON() {
  if (!state.map) return;
  const features = [];
  state.map.eachLayer(layer => {
    if (layer.feature) features.push(layer.feature);
  });
  if (features.length === 0) {
    showToast('没有可导出的数据', 'error');
    return;
  }
  const geojson = { type: 'FeatureCollection', features };
  const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geolibre-export.geojson';
  a.click();
  URL.revokeObjectURL(url);
  showToast('GeoJSON已导出', 'success');
}

// 导出PNG
function exportMapPNG() {
  if (!state.map) return;
  const canvas = state.map.getCanvas();
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geolibre-map.png';
  a.click();
  showToast('地图截图已导出', 'success');
}

// 初始化树形目录
async function initTree() {
  treeCache.data = await loadCatalogData();
  treeCache.visibleItems = flattenTree(treeCache.data, treeCache.expanded);
  
  document.getElementById('treeCount').textContent = treeCache.data.length + '项';
  renderVirtualTree();
  
  // 滚动时使用节流渲染
  const container = document.getElementById('treeContainer');
  let ticking = false;
  container.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        renderVirtualTree();
        ticking = false;
      });
      ticking = true;
    }
  });
}

// ============ 地图初始化 ============
function initMap() {
  const defaultBasemap = state.basemaps && state.basemaps.length > 0 
    ? state.basemaps[0] 
    : { name: 'CartoDB', url: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', type: 'xyz' };

  const mapStyle = createMapStyle(defaultBasemap);

  try {
    state.map = new maplibregl.Map({
      container: 'map',
      style: mapStyle,
      center: CONFIG.mapCenter,
      zoom: CONFIG.mapZoom,
      minZoom: CONFIG.minZoom,
      maxZoom: CONFIG.maxZoom,
      crossSourceErrors: true
    });

    state.map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');
    state.map.addControl(new maplibregl.ScaleControl({ maxWidth: 100 }), 'bottom-left');

    state.map.on('mousemove', (e) => {
      if (document.getElementById('lngInput')) {
        document.getElementById('lngInput').value = e.lngLat.lng.toFixed(4);
        document.getElementById('latInput').value = e.lngLat.lat.toFixed(4);
      }
    });

    state.map.on('moveend', updateMapInfo);
    state.map.on('zoomend', updateMapInfo);
    state.map.on('load', () => {
      updateMapInfo();
      showToast(`地图加载完成 (${defaultBasemap.name})`, 'success');
      // 预加载周边瓦片
      preloadTiles();
    });

    state.map.on('error', (e) => {
      console.warn('Map error:', e);
    });

    console.log('🗺️ 地图初始化完成');
  } catch (err) {
    console.error('❌ 地图初始化失败:', err);
    showToast('地图初始化失败', 'error');
  }
}

// 预加载瓦片优化性能
function preloadTiles() {
  if (!state.map) return;
  
  const center = state.map.getCenter();
  const zoom = state.map.getZoom();
  const tileCoords = state.map.project(center);
  const tileX = Math.floor(tileCoords.x / 256);
  const tileY = Math.floor(tileCoords.y / 256);
  const z = Math.floor(zoom);
  
  // 预加载当前层级周边3x3区域的瓦片
  const preloadRange = 1;
  for (let dx = -preloadRange; dx <= preloadRange; dx++) {
    for (let dy = -preloadRange; dy <= preloadRange; dy++) {
      const preloadX = tileX + dx;
      const preloadY = tileY + dy;
      // 创建隐藏的img标签触发预加载
      const img = new Image();
      img.style.display = 'none';
      img.src = defaultBasemap.url
        .replace('{z}', z)
        .replace('{x}', preloadX)
        .replace('{y}', preloadY);
      document.body.appendChild(img);
      setTimeout(() => img.remove(), 5000);
    }
  }
}

function createMapStyle(basemap) {
  const sourceId = 'basemap_' + basemap.name.replace(/\s+/g, '_');
  
  let tiles;
  if (basemap.type === 'bing') {
    tiles = [basemap.url];
  } else if (basemap.type === 'wmts') {
    tiles = [basemap.url];
  } else {
    tiles = [basemap.url];
  }

  return {
    version: 8,
    sources: {
      [sourceId]: {
        type: 'raster',
        tiles: tiles,
        tileSize: 256
      }
    },
    layers: [
      {
        id: sourceId,
        type: 'raster',
        source: sourceId,
        minzoom: 0,
        maxzoom: 19
      }
    ]
  };
}

function switchBasemap(basemap) {
  if (!state.map) return;
  
  try {
    const style = createMapStyle(basemap);
    state.map.setStyle(style);
    state.map.once('load', () => {
      showToast(`已切换到 ${basemap.name}`, 'success');
    });
  } catch (err) {
    console.error('切换底图失败:', err);
    showToast('切换底图失败', 'error');
  }
}

function updateMapInfo() {
  const zoom = state.map.getZoom().toFixed(1);
  const center = state.map.getCenter();
  document.getElementById('zoomLevel').textContent = 'Z: ' + zoom;
  document.getElementById('mapCenter').textContent = center.lng.toFixed(2) + ', ' + center.lat.toFixed(2);
}

// ============ 图层管理 ============
function showLayerManager() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>图层管理</h3>
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="layer-actions">
          <button class="mbtn" onclick="addGeoJSONLayer()"><i class="fas fa-plus"></i> 添加GeoJSON</button>
          <button class="mbtn" onclick="addTileLayer()"><i class="fas fa-plus"></i> 添加瓦片图层</button>
        </div>
        <div class="layer-list" id="layerList">
          ${renderLayerList()}
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function renderLayerList() {
  const layers = state.layers || [];
  if (layers.length === 0) {
    return '<div class="empty-state"><i class="fas fa-layer-group"></i><p>暂无图层</p></div>';
  }
  
  return layers.map((layer, index) => `
    <div class="layer-item ${layer.visible ? '' : 'hidden'}">
      <div class="layer-icon"><i class="fas ${layer.icon || 'fa-layer-group'}"></i></div>
      <div class="layer-info">
        <div class="layer-name">${layer.name}</div>
        <div class="layer-type">${layer.type}</div>
      </div>
      <div class="layer-controls">
        <button class="tbtn" onclick="toggleLayerVisibility(${index})" title="${layer.visible ? '隐藏' : '显示'}">
          <i class="fas fa-eye${layer.visible ? '' : '-slash'}"></i>
        </button>
        <button class="tbtn" onclick="editLayerStyle(${index})" title="编辑样式">
          <i class="fas fa-palette"></i>
        </button>
        <button class="tbtn" onclick="removeLayer(${index})" title="删除">
          <i class="fas fa-trash"></i>
        </button>
      </div>
    </div>
  `).join('');
}

function addGeoJSONLayer() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.geojson,.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    try {
      const text = await file.text();
      const geojson = JSON.parse(text);
      
      const layerId = 'geojson_' + Date.now();
      state.map.addSource(layerId, {
        type: 'geojson',
        data: geojson
      });
      
      state.map.addLayer({
        id: layerId,
        type: 'fill',
        source: layerId,
        paint: {
          'fill-color': '#7c5dfc',
          'fill-opacity': 0.5
        }
      });
      
      state.layers.push({
        id: layerId,
        name: file.name,
        type: 'GeoJSON',
        icon: 'fa-code',
        visible: true,
        data: geojson
      });
      
      showToast(`已添加图层: ${file.name}`, 'success');
      document.getElementById('layerList').innerHTML = renderLayerList();
    } catch (err) {
      console.error('加载GeoJSON失败:', err);
      showToast('加载GeoJSON失败', 'error');
    }
  };
  input.click();
}

function addTileLayer() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>添加瓦片图层</h3>
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="modal-box">
          <p>图层名称</p>
          <input type="text" id="tileLayerName" placeholder="例如: 卫星影像" />
          <p>瓦片URL (使用 {z}, {x}, {y} 作为占位符)</p>
          <input type="text" id="tileLayerUrl" placeholder="https://example.com/{z}/{x}/{y}.png" />
          <div class="modal-btns">
            <button class="mbtn" onclick="this.closest('.modal-overlay').remove()">取消</button>
            <button class="mbtn" style="background:#7c5dfc;color:#fff" onclick="confirmAddTileLayer()">添加</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function confirmAddTileLayer() {
  const name = document.getElementById('tileLayerName').value.trim();
  const url = document.getElementById('tileLayerUrl').value.trim();
  
  if (!name || !url) {
    showToast('请填写完整信息', 'error');
    return;
  }
  
  try {
    const layerId = 'tile_' + Date.now();
    state.map.addSource(layerId, {
      type: 'raster',
      tiles: [url],
      tileSize: 256
    });
    
    state.map.addLayer({
      id: layerId,
      type: 'raster',
      source: layerId
    });
    
    state.layers.push({
      id: layerId,
      name: name,
      type: '瓦片图层',
      icon: 'fa-th-large',
      visible: true,
      url: url
    });
    
    showToast(`已添加图层: ${name}`, 'success');
    document.querySelector('.modal-overlay')?.remove();
    document.getElementById('layerList').innerHTML = renderLayerList();
  } catch (err) {
    console.error('添加瓦片图层失败:', err);
    showToast('添加瓦片图层失败', 'error');
  }
}

function toggleLayerVisibility(index) {
  const layer = state.layers[index];
  if (!layer) return;
  
  layer.visible = !layer.visible;
  state.map.setLayoutProperty(layer.id, 'visibility', layer.visible ? 'visible' : 'none');
  
  document.getElementById('layerList').innerHTML = renderLayerList();
}

function editLayerStyle(index) {
  const layer = state.layers[index];
  if (!layer) return;
  
  showToast('样式编辑功能开发中...', 'info');
}

function removeLayer(index) {
  const layer = state.layers[index];
  if (!layer) return;
  
  if (confirm(`确定要删除图层 "${layer.name}" 吗？`)) {
    state.map.removeLayer(layer.id);
    state.map.removeSource(layer.id);
    state.layers.splice(index, 1);
    
    showToast(`已删除图层: ${layer.name}`, 'success');
    document.getElementById('layerList').innerHTML = renderLayerList();
  }
}

// ============ 快速检索功能 ============
async function searchLocation(query) {
  if (!query.trim()) return;
  
  showToast('正在搜索...', 'info');
  
  try {
    // 尝试解析为坐标
    const coordMatch = query.match(/^(-?\d+\.?\d*),\s*(-?\d+\.?\d*)$/);
    if (coordMatch) {
      const lng = parseFloat(coordMatch[1]);
      const lat = parseFloat(coordMatch[2]);
      if (lng >= -180 && lng <= 180 && lat >= -90 && lat <= 90) {
        state.map.flyTo({ center: [lng, lat], zoom: 14 });
        showToast(`定位到坐标: ${lng.toFixed(4)}, ${lat.toFixed(4)}`, 'success');
        return;
      }
    }
    
    // 使用Nominatim进行地名搜索（免费OSM API）
    const response = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&accept-language=zh-CN`
    );
    
    if (!response.ok) throw new Error('搜索请求失败');
    
    const results = await response.json();
    
    if (results.length === 0) {
      showToast('未找到相关地点', 'error');
      return;
    }
    
    // 显示搜索结果选择框
    showSearchResults(results);
    
  } catch (err) {
    console.error('搜索失败:', err);
    showToast('搜索失败，请稍后重试', 'error');
  }
}

function showSearchResults(results) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>搜索结果</h3>
        <button class="close-btn" onclick="this.closest('.modal-overlay').remove()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="search-results">
          ${results.map((r, i) => `
            <div class="search-result-item" onclick="flyToSearchResult(${r.lon}, ${r.lat}, '${r.display_name.replace(/'/g, "\\'")}')">
              <div class="result-icon"><i class="fas fa-map-marker-alt"></i></div>
              <div class="result-info">
                <div class="result-name">${r.display_name.split(',')[0]}</div>
                <div class="result-address">${r.display_name}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function flyToSearchResult(lng, lat, name) {
  state.map.flyTo({ center: [parseFloat(lng), parseFloat(lat)], zoom: 15 });
  document.querySelector('.modal-overlay')?.remove();
  showToast(`已定位到: ${name.split(',')[0]}`, 'success');
}

// ============ UI初始化 ============
function initUI() {
  // 工具栏按钮
  document.getElementById('zoomIn').addEventListener('click', () => state.map.zoomIn());
  document.getElementById('zoomOut').addEventListener('click', () => state.map.zoomOut());
  document.getElementById('zoomReset').addEventListener('click', () => {
    state.map.flyTo({ center: CONFIG.mapCenter, zoom: CONFIG.mapZoom });
  });
  document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
  document.getElementById('helpBtn').addEventListener('click', toggleShortcutHint);

  // 绘制工具
  document.getElementById('drawPoint').addEventListener('click', () => setActiveTool('point'));
  document.getElementById('drawLine').addEventListener('click', () => setActiveTool('line'));
  document.getElementById('drawPoly').addEventListener('click', () => setActiveTool('polygon'));
  document.getElementById('measure').addEventListener('click', () => setActiveTool('measure'));

  // 侧边栏切换
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('leftSidebar').classList.toggle('open');
  });

  // 搜索功能
  document.getElementById('treeSearch').addEventListener('input', (e) => {
    filterTree(e.target.value);
  });
  document.getElementById('globalSearch').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchLocation(e.target.value);
  });

  // 快捷键
  document.addEventListener('keydown', handleKeyboard);
}

function setActiveTool(tool) {
  state.activeTool = tool;
  document.querySelectorAll('.tbtn').forEach(btn => btn.classList.remove('active'));
  const btnId = tool === 'point' ? 'drawPoint' : tool === 'line' ? 'drawLine' : tool === 'polygon' ? 'drawPoly' : 'measure';
  if (document.getElementById(btnId)) {
    document.getElementById(btnId).classList.add('active');
  }
  showToast('已选择工具: ' + tool, 'info');
}

function toggleFullscreen() {
  document.body.classList.toggle('fullscreen');
  const btn = document.getElementById('fullscreenBtn');
  btn.innerHTML = document.body.classList.contains('fullscreen')
    ? '<i class="fas fa-compress"></i>'
    : '<i class="fas fa-expand"></i>';
}

function toggleShortcutHint() {
  document.getElementById('shortcutHint').classList.toggle('show');
}

function handleKeyboard(e) {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key.toLowerCase()) {
    case 'f': toggleFullscreen(); break;
    case 'r': state.map.flyTo({ center: CONFIG.mapCenter, zoom: CONFIG.mapZoom }); break;
    case '+': state.map.zoomIn(); break;
    case '-': state.map.zoomOut(); break;
    case 'l': document.getElementById('rightPanel').classList.toggle('hidden'); break;
    case 's': document.getElementById('leftSidebar').classList.toggle('hidden'); break;
    case '?': toggleShortcutHint(); break;
    case 'escape':
      document.body.classList.remove('fullscreen');
      document.getElementById('shortcutHint').classList.remove('show');
      break;
  }
}

function filterTree(keyword) {
  const nodes = document.querySelectorAll('.tree-node');
  nodes.forEach(node => {
    const name = node.querySelector('.tree-name').textContent;
    if (keyword && !name.toLowerCase().includes(keyword.toLowerCase())) {
      node.style.display = 'none';
    } else {
      node.style.display = 'block';
    }
  });
}

function searchLocation(query) {
  if (!query) return;
  // 使用Nominatim搜索
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
    .then(r => r.json())
    .then(data => {
      if (data.length > 0) {
        const result = data[0];
        state.map.flyTo({
          center: [parseFloat(result.lon), parseFloat(result.lat)],
          zoom: 12
        });
        showToast('定位到: ' + result.display_name, 'success');
      } else {
        showToast('未找到位置', 'error');
      }
    })
    .catch(err => showToast('搜索失败', 'error'));
}

// ============ API检测 ============
function checkAPI() {
  const dot = document.getElementById('statusDot');
  const status = document.getElementById('apiStatus');
  fetch(CONFIG.apiBase + '/health')
    .then(r => r.json())
    .then(data => {
      dot.classList.remove('offline');
      status.textContent = '在线';
    })
    .catch(err => {
      dot.classList.add('offline');
      status.textContent = '离线';
    });
}

// ============ Toast提示 ============
function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ============ 启动 ============
document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
