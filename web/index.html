<!DOCTYPE html>
<html lang="zh-CN">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意念地球</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0f1639;color:#e6e8f5}

.container{display:flex;flex-direction:column;height:100vh}
.top-bar{height:56px;background:rgba(12,21,55,.94);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100}
.top-bar .logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:#fff}
.top-bar .logo i{font-size:22px;color:#7c5dfc}
.search-box{flex:1;position:relative;max-width:400px}
.search-box input{width:100%;padding:10px 40px 10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(18,29,70,.9);color:#fff;font-size:14px;outline:none}
.search-box input:focus{border-color:#7c5dfc}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8f98c8}
.user-area{display:flex;align-items:center;gap:8px}
.user-area .tbtn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.04);color:#c7d1f4;display:flex;align-items:center;justify-content:center;cursor:pointer}
.user-area .tbtn:hover{background:rgba(124,93,252,.12);color:#fff}

.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:rgba(10,18,46,.96);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h3{font-size:13px;color:#f2f5ff;font-weight:600}
.tree-search{padding:0 14px 12px}
.tree-search input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(22,33,70,.9);color:#fff;font-size:13px;outline:none}
.tree-wrap{flex:1;overflow-y:auto;padding:6px}
.tree-wrap::-webkit-scrollbar{width:4px}
.tree-wrap::-webkit-scrollbar-thumb{background:rgba(124,93,252,.3)}

.tree-node{margin:1px 0}
.tree-label{display:flex;align-items:center;gap:8px;padding:9px 12px;color:#c7d1f4;cursor:pointer;border-radius:8px;font-size:13px;transition:background .15s}
.tree-label:hover{background:rgba(124,93,252,.12);color:#fff}
.tree-label.active{background:rgba(124,93,252,.32);color:#fff}
.tree-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#8f9ecb;font-size:9px;transition:transform .2s}
.tree-arrow.rotated{transform:rotate(90deg)}
.tree-arrow.empty{visibility:hidden}
.tree-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:13px}
.tree-icon.folder{color:#7c5dfc}
.tree-icon.file{color:#5b8def}
.tree-icon.link{color:#4ade80}
.tree-name{flex:1;text-overflow:ellipsis;white-space:nowrap;overflow:hidden}
.tree-children{display:none}
.tree-children.open{display:block}
.tree-node.level-2 .tree-label{padding-left:36px}
.tree-node.level-3 .tree-label{padding-left:52px}

.preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{height:48px;background:rgba(12,20,49,.96);display:flex;align-items:center;padding:0 16px;gap:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.toolbar .tbtn{width:34px;height:34px;border-radius:8px;border:none;background:rgba(255,255,255,.04);color:#c7d1f4;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.toolbar .tbtn:hover{background:rgba(124,93,252,.12);color:#fff}
.toolbar .tbtn.active{background:#7c5dfc;color:#fff}
.toolbar .sep{width:1px;height:24px;background:rgba(255,255,255,.1);margin:0 4px}
.toolbar .coord{margin-left:auto;font-size:12px;color:#9fb4d8}
.toolbar .coord input{width:70px;padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(18,28,61,.95);color:#fff;text-align:center;font-size:11px}

#map{flex:1;width:100%;height:100%}
.maplibregl-ctrl-group{background:rgba(12,20,49,.96)!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:10px!important}
.maplibregl-ctrl-group button{background:rgba(255,255,255,.04)!important;color:#c7d1f4!important}
.maplibregl-ctrl-group button:hover{background:rgba(124,93,252,.12)!important;color:#fff!important}

.status-bar{height:32px;background:rgba(12,20,47,.94);display:flex;align-items:center;padding:0 20px;font-size:11px;color:#9fb4d8;border-top:1px solid rgba(255,255,255,.06)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:6px}

.modal-overlay{position:fixed;inset:0;background:rgba(6,11,28,.85);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-overlay.show{display:flex}
.modal{width:min(500px,100%);background:rgba(17,25,55,.98);border:1px solid rgba(124,93,252,.25);border-radius:16px;overflow:hidden}
.modal-header{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;color:#fff;font-weight:600}
.close-btn{background:none;border:none;color:#9fb4d8;cursor:pointer;padding:4px 8px;border-radius:6px}
.close-btn:hover{background:rgba(124,93,252,.12);color:#fff}
.modal-body{padding:20px}

.basemap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.basemap-item{cursor:pointer;border-radius:10px;overflow:hidden;border:2px solid transparent;transition:all .2s;background:rgba(255,255,255,.04)}
.basemap-item:hover{border-color:#7c5dfc}
.basemap-preview{height:70px;background:#1a2342;display:flex;align-items:center;justify-content:center;color:#7a89b8;font-size:24px}
.basemap-item span{display:block;padding:8px;text-align:center;font-size:12px;color:#eef2ff}

.search-results{display:flex;flex-direction:column;gap:8px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;cursor:pointer;transition:all .15s}
.search-result-item:hover{background:rgba(124,93,252,.08)}
.result-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(124,93,252,.15);border-radius:8px;color:#7c5dfc;font-size:16px}
.result-info{flex:1;min-width:0}
.result-name{font-size:14px;color:#eef2ff;font-weight:500;margin-bottom:4px}
.result-address{font-size:12px;color:#9fb4d8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-source{font-size:11px;color:#7c5dfc}

.layer-list{display:flex;flex-direction:column;gap:8px}
.layer-item{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.03);border-radius:8px}
.layer-item .layer-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(124,93,252,.15);border-radius:6px;color:#7c5dfc}
.layer-item .layer-info{flex:1}
.layer-item .layer-name{font-size:13px;color:#eef2ff}
.layer-item .layer-type{font-size:11px;color:#9fb4d8}
.layer-item .layer-controls{display:flex;gap:4px}
.layer-item .layer-controls button{width:26px;height:26px;border-radius:6px;border:none;background:rgba(255,255,255,.04);color:#c7d1f4;cursor:pointer}
.layer-item .layer-controls button:hover{background:rgba(124,93,252,.12)}

.toast{position:fixed;bottom:30px;right:30px;padding:12px 18px;border-radius:12px;background:rgba(124,93,252,.95);color:#fff;font-size:13px;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;z-index:3000}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:rgba(34,197,94,.95)}
.toast.error{background:rgba(239,68,68,.95)}
</style>
</head>
<body>
<div class="container">
  <header class="top-bar">
    <div class="logo"><i class="fas fa-globe-americas"></i> 意念地球</div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="搜索地名、功能..." onkeydown="if(event.key==='Enter')searchLocation(this.value)">
    </div>
    <div class="user-area">
      <button class="tbtn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
      <button class="tbtn" onclick="showShortcuts()"><i class="fas fa-keyboard"></i></button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-folder-tree"></i> 功能目录</h3>
        <span id="treeCount">0项</span>
      </div>
      <div class="tree-search">
        <input type="text" id="treeSearch" placeholder="搜索功能..." oninput="filterTree(this.value)">
      </div>
      <div class="tree-wrap" id="treeContainer"></div>
    </aside>

    <div class="preview-area">
      <div class="toolbar">
        <button class="tbtn" onclick="state.map && state.map.zoomIn()" title="放大"><i class="fas fa-plus"></i></button>
      <button class="tbtn" onclick="state.map && state.map.zoomOut()" title="缩小"><i class="fas fa-minus"></i></button>
        <button class="tbtn" onclick="resetView()" title="重置"><i class="fas fa-home"></i></button>
        <span class="sep"></span>
        <button class="tbtn" onclick="showBasemapModal()" title="底图切换"><i class="fas fa-layer-group"></i></button>
        <button class="tbtn" onclick="showLayerManager()" title="图层管理"><i class="fas fa-list"></i></button>
        <button class="tbtn" onclick="addGeoJSONLayer()" title="添加图层"><i class="fas fa-plus-circle"></i></button>
        <span class="sep"></span>
        <button class="tbtn" onclick="exportPNG()" title="导出PNG"><i class="fas fa-file-export"></i></button>
        <div class="coord">
          <input type="text" id="lngInput" value="116.40" readonly>
          <input type="text" id="latInput" value="39.90" readonly>
        </div>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <footer class="status-bar">
    <span><span class="status-dot" id="statusDot"></span>地图状态: <span id="mapStatus">加载中</span></span>
    <span style="margin-left:auto">意念地球 v1.0</span>
  </footer>
</div>

<div class="modal-overlay" id="basemapModal">
  <div class="modal">
    <div class="modal-header">
      <h3>选择底图</h3>
      <button class="close-btn" onclick="closeModal('basemapModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="basemap-grid" id="basemapGrid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="searchModal">
  <div class="modal">
    <div class="modal-header">
      <h3>搜索结果</h3>
      <button class="close-btn" onclick="closeModal('searchModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="layerModal">
  <div class="modal">
    <div class="modal-header">
      <h3>图层管理</h3>
      <button class="close-btn" onclick="closeModal('layerModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <button class="tbtn" style="margin-bottom:12px" onclick="addGeoJSONLayer()"><i class="fas fa-plus"></i> 添加GeoJSON</button>
      <div class="layer-list" id="layerList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const CONFIG = {
  mapCenter: [116.4, 39.9],
  mapZoom: 10,
  minZoom: 3,
  maxZoom: 18,
  catalogUrl: './data/catalog.json'
};

const state = {
  map: null,
  layers: [],
  catalog: [],
  basemaps: []
};

const catalogData = [
  {
    id: 'basic-map',
    label: '基础地图',
    icon: 'fa-map',
    children: [
      { id: 'basemap', label: '底图切换', icon: 'fa-layer-group', action: 'basemap' },
      { id: 'navigation', label: '地图导航', icon: 'fa-location-arrow', action: 'navigation' },
      { id: 'fullscreen', label: '全屏模式', icon: 'fa-expand', action: 'fullscreen' }
    ]
  },
  {
    id: 'layer-manager',
    label: '图层管理',
    icon: 'fa-layer-group',
    children: [
      { id: 'addGeoJSON', label: '添加GeoJSON', icon: 'fa-code', action: 'addGeoJSON' },
      { id: 'addTileLayer', label: '添加瓦片图层', icon: 'fa-th-large', action: 'addTileLayer' },
      { id: 'layerList', label: '图层列表', icon: 'fa-list', action: 'layerList' }
    ]
  },
  {
    id: 'draw-edit',
    label: '绘制编辑',
    icon: 'fa-pencil-alt',
    children: [
      { id: 'drawPoint', label: '绘制点', icon: 'fa-map-marker-alt', action: 'drawPoint' },
      { id: 'drawLine', label: '绘制线', icon: 'fa-route', action: 'drawLine' },
      { id: 'drawPoly', label: '绘制面', icon: 'fa-draw-polygon', action: 'drawPoly' },
      { id: 'measure', label: '距离测量', icon: 'fa-ruler', action: 'measure' }
    ]
  },
  {
    id: 'data-export',
    label: '数据导出',
    icon: 'fa-file-export',
    children: [
      { id: 'exportGeoJSON', label: '导出GeoJSON', icon: 'fa-code', action: 'exportGeoJSON' },
      { id: 'exportPNG', label: '导出PNG', icon: 'fa-image', action: 'exportPNG' }
    ]
  },
  {
    id: 'external-links',
    label: '外部资源',
    icon: 'fa-link',
    children: [
      { id: 'osm', label: 'OpenStreetMap', icon: 'fa-globe', url: 'https://www.openstreetmap.org' },
      { id: 'geojson', label: 'GeoJSON预览', icon: 'fa-eye', url: 'https://geojson.io' },
      { id: 'maplibre', label: 'MapLibre文档', icon: 'fa-book', url: 'https://maplibre.org' }
    ]
  }
];

const defaultBasemaps = [
  { name: 'OpenStreetMap', url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', type: 'xyz' },
  { name: 'CartoDB亮色', url: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', type: 'xyz' },
  { name: 'CartoDB暗色', url: 'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', type: 'xyz' },
  { name: 'CartoDB航海', url: 'https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', type: 'xyz' },
  { name: 'Esri卫星', url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', type: 'xyz' },
  { name: 'Esri地形', url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', type: 'xyz' }
];

async function initApp() {
  try {
    await loadConfig();
    renderTree(catalogData);
    initMap();
    initKeyboard();
    document.getElementById('treeCount').textContent = catalogData.length + '项';
  } catch (e) {
    console.error('初始化失败:', e);
    renderTree(catalogData);
    initMap();
  }
}

async function loadConfig() {
  try {
    const res = await fetch(CONFIG.catalogUrl);
    if (res.ok) {
      const data = await res.json();
      if (data.catalog) state.catalog = data.catalog;
      if (data.basemaps) state.basemaps = data.basemaps;
      if (data.defaultConfig) {
        CONFIG.mapCenter = data.defaultConfig.mapCenter || CONFIG.mapCenter;
        CONFIG.mapZoom = data.defaultConfig.mapZoom || CONFIG.mapZoom;
      }
    }
  } catch (e) {
    console.warn('加载配置失败，使用默认配置');
  }
}

function renderTree(data, parentId = '', level = 0) {
  const container = document.getElementById('treeContainer');
  const ul = document.createElement('ul');
  ul.style.listStyle = 'none';
  ul.style.padding = '0';
  
  data.forEach(node => {
    const li = document.createElement('li');
    li.className = 'tree-node level-' + (level + 1);
    
    const label = document.createElement('div');
    label.className = 'tree-label';
    
    if (node.children && node.children.length > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'tree-arrow';
      arrow.innerHTML = '<i class="fas fa-chevron-right"></i>';
      arrow.onclick = (e) => {
        e.stopPropagation();
        toggleNode(li, arrow);
      };
      label.appendChild(arrow);
      
      const icon = document.createElement('span');
      icon.className = 'tree-icon folder';
      icon.innerHTML = `<i class="fas ${node.icon}"></i>`;
      label.appendChild(icon);
    } else if (node.url) {
      label.innerHTML += '<span class="tree-arrow empty"></span>';
      const icon = document.createElement('span');
      icon.className = 'tree-icon link';
      icon.innerHTML = `<i class="fas ${node.icon}"></i>`;
      label.appendChild(icon);
    } else {
      label.innerHTML += '<span class="tree-arrow empty"></span>';
      const icon = document.createElement('span');
      icon.className = 'tree-icon file';
      icon.innerHTML = `<i class="fas ${node.icon}"></i>`;
      label.appendChild(icon);
    }
    
    const name = document.createElement('span');
    name.className = 'tree-name';
    name.textContent = node.label;
    label.appendChild(name);
    
    label.onclick = () => {
      if (node.url) {
        window.open(node.url, '_blank');
        showToast('打开: ' + node.label);
      } else if (node.action) {
        handleAction(node.action);
      } else if (node.children) {
        const arrow = label.querySelector('.tree-arrow');
        toggleNode(li, arrow);
      }
    };
    
    li.appendChild(label);
    
    if (node.children && node.children.length > 0) {
      const childrenDiv = document.createElement('div');
      childrenDiv.className = 'tree-children';
      childrenDiv.appendChild(renderTree(node.children, node.id, level + 1));
      li.appendChild(childrenDiv);
    }
    
    ul.appendChild(li);
  });
  
  return ul;
}

function toggleNode(li, arrow) {
  const children = li.querySelector('.tree-children');
  if (children) {
    children.classList.toggle('open');
    arrow.classList.toggle('rotated');
    arrow.innerHTML = children.classList.contains('open')
      ? '<i class="fas fa-chevron-down"></i>'
      : '<i class="fas fa-chevron-right"></i>';
  }
}

function filterTree(keyword) {
  const nodes = document.querySelectorAll('.tree-node');
  nodes.forEach(node => {
    const name = node.querySelector('.tree-name').textContent;
    if (keyword && !name.toLowerCase().includes(keyword.toLowerCase())) {
      node.style.display = 'none';
    } else {
      node.style.display = 'block';
    }
  });
}

function initMap() {
  const basemaps = state.basemaps.length > 0 ? state.basemaps : defaultBasemaps;
  
  getUserLocation().then(location => {
    const center = location || CONFIG.mapCenter;
    const zoom = location ? 10 : CONFIG.mapZoom;
    
    state.map = new maplibregl.Map({
      container: 'map',
      style: createStyle(basemaps[0]),
      center: center,
      zoom: zoom,
      minZoom: CONFIG.minZoom,
      maxZoom: CONFIG.maxZoom
    });
    
    state.map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');
    state.map.addControl(new maplibregl.ScaleControl({ maxWidth: 100 }), 'bottom-left');
    
    state.map.on('mousemove', (e) => {
      document.getElementById('lngInput').value = e.lngLat.lng.toFixed(4);
      document.getElementById('latInput').value = e.lngLat.lat.toFixed(4);
    });
    
    state.map.on('load', () => {
      document.getElementById('statusDot').style.background = '#4ade80';
      document.getElementById('mapStatus').textContent = '在线';
    });
    
    state.map.on('error', (e) => {
      console.warn('Map error:', e);
      document.getElementById('statusDot').style.background = '#f87171';
      document.getElementById('mapStatus').textContent = '加载失败';
    });
  });
}

function createStyle(basemap) {
  return {
    version: 8,
    sources: {
      basemap: {
        type: 'raster',
        tiles: [basemap.url],
        tileSize: 256
      }
    },
    layers: [{
      id: 'basemap',
      type: 'raster',
      source: 'basemap',
      minzoom: 0,
      maxzoom: 19
    }]
  };
}

function switchBasemap(basemap) {
  if (state.map) {
    state.map.setStyle(createStyle(basemap));
    showToast('已切换到: ' + basemap.name);
  }
}

function showBasemapModal() {
  const basemaps = state.basemaps.length > 0 ? state.basemaps : defaultBasemaps;
  const grid = document.getElementById('basemapGrid');
  grid.innerHTML = basemaps.map((bm, i) => `
    <div class="basemap-item" onclick="switchBasemapAndClose(${i})">
      <div class="basemap-preview">🗺️</div>
      <span>${bm.name}</span>
    </div>
  `).join('');
  document.getElementById('basemapModal').classList.add('show');
}

function switchBasemapAndClose(index) {
  const basemaps = state.basemaps.length > 0 ? state.basemaps : defaultBasemaps;
  switchBasemap(basemaps[index]);
  closeModal('basemapModal');
}

function showLayerManager() {
  const list = document.getElementById('layerList');
  if (state.layers.length === 0) {
    list.innerHTML = '<div style="color:#7a89b8;text-align:center;padding:20px">暂无图层</div>';
  } else {
    list.innerHTML = state.layers.map((layer, i) => `
      <div class="layer-item">
        <div class="layer-icon"><i class="fas ${layer.icon || 'fa-layer-group'}"></i></div>
        <div class="layer-info">
          <div class="layer-name">${layer.name}</div>
          <div class="layer-type">${layer.type}</div>
        </div>
        <div class="layer-controls">
          <button onclick="toggleLayer(${i})"><i class="fas fa-eye"></i></button>
          <button onclick="removeLayer(${i})"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('layerModal').classList.add('show');
}

function addGeoJSONLayer() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.geojson,.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const geojson = JSON.parse(text);
      const id = 'geojson_' + Date.now();
      state.map.addSource(id, { type: 'geojson', data: geojson });
      state.map.addLayer({
        id: id,
        type: 'fill',
        source: id,
        paint: { 'fill-color': '#7c5dfc', 'fill-opacity': 0.5 }
      });
      state.layers.push({ id, name: file.name, type: 'GeoJSON', icon: 'fa-code', visible: true });
      showToast('已添加图层: ' + file.name);
    } catch (err) {
      showToast('加载失败', 'error');
    }
  };
  input.click();
}

function toggleLayer(index) {
  const layer = state.layers[index];
  if (layer) {
    layer.visible = !layer.visible;
    state.map.setLayoutProperty(layer.id, 'visibility', layer.visible ? 'visible' : 'none');
    showLayerManager();
  }
}

function removeLayer(index) {
  const layer = state.layers[index];
  if (layer) {
    state.map.removeLayer(layer.id);
    state.map.removeSource(layer.id);
    state.layers.splice(index, 1);
    showToast('已删除图层');
    showLayerManager();
  }
}

async function getUserLocation() {
  const saved = localStorage.getItem('geolibre_location');
  if (saved) {
    try { return JSON.parse(saved); } catch (e) {}
  }
  
  try {
    const res = await fetch('https://ipapi.co/json/', { timeout: 3000 });
    if (res.ok) {
      const data = await res.json();
      if (data.longitude && data.latitude) {
        const loc = [parseFloat(data.longitude), parseFloat(data.latitude)];
        localStorage.setItem('geolibre_location', JSON.stringify(loc));
        return loc;
      }
    }
  } catch (e) {
    console.warn('IP定位失败:', e);
  }
  
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const tzMap = {
    'Asia/Shanghai': [121.47, 31.23],
    'Asia/Beijing': [116.40, 39.90],
    'Asia/Tokyo': [139.69, 35.69],
    'America/New_York': [-74.00, 40.71],
    'Europe/London': [-0.12, 51.51]
  };
  if (tzMap[timezone]) return tzMap[timezone];
  
  return null;
}

async function searchLocation(query) {
  if (!query.trim()) return;
  
  const coordMatch = query.match(/^(-?\d+\.?\d*),\s*(-?\d+\.?\d*)$/);
  if (coordMatch) {
    const lng = parseFloat(coordMatch[1]);
    const lat = parseFloat(coordMatch[2]);
    if (lng >= -180 && lng <= 180 && lat >= -90 && lat <= 90) {
      state.map.flyTo({ center: [lng, lat], zoom: 14 });
      showToast('定位到坐标: ' + lng.toFixed(4) + ', ' + lat.toFixed(4));
      return;
    }
  }
  
  const results = [];
  
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&accept-language=zh-CN`, {
      headers: { 'User-Agent': 'GeoLibre/1.0' }
    });
    if (res.ok) {
      const data = await res.json();
      results.push(...data.map(r => ({
        lon: r.lon, lat: r.lat,
        name: r.display_name.split(',')[0],
        address: r.display_name,
        source: 'OSM'
      })));
    }
  } catch (e) { console.warn('Nominatim失败:', e); }
  
  try {
    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lang=zh`);
    if (res.ok) {
      const data = await res.json();
      if (data.features) {
        results.push(...data.features.map(f => ({
          lon: f.geometry.coordinates[0],
          lat: f.geometry.coordinates[1],
          name: f.properties.name || '地点',
          address: f.properties.city || f.properties.country || '',
          source: 'Photon'
        })));
      }
    }
  } catch (e) { console.warn('Photon失败:', e); }
  
  if (results.length === 0) {
    showToast('未找到相关地点', 'error');
    return;
  }
  
  const container = document.getElementById('searchResults');
  container.innerHTML = results.map(r => `
    <div class="search-result-item" onclick="flyTo(${r.lon}, ${r.lat}, '${r.name}')">
      <div class="result-icon"><i class="fas fa-map-marker-alt"></i></div>
      <div class="result-info">
        <div class="result-name">${r.name}</div>
        <div class="result-address">${r.address}</div>
        <div class="result-source">${r.source}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('searchModal').classList.add('show');
}

function flyTo(lng, lat, name) {
  state.map.flyTo({ center: [parseFloat(lng), parseFloat(lat)], zoom: 14 });
  closeModal('searchModal');
  showToast('已定位到: ' + name);
}

function handleAction(action) {
  switch(action) {
    case 'basemap': showBasemapModal(); break;
    case 'navigation': resetView(); break;
    case 'fullscreen': toggleFullscreen(); break;
    case 'addGeoJSON': addGeoJSONLayer(); break;
    case 'layerList': showLayerManager(); break;
    case 'exportPNG': exportPNG(); break;
    case 'drawPoint': showToast('绘制点功能开发中'); break;
    case 'drawLine': showToast('绘制线功能开发中'); break;
    case 'drawPoly': showToast('绘制面功能开发中'); break;
    case 'measure': showToast('测量功能开发中'); break;
    default: showToast('功能开发中');
  }
}

function resetView() {
  state.map.flyTo({ center: CONFIG.mapCenter, zoom: CONFIG.mapZoom });
}

function exportPNG() {
  const url = state.map.getCanvas().toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geolibre-map.png';
  a.click();
  showToast('地图已导出');
}

function toggleFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
}

function showShortcuts() {
  showToast('快捷键: F-全屏, R-重置, +/-缩放');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function initKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch(e.key.toLowerCase()) {
      case 'f': toggleFullscreen(); break;
      case 'r': resetView(); break;
      case '+': state.map?.zoomIn(); break;
      case '-': state.map?.zoomOut(); break;
      case 'escape': document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show')); break;
    }
  });
}

function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 2500);
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
