<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLibre Web GIS</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-left">
                <h1>🌍 GeoLibre <small>Web GIS</small></h1>
            </div>
            <div class="header-center">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索地名..." />
                </div>
            </div>
            <div class="header-right">
                <div class="status-badge">
                    <span class="status-dot" id="statusDot"></span>
                    <span>API: <strong id="apiStatusLabel">检测中...</strong></span>
                </div>
                <button class="btn-icon" id="themeToggle" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar left-sidebar" id="leftSidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-layer-group"></i> 图层管理</h2>
                    <button class="btn-icon" id="toggleLeftSidebar" title="收起">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                </div>
                <div class="sidebar-tabs">
                    <button class="sidebar-tab active" data-tab="layers">图层</button>
                    <button class="sidebar-tab" data-tab="add">添加</button>
                    <button class="sidebar-tab" data-tab="style">样式</button>
                </div>
                <div class="tab-panel active" id="tab-layers">
                    <div class="layer-list" id="layerList">
                        <div class="layer-empty">
                            <i class="fas fa-layer-group"></i>
                            <p>暂无图层</p>
                        </div>
                    </div>
                </div>
                <div class="tab-panel" id="tab-add">
                    <div class="add-layer-options">
                        <button class="add-option" data-type="geojson">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>GeoJSON</span>
                        </button>
                        <button class="add-option" data-type="tile">
                            <i class="fas fa-th"></i>
                            <span>瓦片图层</span>
                        </button>
                    </div>
                    <div class="add-form" id="form-geojson">
                        <h3>添加 GeoJSON</h3>
                        <div class="form-group">
                            <label>图层名称</label>
                            <input type="text" id="geojsonName" value="标记点" />
                        </div>
                        <div class="form-group">
                            <label>GeoJSON 数据</label>
                            <textarea id="geojsonData" rows="6">{"type":"FeatureCollection","features":[{"type":"Feature","geometry":{"type":"Point","coordinates":[116.4,39.9]},"properties":{"name":"北京"}}]}</textarea>
                        </div>
                        <button class="btn btn-primary" id="addGeoJSONBtn">添加图层</button>
                    </div>
                    <div class="add-form hidden" id="form-tile">
                        <h3>添加瓦片图层</h3>
                        <div class="form-group">
                            <label>图层名称</label>
                            <input type="text" id="tileName" value="OpenStreetMap" />
                        </div>
                        <div class="form-group">
                            <label>瓦片 URL</label>
                            <input type="text" id="tileUrl" value="https://tile.openstreetmap.org/{z}/{x}/{y}.png" />
                        </div>
                        <button class="btn btn-primary" id="addTileBtn">添加瓦片</button>
                    </div>
                </div>
                <div class="tab-panel" id="tab-style">
                    <p>选择图层以编辑样式</p>
                </div>
            </aside>

            <div class="map-container">
                <div id="map"></div>
                <div class="map-coords" id="mapCoords">经度: — 纬度: —</div>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-left">
                <span class="stat" id="footerCenter">35, 105</span>
                <span class="stat" id="footerZoom">缩放: 4</span>
                <span class="stat" id="footerLayers">图层: 0</span>
            </div>
        </footer>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
