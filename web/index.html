<!DOCTYPE html>
<html lang="zh-CN">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意念地球 - GeoLibre</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
:root{
  --accent:#7c5dfc;
  --accent-dark:#6b4fe6;
  --bg-primary:rgba(12,21,55,.94);
  --bg-secondary:rgba(10,18,46,.96);
  --text-primary:#eef2ff;
  --text-secondary:#9fb4d8;
  --border-color:rgba(255,255,255,.06);
  --sidebar-width:300px;
  --tree-node-height:40px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0f1639;color:#e6e8f5}

.container{display:flex;flex-direction:column;height:100vh}

/* ========== 顶部栏 ========== */
.top-bar{
  height:56px;flex-shrink:0;
  background:var(--bg-primary);
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:#fff}
.logo i{font-size:22px;color:var(--accent)}
.logo span{color:#8f98c8;font-size:12px;font-weight:400}

.search-global{position:relative;flex:1;min-width:0;max-width:480px}
.search-global input{
  width:100%;padding:10px 44px 10px 42px;
  border-radius:999px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,29,70,.9);color:#f4f6ff;font-size:14px;
}
.search-global input:focus{border-color:var(--accent)}
.search-global i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8f98c8}
.search-clear{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#8f98c8;cursor:pointer;font-size:12px;
  display:none;padding:4px;
}
.search-clear.show{display:block}
.search-clear:hover{color:#fff}
.search-count{
  position:absolute;right:44px;top:50%;transform:translateY(-50%);
  font-size:11px;color:var(--accent);background:rgba(124,93,252,.15);
  padding:2px 8px;border-radius:999px;display:none;
}
.search-count.show{display:block}

.top-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.top-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(255,255,255,.04);color:#c7d1f4;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.top-btn:hover{background:rgba(124,93,252,.12);color:#fff}

/* ========== 主内容区 ========== */
.main{display:flex;flex:1;min-height:0;overflow:hidden}

/* ========== 侧边栏 - 树形结构 ========== */
.sidebar{
  width:var(--sidebar-width);flex-shrink:0;
  background:var(--bg-secondary);
  border-right:1px solid var(--border-color);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .2s ease;
}
.sidebar.collapsed{width:0;border-right:none}

.sidebar-header{
  padding:12px 14px 8px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-shrink:0;
}
.sidebar-header h3{font-size:13px;color:#f2f5ff;font-weight:600;display:flex;align-items:center;gap:6px}
.sidebar-header h3 i{color:var(--accent)}
.count{
  font-size:11px;color:#9aabc7;
  background:rgba(255,255,255,.06);
  padding:4px 10px;border-radius:999px;
}
.sidebar-actions{display:flex;gap:3px}
.sidebar-btn{
  width:28px;height:28px;border-radius:6px;border:none;
  background:rgba(255,255,255,.04);color:#8f98c8;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.sidebar-btn:hover{background:rgba(124,93,252,.15);color:#fff}

.tree-search{padding:0 12px 10px;flex-shrink:0}
.tree-search input{
  width:100%;padding:8px 12px;
  border-radius:8px;border:1px solid rgba(255,255,255,.08);
  background:rgba(22,33,70,.9);color:#eef2ff;font-size:13px;
}
.tree-search input:focus{border-color:var(--accent)}

/* 虚拟滚动容器 */
.tree-viewport{
  flex:1;min-height:0;overflow-y:auto;
  overflow-x:hidden;
  padding:0 6px 10px;
}
.tree-viewport::-webkit-scrollbar{width:5px}
.tree-viewport::-webkit-scrollbar-thumb{background:rgba(124,93,252,.3);border-radius:3px}
.tree-viewport::-webkit-scrollbar-track{background:transparent}

/* 虚拟滚动占位 - 防止抖动 */
.tree-virtual-spacer{
  position:relative;
  width:100%;
}

/* ========== 树形节点优化 ========== */
.tree-node{position:relative}
.tree-label{
  display:flex;align-items:center;gap:6px;
  padding:8px 10px;
  color:#c7d1f4;cursor:pointer;
  transition:background .12s,color .12s;
  border-radius:6px;margin:2px 4px;font-size:13px;
  user-select:none;
  min-height:var(--tree-node-height);
  box-sizing:border-box;
}
.tree-label:hover{background:rgba(124,93,252,.12);color:#fff}
.tree-label.active{color:#fff;background:rgba(124,93,252,.32)}

.tree-arrow{
  width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
  color:#8f9ecb;transition:transform .15s;
  font-size:10px;flex-shrink:0;
}
.tree-arrow.rotated{transform:rotate(90deg)}
.tree-arrow.empty{visibility:hidden}

.tree-icon{
  width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
}
.tree-icon.folder{color:#ffd166}
.tree-icon.file{color:var(--accent)}
.tree-icon.link{color:#4ade80}

.tree-name{
  flex:1;text-overflow:ellipsis;white-space:nowrap;
  overflow:hidden;font-size:13px;
}
.tree-shortcut{
  font-size:10px;color:#8f98c8;
  background:rgba(255,255,255,.06);
  padding:1px 5px;border-radius:3px;flex-shrink:0;
}
.tree-number{font-size:10px;color:#7a89b8;min-width:24px;flex-shrink:0;text-align:right}
.tree-type{font-size:9px;color:#f59e0b;background:rgba(245,158,11,.15);padding:1px 5px;border-radius:3px;flex-shrink:0}
.tree-coord{font-size:9px;color:#06b6d4;background:rgba(6,182,212,.15);padding:1px 5px;border-radius:3px;flex-shrink:0;max-width:90px;overflow:hidden;text-overflow:ellipsis}

.tree-children{display:none;flex-direction:column;position:relative}
.tree-children.open{display:flex}
.tree-children::before{content:'';position:absolute;left:18px;top:0;bottom:8px;width:1px;background:rgba(255,255,255,.06)}
.tree-node.level-2>.tree-label{padding-left:26px}
.tree-node.level-3>.tree-label{padding-left:42px}
.tree-node.level-4>.tree-label{padding-left:58px}

.highlight-match{background:rgba(124,93,252,.5);color:#fff;border-radius:2px;padding:0 1px}

/* ========== 分隔条 ========== */
.splitter{
  width:4px;background:transparent;cursor:col-resize;flex-shrink:0;
  transition:background .15s;
}
.splitter:hover,.splitter.active{background:rgba(124,93,252,.4)}

/* ========== 预览区 ========== */
.preview-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* ========== 工具栏 ========== */
.toolbar{
  height:50px;flex-shrink:0;
  padding:0 14px;
  display:flex;align-items:center;gap:4px;
  background:rgba(12,20,49,.96);
  border-bottom:1px solid var(--border-color);
  overflow-x:auto;
}
.toolbar::-webkit-scrollbar{height:3px}

.tool-group{display:flex;align-items:center;gap:3px;flex-shrink:0}
.tbtn{
  width:34px;height:34px;border-radius:8px;
  border:1px solid transparent;
  background:rgba(255,255,255,.04);color:#c7d1f4;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .12s;font-size:12px;
  flex-shrink:0;
}
.tbtn:hover{border-color:rgba(124,93,252,.35);background:rgba(124,93,252,.12);color:#fff}
.tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.tool-sep{width:1px;height:20px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 3px}

.color-picker-wrap{position:relative;flex-shrink:0}
.color-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;
  background:rgba(20,30,60,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:10px;padding:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.35);
  z-index:500;min-width:120px;display:none;
}
.color-dropdown.show{display:block}
.color-row{display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.color-row:last-child{margin-bottom:0}
.color-swatch{
  width:22px;height:22px;border-radius:5px;cursor:pointer;
  transition:transform .12s;border:2px solid transparent;
}
.color-swatch:hover{transform:scale(1.1)}
.color-swatch.selected{border-color:#fff}

.coord-display{
  display:flex;align-items:center;gap:6px;
  margin-left:auto;font-size:11px;color:#9fb4d8;flex-shrink:0;
}
.coord-display input{
  width:60px;padding:5px;border-radius:5px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,28,61,.95);color:#fff;text-align:center;font-size:11px;
}
.coord-display span{color:#7a89b8}

/* ========== 地图 ========== */
#map{flex:1;width:100%;background:#0a0f24}

.maplibregl-ctrl-group{background:rgba(12,20,49,.96)!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:10px!important}
.maplibregl-ctrl-group button{background:rgba(255,255,255,.04)!important;color:#c7d1f4!important}
.maplibregl-ctrl-group button:hover{background:rgba(124,93,252,.12)!important}

/* ========== 状态栏 ========== */
.status-bar{
  height:30px;flex-shrink:0;
  padding:0 16px;
  display:flex;align-items:center;gap:14px;
  font-size:11px;color:#9fb4d8;
  background:rgba(12,20,47,.94);
  border-top:1px solid var(--border-color);
}
.status-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;margin-right:5px}
.status-dot.offline{background:#f87171}
.status-bar span{cursor:default}
.status-bar span:hover{color:#c7d1f4}

/* ========== 弹窗 ========== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(6,11,28,.85);
  backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  width:min(680px,100%);
  background:rgba(17,25,55,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:14px;overflow:hidden;
  box-shadow:0 25px 60px rgba(0,0,0,.4);
  max-height:85vh;display:flex;flex-direction:column;
}
.modal-header{
  padding:14px 18px;
  border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.modal-header h3{font-size:15px;color:#fff;font-weight:600;display:flex;align-items:center;gap:8px}
.modal-header h3 i{color:var(--accent)}
.modal-close{
  background:none;border:none;color:#9fb4d8;cursor:pointer;
  padding:6px;border-radius:6px;
}
.modal-close:hover{background:rgba(124,93,252,.12);color:#fff}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-input{
  width:100%;padding:9px 12px;
  border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,28,61,.95);color:#fff;font-size:13px;margin-bottom:10px;
}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:7px;
  border:none;background:var(--accent);color:#fff;
  cursor:pointer;font-size:12px;
}
.modal-btn:hover{background:var(--accent-dark)}
.modal-btn.secondary{background:rgba(255,255,255,.08);color:#d2d8ff}
.modal-btn.secondary:hover{background:rgba(255,255,255,.12)}
.modal-btns{display:flex;gap:8px;margin-top:14px}

/* ========== 底图网格 ========== */
.basemap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.basemap-item{
  cursor:pointer;border-radius:8px;overflow:hidden;
  border:2px solid transparent;transition:all .15s;
  background:rgba(255,255,255,.04);
}
.basemap-item:hover{border-color:var(--accent)}
.basemap-item.active{border-color:var(--accent);background:rgba(124,93,252,.1)}
.basemap-preview{
  height:55px;background:#1a2342;
  display:flex;align-items:center;justify-content:center;
  color:#7a89b8;font-size:18px;
}
.basemap-item span{display:block;padding:5px;text-align:center;font-size:11px;color:#eef2ff}

/* ========== 搜索结果 ========== */
.search-results{max-height:450px;overflow-y:auto}
.search-result-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;background:rgba(255,255,255,.03);
  border-radius:8px;cursor:pointer;
  transition:all .12s;margin-bottom:6px;
}
.search-result-item:hover{background:rgba(124,93,252,.1)}
.search-result-item.selected{background:rgba(124,93,252,.15)}
.result-icon{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,93,252,.15);border-radius:7px;
  color:var(--accent);font-size:14px;flex-shrink:0;
}
.result-info{flex:1;min-width:0}
.result-name{font-size:13px;color:#eef2ff;font-weight:500;margin-bottom:3px}
.result-address{font-size:11px;color:#9fb4d8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-source{font-size:10px;color:var(--accent);margin-top:2px}
.result-coord{font-size:10px;color:#7a89b8;white-space:nowrap;flex-shrink:0}

/* ========== 图层列表 ========== */
.layer-list{max-height:450px;overflow-y:auto}
.layer-item{
  display:flex;align-items:center;gap:8px;
  padding:8px;background:rgba(255,255,255,.03);
  border-radius:7px;margin-bottom:6px;
  transition:background .12s;
}
.layer-item:hover{background:rgba(255,255,255,.06)}
.layer-item.selected{background:rgba(124,93,252,.12);border:1px solid rgba(124,93,252,.2)}
.layer-item .layer-icon{
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,93,252,.15);border-radius:5px;
  color:var(--accent);flex-shrink:0;
}
.layer-item .layer-info{flex:1;min-width:0}
.layer-item .layer-name{font-size:12px;color:#eef2ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .layer-type{font-size:10px;color:#9fb4d8}
.layer-item .layer-controls{display:flex;gap:3px}
.layer-item .layer-controls button{
  width:24px;height:24px;border-radius:5px;
  border:none;background:rgba(255,255,255,.04);color:#c7d1f4;cursor:pointer;
}
.layer-item .layer-controls button:hover{background:rgba(124,93,252,.12)}

/* ========== 样式面板 ========== */
.style-panel{display:flex;flex-direction:column;gap:12px}
.style-section{background:rgba(255,255,255,.03);border-radius:8px;padding:12px}
.style-section h4{font-size:12px;color:#eef2ff;margin-bottom:10px;font-weight:600}
.style-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.style-row:last-child{margin-bottom:0}
.style-label{font-size:11px;color:#9fb4d8}
.style-value{font-size:11px;color:#eef2ff}
.slider-wrap{display:flex;align-items:center;gap:8px}
.slider-wrap input{flex:1;accent-color:var(--accent)}
.slider-value{font-size:11px;color:#9fb4d8;min-width:32px;text-align:right}

/* ========== 测量结果 ========== */
.measure-result{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(17,25,55,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:10px;padding:10px 18px;
  display:none;align-items:center;gap:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  z-index:100;
}
.measure-result.show{display:flex}
.measure-result span{font-size:12px;color:#eef2ff}
.measure-result strong{color:var(--accent);font-size:14px}

/* ========== Toast ========== */
.toast{
  position:fixed;bottom:28px;right:28px;
  padding:10px 16px;border-radius:10px;
  background:rgba(124,93,252,.95);color:#fff;font-size:12px;
  box-shadow:0 15px 40px rgba(18,25,68,.35);
  opacity:0;transform:translateY(8px);
  transition:.2s ease;pointer-events:none;z-index:3000;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:rgba(34,197,94,.95)}
.toast.error{background:rgba(239,68,68,.95)}

/* ========== 快捷键 ========== */
.shortcut-hint{
  position:fixed;bottom:70px;right:26px;
  background:rgba(17,25,55,.95);
  border:1px solid rgba(124,93,252,.2);
  border-radius:12px;padding:12px 16px;
  font-size:11px;color:#9fb4d8;z-index:2500;
  display:none;min-width:160px;
}
.shortcut-hint.show{display:block}
.shortcut-hint h4{color:#fff;margin-bottom:6px;font-size:12px;font-weight:600}
.shortcut-hint div{display:flex;justify-content:space-between;gap:10px;padding:2px 0}
.shortcut-hint kbd{
  background:rgba(124,93,252,.2);padding:1px 6px;
  border-radius:4px;color:#c7d1f4;font-size:10px;
}

/* ========== 书签 ========== */
.bookmark-list{max-height:400px;overflow-y:auto}
.bookmark-item{
  display:flex;align-items:center;gap:8px;
  padding:8px;background:rgba(255,255,255,.03);
  border-radius:7px;margin-bottom:6px;cursor:pointer;
  transition:background .12s;
}
.bookmark-item:hover{background:rgba(124,93,252,.1)}
.bookmark-name{flex:1;font-size:12px;color:#eef2ff}
.bookmark-coord{font-size:10px;color:#9fb4d8}
.bookmark-del{
  background:none;border:none;color:#7a89b8;cursor:pointer;padding:4px;
  opacity:0;transition:opacity .12s;
}
.bookmark-item:hover .bookmark-del{opacity:1}
.bookmark-del:hover{color:#f87171}

/* ========== 树形显示设置 ========== */
.display-option{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:rgba(255,255,255,.03);
  border-radius:7px;cursor:pointer;transition:background .12s;
}
.display-option:hover{background:rgba(124,93,252,.08)}
.display-option input[type="checkbox"]{
  width:16px;height:16px;accent-color:var(--accent);
}
.display-option span{font-size:13px;color:#eef2ff}

/* ========== 加载动画 ========== */
.loading-spinner{
  width:40px;height:40px;border:3px solid rgba(124,93,252,.2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== 快速定位面板 ========== */
.quick-locate{
  position:absolute;top:10px;right:10px;
  background:rgba(17,25,55,.95);
  border:1px solid rgba(124,93,252,.2);
  border-radius:10px;padding:8px;
  z-index:100;min-width:180px;
  display:none;
}
.quick-locate.show{display:block}
.quick-locate-header{
  font-size:11px;color:#9fb4d8;margin-bottom:6px;padding:0 4px;
}
.quick-locate-item{
  padding:6px 8px;border-radius:5px;cursor:pointer;
  font-size:12px;color:#eef2ff;
  transition:background .12s;
}
.quick-locate-item:hover{background:rgba(124,93,252,.15)}
</style>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
</head>
<body>
<div class="container">
  <!-- 顶部栏 -->
  <header class="top-bar">
    <div class="logo">
      <i class="fas fa-globe-americas"></i>
      <span>意念地球</span>
    </div>
    
    <div class="search-global">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="搜索地名或坐标(经度,纬度)..." autocomplete="off">
      <span class="search-count" id="searchCount"></span>
      <button class="search-clear" id="searchClear" onclick="clearSearch()"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="top-actions">

class TrieNode {
  constructor() {
    this.children = new Map();
    this.places = [];
  }
}

class PlaceDatabase {
  constructor() {
    this.trie = new TrieNode();
    this.places = [];
    this.initialized = false;
  }
  
  init(places) {
    this.places = places;
    this.trie = new TrieNode();
    
    for (const p of places) {
      // 插入名称
      this.insert(p.name, p);
      // 插入别名
      if (p.alias) {
        for (const a of p.alias) {
          this.insert(a, p);
        }
      }
    }
    this.initialized = true;
  }
  
  insert(text, place) {
    let node = this.trie;
    for (const char of text.toLowerCase()) {
      if (!node.children.has(char)) {
        node.children.set(char, new TrieNode());
      }
      node = node.children.get(char);
      // 前缀匹配
      node.places.push(place);
    }
  }
  
  search(query) {
    if (!query) return [];
    query = query.toLowerCase();
    
    // 精确前缀匹配
    let node = this.trie;
    for (const char of query) {
      if (!node.children.has(char)) {
        return this.fuzzySearch(query);
      }
      node = node.children.get(char);
    }
    
    // 去重并按匹配长度排序
    const seen = new Set();
    const results = [];
    for (const p of node.places) {
      const key = p.name;
      if (!seen.has(key)) {
        seen.add(key);
        results.push(p);
      }
    }
    
    return results.slice(0, 15);
  }
  
  fuzzySearch(query) {
    const q = query.toLowerCase();
    const results = [];
    
    for (const p of this.places) {
      const name = p.name.toLowerCase();
      // 包含匹配
      if (name.includes(q) || p.alias?.some(a => a.toLowerCase().includes(q))) {
        results.push({ ...p, score: name.startsWith(q) ? 0 : 1 });
      }
    }
    
    return results.sort((a, b) => a.score - b.score).slice(0, 10);
  }
}

/* =====================================================
   智能定位
   ===================================================== */
async function detectUserLocation() {
  // 1. GPS
  if (navigator.geolocation) {
    try {
      const pos = await new Promise((res, rej) => {
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000, enableHighAccuracy: true });
      });
      return { lon: pos.coords.longitude, lat: pos.coords.latitude, name: 'GPS定位', source: 'gps' };
    } catch (e) {}
  }
  
  // 2. IP定位
  try {
    const res = await fetch('https://ipapi.co/json/', { timeout: 5000 });
    if (res.ok) {
      const d = await res.json();
      if (d.latitude && d.longitude) {
        return { lon: d.longitude, lat: d.latitude, name: d.city || d.country, source: 'ip' };
      }
    }
  } catch (e) {}
  
  // 3. 浏览器推断
  const lang = navigator.language || '';
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  
  if (lang.startsWith('zh')) return { lon: 116.3975, lat: 39.9087, name: '北京(默认)', source: 'inferred' };
  if (tz.includes('Taipei')) return { lon: 121.5654, lat: 25.0330, name: '台北', source: 'inferred' };
  if (tz.includes('Hong_Kong')) return { lon: 114.1694, lat: 22.3193, name: '香港', source: 'inferred' };
  if (tz.includes('Tokyo')) return { lon: 139.6917, lat: 35.6895, name: '东京', source: 'inferred' };
  if (tz.includes('Seoul')) return { lon: 126.9780, lat: 37.5665, name: '首尔', source: 'inferred' };
  
  return { lon: 116.3975, lat: 39.9087, name: '北京(默认)', source: 'default' };
}

/* =====================================================
   初始化
   ===================================================== */
async function init() {
  console.log('[Init] 开始初始化...');
  
  // 初始化地点数据库
  placeDB.init(BUILTIN_PLACES);
  
  // 加载显示设置
  loadDisplaySettings();
  
  // 加载书签
  loadBookmarks();
  
  try {
    await loadCatalog();
    console.log('[Init] 目录加载完成，节点数:', state.catalog.length);
    
    buildFlatNodes();
    console.log('[Init] 扁平化节点数:', state.flatNodes.length);
    
    // 先渲染树形
    updateVisibleNodes();
    initVirtualScroll();
    document.getElementById('treeCount').textContent = state.flatNodes.length + '项';
    
    initMap();
    initSplitter();
    initKeyboard();
    initSearchInput();
    initTreeSearch();
    
    // 默认展开
    setTimeout(() => {
      expandAll();
      updateVisibleNodes();
      console.log('[Init] 初始化完成');
    }, 100);
    
    // 并行检测位置，不影响地图加载
    detectUserLocation().then(userLoc => {
      CONFIG.mapCenter = [userLoc.lon, userLoc.lat];
      state.map.flyTo({ center: [userLoc.lon, userLoc.lat], zoom: 10, duration: 1000 });
      showToast('已定位: ' + userLoc.name, 'success');
    });
    
  } catch (e) {
    console.error('[Init] 初始化失败:', e);
    state.catalog = getDefaultCatalog();
    state.basemaps = getDefaultBasemaps();
    buildFlatNodes();
    updateVisibleNodes();
    initVirtualScroll();
    initMap();
    initSplitter();
    initKeyboard();
    initSearchInput();
    initTreeSearch();
    setTimeout(() => { expandAll(); updateVisibleNodes(); }, 100);
  }
  
  // 内存监控
  setInterval(updateMemUsage, 30000);
}

function loadBookmarks() {
  const saved = localStorage.getItem('geolibre_bookmarks');
  if (saved) {
    try {
      state.bookmarks = JSON.parse(saved);
    } catch (e) {
      state.bookmarks = [];
    }
  }
}

function saveBookmarks() {
  localStorage.setItem('geolibre_bookmarks', JSON.stringify(state.bookmarks));
}

function showBookmarkPanel() {
  const list = document.getElementById('bookmarkList');
  if (state.bookmarks.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#7a89b8"><i class="fas fa-bookmark" style="font-size:24px;opacity:.5"></i><p style="margin-top:8px">暂无书签</p></div>';
  } else {
    list.innerHTML = state.bookmarks.map((b, i) => `
      <div class="bookmark-item" onclick="flyToBookmark(${i})">
        <i class="fas fa-bookmark" style="color:var(--accent)"></i>
        <span class="bookmark-name">${b.name}</span>
        <span class="bookmark-coord">${b.lon.toFixed(2)}, ${b.lat.toFixed(2)}</span>
        <button class="bookmark-del" onclick="event.stopPropagation();deleteBookmark(${i})"><i class="fas fa-trash"></i></button>
      </div>
    `).join('');
  }
  document.getElementById('bookmarkModal').classList.add('show');
}

function addBookmark() {
  const center = state.map.getCenter();
  const zoom = Math.round(state.map.getZoom());
  const name = prompt('书签名称:', `视图 ${zoom}级`);
  if (!name) return;
  
  state.bookmarks.push({ name, lon: center.lng, lat: center.lat, zoom });
  saveBookmarks();
  showBookmarkPanel();
  showToast('书签已保存');
}

function flyToBookmark(index) {
  const b = state.bookmarks[index];
  if (b) {
    state.map.flyTo({ center: [b.lon, b.lat], zoom: b.zoom, duration: 800 });
    closeModal('bookmarkModal');
    showToast('已飞往: ' + b.name);
  }
}

function deleteBookmark(index) {
  state.bookmarks.splice(index, 1);
  saveBookmarks();
  showBookmarkPanel();
}

/* =====================================================
   虚拟滚动 - 树形结构优化核心
   ===================================================== */
function buildFlatNodes() {
  state.flatNodes = [];
  state.nodeMeta = new Map();
  let leafSeq = 0; // 叶节点序号
  
  function traverse(items, depth = 0, path = []) {
    for (const item of items) {
      const nodePath = [...path, item.id];
      const pathStr = nodePath.join('/');
      const hasChildren = item.children && item.children.length > 0;
      
      // 检查之前是否展开过
      const prevMeta = state.nodeMeta.get(pathStr);
      const isOpen = prevMeta?.isOpen !== undefined ? prevMeta.isOpen : (depth < 2);
      
      // 叶节点编号
      const seq = !hasChildren ? ++leafSeq : 0;
      
      const node = {
        ...item,
        depth,
        hasChildren,
        isOpen,
        nodePath,
        seq
      };
      
      const nodeIndex = state.flatNodes.length;
      state.flatNodes.push(node);
      state.nodeMeta.set(pathStr, { index: nodeIndex, item, isOpen, seq });
      
      // 递归处理子节点
      if (hasChildren) {
        traverse(item.children, depth + 1, nodePath);
      }
    }
  }
  
  traverse(state.catalog);
  console.log('[Tree] buildFlatNodes完成，总节点数:', state.flatNodes.length, '叶节点:', leafSeq);
}

function initVirtualScroll() {
  const viewport = document.getElementById('treeViewport');
  if (!viewport) {
    console.error('[Tree] treeViewport不存在');
    return;
  }
  
  viewport.addEventListener('scroll', () => {
    state.scrollTop = viewport.scrollTop;
    requestAnimationFrame(updateVisibleNodes);
  });
  
  console.log('[Tree] 虚拟滚动已初始化');
}

function updateVisibleNodes() {
  // 确保有数据
  if (!state.flatNodes || state.flatNodes.length === 0) {
    console.warn('[Tree] flatNodes为空，跳过渲染');
    return;
  }
  
  const viewport = document.getElementById('treeViewport');
  if (!viewport) {
    console.warn('[Tree] treeViewport不存在');
    return;
  }
  
  const viewportHeight = viewport.clientHeight;
  const scrollTop = state.scrollTop;
  
  const startIndex = Math.max(0, Math.floor(scrollTop / CONFIG.treeNodeHeight) - CONFIG.treeBufferSize);
  const endIndex = Math.min(
    state.flatNodes.length,
    Math.ceil((scrollTop + viewportHeight) / CONFIG.treeNodeHeight) + CONFIG.treeBufferSize
  );
  
  // 检查是否需要更新（首次渲染时跳过检查）
  if (state.visibleStart !== undefined && 
      startIndex === state.visibleStart && 
      endIndex === state.visibleEnd) return;
  state.visibleStart = startIndex;
  state.visibleEnd = endIndex;
  
  // 更新spacer高度
  const spacer = document.getElementById('treeSpacer');
  if (spacer) {
    spacer.style.height = (state.flatNodes.length * CONFIG.treeNodeHeight) + 'px';
  }
  
  // 构建可见节点
  const visibleNodes = state.flatNodes.slice(startIndex, endIndex);
  const topOffset = startIndex * CONFIG.treeNodeHeight;
  
  // 批量创建DOM
  let container = document.getElementById('treeContainer');
  if (!container) {
    container = createTreeContainer();
  }
  
  // 清空并重新渲染
  container.innerHTML = '';
  
  for (let i = 0; i < visibleNodes.length; i++) {
    const node = visibleNodes[i];
    const el = createTreeNodeElement(node);
    el.style.position = 'absolute';
    el.style.top = (topOffset + i * CONFIG.treeNodeHeight) + 'px';
    el.style.left = '0';
    el.style.right = '0';
    container.appendChild(el);
  }
  
  console.log('[Tree] 渲染完成，可见节点:', visibleNodes.length, '总节点:', state.flatNodes.length);
}

function createTreeContainer() {
  const spacer = document.getElementById('treeSpacer');
  if (!spacer) {
    console.error('[Tree] treeSpacer不存在');
    return document.createElement('div');
  }
  const container = document.createElement('div');
  container.id = 'treeContainer';
  container.style.cssText = 'position:relative;width:100%;height:' + (state.flatNodes.length * CONFIG.treeNodeHeight) + 'px;';
  spacer.appendChild(container);
  return container;
}

function createTreeNodeElement(node) {
  const d = state.treeDisplay;
  const li = document.createElement('div');
  li.className = 'tree-node level-' + node.depth;
  li.dataset.path = node.nodePath.join('/');
  
  const label = document.createElement('div');
  label.className = 'tree-label';
  
  // 箭头
  if (d.icon !== false) {
    const arrow = document.createElement('span');
    if (node.hasChildren) {
      arrow.className = 'tree-arrow' + (node.isOpen ? ' rotated' : '');
      arrow.innerHTML = '<i class="fas fa-chevron-right"></i>';
      arrow.onclick = (e) => { e.stopPropagation(); toggleNode(node.nodePath); };
    } else {
      arrow.className = 'tree-arrow empty';
    }
    label.appendChild(arrow);
  }
  
  // 编号
  if (d.number !== false && !node.hasChildren) {
    const num = document.createElement('span');
    num.className = 'tree-number';
    num.textContent = node.seq + '.';
    label.appendChild(num);
  }
  
  // 图标
  if (d.icon !== false) {
    const icon = document.createElement('span');
    icon.className = 'tree-icon ' + (node.hasChildren ? 'folder' : (node.action === 'link' ? 'link' : 'file'));
    icon.innerHTML = `<i class="fas ${node.icon || 'fa-file'}"></i>`;
    label.appendChild(icon);
  }
  
  // 名称
  if (d.name !== false) {
    const name = document.createElement('span');
    name.className = 'tree-name';
    name.textContent = node.label;
    name.title = node.description || '';
    label.appendChild(name);
  }
  
  // 快捷键
  if (d.shortcut !== false && node.shortcut) {
    const sc = document.createElement('span');
    sc.className = 'tree-shortcut';
    sc.textContent = node.shortcut;
    label.appendChild(sc);
  }
  
  // 类型
  if (d.type !== false && node.type) {
    const type = document.createElement('span');
    type.className = 'tree-type';
    type.textContent = node.type;
    label.appendChild(type);
  }
  
  // 坐标
  if (d.coord !== false && node.coord) {
    const coord = document.createElement('span');
    coord.className = 'tree-coord';
    coord.textContent = node.coord;
    label.appendChild(coord);
  }
  
  label.onclick = () => handleItemClick(node);
  li.appendChild(label);
  
  return li;
}

function toggleNode(nodePath) {
  const pathStr = nodePath.join('/');
  const node = state.flatNodes.find(n => n.nodePath.join('/') === pathStr);
  if (!node || !node.hasChildren) return;
  
  node.isOpen = !node.isOpen;
  state.nodeMeta.set(pathStr, { ...state.nodeMeta.get(pathStr), isOpen: node.isOpen });
  
  // 重建扁平结构
  buildFlatNodes();
  updateSpacerHeight();
  updateVisibleNodes();
}

function expandAll() {
  for (const node of state.flatNodes) {
    if (node.hasChildren) {
      node.isOpen = true;
      state.nodeMeta.set(node.nodePath.join('/'), { ...state.nodeMeta.get(node.nodePath.join('/') || {}), isOpen: true });
    }
  }
  buildFlatNodes();
  updateSpacerHeight();
  updateVisibleNodes();
  showToast('已展开全部');
}

function collapseAll() {

/* =====================================================
   树形搜索
   ===================================================== */
function initTreeSearch() {
  const input = document.getElementById('treeSearch');
  let timer = null;
  
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => filterTree(input.value), 150);
  });
}

function filterTree(keyword) {
  const q = keyword.toLowerCase().trim();
  
  if (!q) {
    // 显示全部
    buildFlatNodes();
    updateSpacerHeight();
    updateVisibleNodes();
    return;
  }
  
  // 匹配节点
  const matchedPaths = new Set();
  
  function searchItems(items, path = []) {
    for (const item of items) {
      const fullPath = [...path, item.id];
      const text = (item.label + ' ' + (item.description || '')).toLowerCase();
      
      if (text.includes(q)) {
        // 匹配：展开到根
        for (let i = 0; i < fullPath.length - 1; i++) {
          matchedPaths.add(fullPath.slice(0, i + 1).join('/'));
        }
        matchedPaths.add(fullPath.join('/'));
      }
      
      if (item.children) {
        searchItems(item.children, fullPath);
      }
    }
  }
  
  searchItems(state.catalog);
  
  // 应用过滤
  for (const node of state.flatNodes) {
    const pathStr = node.nodePath.join('/');
    node._hidden = !matchedPaths.has(pathStr);
  }
  
  // 重新渲染
  renderFilteredTree();
}

function renderFilteredTree() {
  const container = document.getElementById('treeContainer') || createTreeContainer();
  container.innerHTML = '';
  
  let visibleIndex = 0;
  const visibleNodes = state.flatNodes.filter(n => !n._hidden);
  
  for (const node of visibleNodes) {
    const el = createTreeNodeElement(node);
    el.style.position = 'absolute';
    el.style.top = (visibleIndex * CONFIG.treeNodeHeight) + 'px';
    el.style.left = '0';
    el.style.right = '0';
    
    // 高亮匹配文字
    const nameEl = el.querySelector('.tree-name');
    if (nameEl && document.getElementById('treeSearch').value) {
      const q = document.getElementById('treeSearch').value;
      const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      nameEl.innerHTML = nameEl.textContent.replace(regex, '<span class="highlight-match">$1</span>');
    }
    
    container.appendChild(el);
    visibleIndex++;
  }
  
  // 更新spacer
  const spacer = document.getElementById('treeSpacer');
  spacer.style.height = (visibleNodes.length * CONFIG.treeNodeHeight) + 'px';
  
  document.getElementById('treeCount').textContent = visibleNodes.length + '项';
}

function handleItemClick(item) {
  // 更新选中状态
  document.querySelectorAll('.tree-label.active').forEach(el => el.classList.remove('active'));
  
  const actions = {
    basemap: showBasemapSelector,
    locate: showLocateModal,
    fullscreen: toggleFullscreen,
    measureDistance: () => startMeasure('distance'),
    measureArea: () => startMeasure('area'),
    addGeoJSON: promptGeoJSONUrl,
    addTileLayer: promptTileUrl,
    layerList: showLayerPanel,
    layerStyle: showStylePanel,
    drawPoint: () => startDraw('point'),
    drawLine: () => startDraw('line'),
    drawPoly: () => startDraw('polygon'),
    drawMarker: () => startDraw('marker'),
    buffer: startBuffer,
    heatmap: () => startHeatmap(),
    wms: promptWMSUrl,
    local: promptLocalFile,
    gpx: promptLocalFile,
    exportGeoJSON: exportGeoJSON,
    exportPNG: exportMapImage,
    bookmark: showBookmarkPanel,
  };
  
  if (item.action === 'link' && item.url) {
    window.open(item.url, '_blank');
    return;
  }
  
  if (item.action === 'navigation') {
    resetMapView();
    return;
  }
  
  const action = actions[item.action];
  if (action) {
    action();
  } else if (item.children?.length) {
    toggleNode(item.nodePath);
  } else {
    showToast(item.description || item.label, 'info');
  }
}

function createStyle(basemap) {
  return {
    version: 8,
    sources: {
      basemap: {
        type: 'raster',
        tiles: [basemap.url],
        tileSize: basemap.type === 'wmts' ? 256 : 256,
        attribution: basemap.attribution || ''
      }
    },
    layers: [{ id: 'basemap', type: 'raster', source: 'basemap' }]
  };
}

function handleMapClick(e) {
  if (state.measureMode) {
    state.measurePoints.push([e.lngLat.lng, e.lngLat.lat]);
    addMeasureMarker(e.lngLat);
    if (state.measurePoints.length >= 2) calculateMeasure();
  }
  
  if (state.drawMode) {
    handleDrawClick(e.lngLat);
  }
}

function handleMapDblClick(e) {

/* =====================================================
   搜索 - 核心优化
   ===================================================== */
function initSearchInput() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('searchClear');
  let timer = null;
  
  console.log('[Search] initSearchInput 执行, input:', input);
  
  if (!input) {
    console.error('[Search] searchInput 元素不存在!');
    return;
  }
  
  input.addEventListener('input', () => {
    const val = input.value.trim();
    clear.classList.toggle('show', val.length > 0);
    
    clearTimeout(timer);
    timer = setTimeout(() => {
      console.log('[Search] input事件触发, 值:', val);
      if (val.length >= 1) {
        performSearch(val);
      }
    }, 200);
  });
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      clearTimeout(timer);
      console.log('[Search] Enter键按下');
      performSearch(input.value.trim());
    }
  });
  
  console.log('[Search] 事件监听器已绑定');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchCount').classList.remove('show');
  clearSearchMarkers();
}

async function performSearch(query) {
  if (!query.trim()) return;
  
  const q = query.trim();
  const results = [];
  console.log('[Search] 开始搜索:', q);
  
  // 1. 坐标解析
  const coordMatch = q.match(/^(-?\d+\.?\d*)\s*[,，]\s*(-?\d+\.?\d*)$/);
  if (coordMatch) {
    const lng = parseFloat(coordMatch[1]);
    const lat = parseFloat(coordMatch[2]);
    if (lng >= -180 && lng <= 180 && lat >= -90 && lat <= 90) {
      console.log('[Search] 坐标定位:', lng, lat);
      flyToPoint(lng, lat, 14);
      addSearchMarker(lng, lat, `坐标 ${lng.toFixed(4)}, ${lat.toFixed(4)}`);
      showToast('已定位坐标');
      return;
    }
  }
  
  // 2. 内置数据库搜索（毫秒级）
  const builtinResults = placeDB.search(q);
  console.log('[Search] 内置结果:', builtinResults.length);
  results.push(...builtinResults.map(p => ({ ...p, source: '内置' })));
  
  // 3. 在线搜索（使用代理或备用源）
  showToast('搜索中...');
  
  // 使用多个在线源
  const onlineSources = [
    { name: '高德', url: `https://restapi.amap.com/v3/place/text?keywords=${encodeURIComponent(q)}&offset=5&key=54066b3bb68e022f6caef92bee26cd25&extensions=base` },
    { name: 'OSM', url: `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5&accept-language=zh-CN` },
    { name: 'Komoot', url: `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5` }
  ];
  
  for (const src of onlineSources) {
    try {
      const res = await fetch(src.url, {
        headers: { 'User-Agent': 'GeoLibre/1.0' }
      });
      if (res.ok) {
        const data = await res.json();
        let items = [];
        if (src.name === '高德') {
          items = (data.pois || []).map(p => ({
            lon: parseFloat(p.location.split(',')[0]),
            lat: parseFloat(p.location.split(',')[1]),
            name: p.name || '',
            address: (p.address || p.pname || '') + ',' + (p.cityname || ''),
            type: p.type?.split(';')[0] || 'poi',
            source: '高德'
          }));
        } else if (src.name === 'OSM') {
          items = data.map(r => ({
            lon: parseFloat(r.lon || 0),
            lat: parseFloat(r.lat || 0),
            name: (r.display_name || '').split(',').slice(0, 2).join(','),
            address: (r.display_name || '').substring(0, 60),
            type: getTypeLabel(r.type || 'poi'),
            source: 'OSM'
          }));
        } else {
          items = (data.features || []).map(r => ({
          address: (r.display_name || '').substring(0, 60) || r.properties?.name,
          type: getTypeLabel(r.type || r.properties?.osm_type || 'poi'),
          source: src.name
        })).filter(r => r.lon && r.lat);
        results.push(...osmResults);
        if (osmResults.length > 0) break; // 优先使用有结果的源
      }
    } catch (e) {
      console.log('[Search] ' + src.name + ' 失败:', e.message);
    }
  }
  
  console.log('[Search] 合并后结果:', results.length);
  
  // 去重
  const seen = new Set();
  const unique = [];
  for (const r of results) {
    const key = `${r.lon.toFixed(3)},${r.lat.toFixed(3)}`;
    if (!seen.has(key)) {
      seen.add(key);
      unique.push(r);
    }
  }
  
  console.log('[Search] 去重后:', unique.length);
  
  if (unique.length === 0) {
    showToast('未找到: ' + q, 'error');
    return;
  }
  
  // 显示结果
  displaySearchResults(unique.slice(0, 12));
  
  // 地图标记
  clearSearchMarkers();
  unique.slice(0, 8).forEach((r, i) => {
    addSearchMarker(r.lon, r.lat, r.name, i + 1);
  });
  
  // 飞向第一个
  console.log('[Search] 飞往:', unique[0].name, unique[0].lon, unique[0].lat);
  flyToPoint(unique[0].lon, unique[0].lat, 12);
}

    'building': '建筑', 'place_of_worship': '宗教',
    'park': '公园', 'hospital': '医院', 'school': '学校',
    'restaurant': '餐厅', 'hotel': '酒店',
    'airport': '机场', 'station': '站点',
    'river': '河流', 'lake': '湖泊', 'mountain': '山峰',

function toggleLayerVis(index) {

    state.map.setLayoutProperty(layer.id, 'visibility', layer.visible ? 'visible' : 'none');
  } catch (e) {}
  
  showLayerPanel();

function zoomToLayerItem(index) {
  const layer = state.layers[index];
  if (layer.bounds) {
    state.map.fitBounds(layer.bounds, { padding: 50 });
    closeModal('layerModal');
  }
}

function showLayerStylePanel(index) {
  state.selectedLayerIndex = index;
  closeModal('layerModal');
  showStylePanel();
}

function removeLayerItem(index) {
  if (!confirm('确定删除图层?')) return;
  
  const layer = state.layers[index];
  try {
    if (state.map.getLayer(layer.id)) state.map.removeLayer(layer.id);
    if (state.map.getSource(layer.id)) state.map.removeSource(layer.id);
    if (layer.marker) layer.marker.remove();
  } catch (e) {}
  
  state.layers.splice(index, 1);
  if (state.selectedLayerIndex === index) state.selectedLayerIndex = undefined;
  updateCounts();
  showLayerPanel();
  showToast('图层已删除');
}

function updateCounts() {
  document.getElementById('layerCountStat').textContent = '图层: ' + state.layers.length;
  let total = 0;
  state.layers.forEach(l => total += l.count || 0);
  document.getElementById('featureCountStat').textContent = '要素: ' + total;
}

   数据加载
   ===================================================== */
function promptGeoJSONUrl() {
  const url = prompt('请输入GeoJSON URL:');
  if (url) loadGeoJSONFromUrl(url);
}

async function loadGeoJSONFromUrl(url) {
  try {
    showToast('加载中...');
    const res = await fetch(url);
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    const name = url.split('/').pop().replace(/\.(json|geojson)$/i, '') || 'GeoJSON';
    addGeoJSONLayer(data, name);
  } catch (e) {
    showToast('加载失败', 'error');
  }
}

function promptTileUrl() {
  const url = prompt('请输入瓦片URL:\n示例: https://example.com/{z}/{x}/{y}.png');
  if (url) addTileLayer(url, '瓦片_' + Date.now());
}

function addTileLayer(url, name) {
  const id = 'tile_' + Date.now();
  try {
    state.map.addSource(id, { type: 'raster', tiles: [url], tileSize: 256 });
    state.map.addLayer({ id: id, type: 'raster', source: id });
    state.layers.push({ id, name, type: '瓦片', visible: true, count: 0 });
    updateCounts();
    showToast('已添加: ' + name);
  } catch (e) {
    showToast('添加失败', 'error');
  }
}

function promptWMSUrl() {
  const url = prompt('请输入WMS服务URL:');
  if (url) {
    showToast('WMS加载中...');
    addTileLayer(url, 'WMS图层');
  }
}

function promptLocalFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,.geojson,.kml,.gpx';
  
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const name = file.name.replace(/\.(json|geojson)$/i, '');
      addGeoJSONLayer(data, name);
    } catch (e) {
      showToast('文件格式错误', 'error');
    }
  };
  
  input.click();
}

function addGeoJSONLayer(data, name) {
  const id = 'layer_' + Date.now();
  const features = data.features || [];
  
  try {
    state.map.addSource(id, { type: 'geojson', data: data });
    
    const type = features[0]?.geometry?.type || 'point';
    let layerType = 'circle';
    let paint = { 'circle-color': state.currentColor, 'circle-radius': state.currentRadius };
    
    if (type.includes('Line')) {
      layerType = 'line';
      paint = { 'line-color': state.currentColor, 'line-width': state.currentStrokeWidth };
    } else if (type.includes('Polygon')) {
      layerType = 'fill';
      paint = { 'fill-color': state.currentColor, 'fill-opacity': state.currentOpacity };
    }
    
    state.map.addLayer({ id: id, type: layerType, source: id, paint: paint });
    
    // 计算边界
    let bounds = null;
    if (features.length) {
      const coords = features.flatMap(f => f.geometry?.coordinates || []);
      if (coords.length) {
        bounds = coords.reduce((b, c) => [
          [Math.min(b[0][0], c[0]), Math.min(b[0][1], c[1])],
          [Math.max(b[1][0], c[0]), Math.max(b[1][1], c[1])]
        ], [[180, 90], [-180, -90]]);
      }
    }
    
    state.layers.push({ id, name, type: 'GeoJSON', visible: true, count: features.length, bounds, data });
    updateCounts();
    
    if (bounds) {
      state.map.fitBounds(bounds, { padding: 50 });
    }
    
    showToast('已加载: ' + name + ' (' + features.length + '要素)');
  } catch (e) {
    showToast('添加失败: ' + e.message, 'error');
  }
}

/* =====================================================
   绘制
   ===================================================== */
function startDraw(type) {
  if (state.drawMode === type) {
    cancelDraw();
    return;
  }
  
  state.drawMode = type;
  state.drawPoints = [];
  
  document.querySelectorAll('.toolbar .tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnDrawPoint')?.classList.toggle('active', type === 'point');
  document.getElementById('btnDrawLine')?.classList.toggle('active', type === 'line');
  document.getElementById('btnDrawPoly')?.classList.toggle('active', type === 'polygon');
  
  showToast('绘制: 点击添加' + (type === 'point' ? '' : ',双击完成'));
}

function handleDrawClick(lngLat) {
  if (!state.drawMode) return;
  
  state.drawPoints.push([lngLat.lng, lngLat.lat]);
  
  new maplibregl.Marker({ color: state.currentColor })
    .setLngLat([lngLat.lng, lngLat.lat])
    .addTo(state.map);
  
  if (state.drawMode === 'point') {
    const name = prompt('标注名称:', '标注_' + Date.now());
    if (name) {
      const marker = new maplibregl.Marker({ color: state.currentColor })
        .setLngLat([lngLat.lng, lngLat.lat])
        .setPopup(new maplibregl.Popup().setHTML(`<b>${name}</b>`))
        .addTo(state.map);
      
      state.layers.push({ id: 'marker_' + Date.now(), name, type: '标注', visible: true, count: 1, marker });
      updateCounts();
    }
    cancelDraw();
  }
}

function finishDraw() {
  if (!state.drawPoints.length) return;
  
  let geojson;
  if (state.drawMode === 'line') {
    geojson = { type: 'Feature', geometry: { type: 'LineString', coordinates: state.drawPoints } };
  } else if (state.drawMode === 'polygon') {
    geojson = { type: 'Feature', geometry: { type: 'Polygon', coordinates: [state.drawPoints.concat([state.drawPoints[0]])] } };
  }
  
  if (geojson) {
    addGeoJSONLayer({ type: 'FeatureCollection', features: [geojson] }, '绘制_' + Date.now());
  }
  
  cancelDraw();
}

function cancelDraw() {
  state.drawMode = null;
  state.drawPoints = [];
  document.querySelectorAll('.toolbar .tbtn').forEach(b => b.classList.remove('active'));
}

/* =====================================================
   测量
   ===================================================== */
function startMeasure(type) {
  if (state.measureMode === type) {
    cancelMeasure();
    return;
  }
  
  state.measureMode = type;
  state.measurePoints = [];
  
  document.getElementById('btnMeasureDist')?.classList.toggle('active', type === 'distance');
  document.getElementById('btnMeasureArea')?.classList.toggle('active', type === 'area');
  document.getElementById('measureResult').classList.add('show');
  document.getElementById('measureLabel').textContent = type === 'distance' ? '距离:' : '面积:';
  
  showToast('点击测量' + (type === 'distance' ? '距离' : '面积'));
}

function addMeasureMarker(lngLat) {
  new maplibregl.Marker({ color: '#fbbf24' })
    .setLngLat([lngLat.lng, lngLat.lat])
    .addTo(state.map);
}

function calculateMeasure() {
  const pts = state.measurePoints;
  if (pts.length < 2) return;
  
  if (state.measureMode === 'distance') {
    let dist = 0;
    for (let i = 0; i < pts.length - 1; i++) {
      dist += turf.distance(turf.point(pts[i]), turf.point(pts[i + 1]), { units: 'meters' });
    }
    const unit = dist > 1000 ? (dist / 1000).toFixed(2) + ' km' : dist.toFixed(0) + ' m';
    document.getElementById('measureValue').textContent = unit;
  } else if (state.measureMode === 'area') {
    if (pts.length >= 3) {
      const poly = turf.polygon([[...pts, pts[0]]]);
      const area = turf.area(poly);
      const unit = area > 1000000 ? (area / 1000000).toFixed(2) + ' km²' : area.toFixed(0) + ' m²';
      document.getElementById('measureValue').textContent = unit;
    }
  }
}

function clearMeasure() {
  cancelMeasure();
  document.getElementById('measureResult').classList.remove('show');
}

function cancelMeasure() {
  state.measureMode = null;
  state.measurePoints = [];
  document.getElementById('btnMeasureDist')?.classList.remove('active');
  document.getElementById('btnMeasureArea')?.classList.remove('active');
}

/* =====================================================
   缓冲区 & 热力图
   ===================================================== */
function startBuffer() {
  const dist = prompt('缓冲区半径(米):', '1000');
  if (!dist) return;
  
  if (state.selectedLayerIndex !== undefined && state.layers[state.selectedLayerIndex]?.data) {
    const layer = state.layers[state.selectedLayerIndex];
    try {
      const buffered = (layer.data.features || []).map(f => {
        try {
          return turf.buffer(f, parseFloat(dist), { units: 'meters' });
        } catch (e) { return null; }
      }).filter(Boolean);
      
      if (buffered.length) {
        addGeoJSONLayer({ type: 'FeatureCollection', features: buffered }, '缓冲区(' + dist + 'm)');
        showToast('缓冲区完成: ' + buffered.length + '个');
      }
    } catch (e) {
      showToast('缓冲区失败', 'error');
    }
  } else {
    showToast('请先选择图层', 'error');
  }
}

function startHeatmap() {
  if (!state.layers.length) {
    showToast('请先添加数据', 'error');
    return;
  }
  
  const layer = state.layers[state.layers.length - 1];
  const id = 'heatmap_' + Date.now();
  
  try {
    state.map.addSource(id, { type: 'geojson', data: layer.data });
    state.map.addLayer({
      id: id,
      type: 'heatmap',
      source: id,
      paint: {
        'heatmap-weight': 1,
        'heatmap-intensity': 1,
        'heatmap-color': [
          'interpolate', ['linear'], ['heatmap-density'],
          0, 'rgba(0,0,0,0)',
          0.2, 'rgb(0,100,255)',
          0.4, 'rgb(0,255,128)',
          0.6, 'rgb(255,220,0)',
          0.8, 'rgb(255,100,0)',
          1, 'rgb(255,0,0)'
        ],
        'heatmap-radius': 30,
        'heatmap-opacity': 0.8
      }
    });
    
    state.layers.push({ id, name: '热力图', type: '热力', visible: true, count: layer.count || 0 });
    updateCounts();
    showToast('热力图已生成');
  } catch (e) {
    showToast('热力图失败', 'error');
  }
}

/* =====================================================
   样式
   ===================================================== */
function showStylePanel() {
  const colorRow = document.getElementById('styleColorRow');
  colorRow.innerHTML = ['#7c5dfc', '#ef4444', '#22c55e', '#3b82f6', '#f59e0b', '#ec4899'].map(c => `
    <div class="color-swatch ${c === state.currentColor ? 'selected' : ''}" style="background:${c}" data-color="${c}" onclick="selectStyleColor(this)"></div>
  `).join('');
  
  document.getElementById('styleOpacity').value = state.currentOpacity * 100;
  document.getElementById('styleOpacityVal').textContent = Math.round(state.currentOpacity * 100) + '%';
  document.getElementById('styleStrokeWidth').value = state.currentStrokeWidth;
  document.getElementById('styleStrokeWidthVal').textContent = state.currentStrokeWidth + 'px';
  document.getElementById('styleRadius').value = state.currentRadius;
  document.getElementById('styleRadiusVal').textContent = state.currentRadius + 'px';
  
  document.getElementById('styleModal').classList.add('show');
  
  // 事件
  document.getElementById('styleOpacity').oninput = (e) => {
    state.currentOpacity = e.target.value / 100;
    document.getElementById('styleOpacityVal').textContent = e.target.value + '%';
    applyStyleToSelected();
  };
  document.getElementById('styleStrokeWidth').oninput = (e) => {
    state.currentStrokeWidth = parseInt(e.target.value);
    document.getElementById('styleStrokeWidthVal').textContent = e.target.value + 'px';
    applyStyleToSelected();
  };
  document.getElementById('styleRadius').oninput = (e) => {
    state.currentRadius = parseInt(e.target.value);
    document.getElementById('styleRadiusVal').textContent = e.target.value + 'px';
    applyStyleToSelected();
  };
}

function selectStyleColor(el) {
  document.querySelectorAll('#styleColorRow .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  state.currentColor = el.dataset.color;
  document.getElementById('currentColorSwatch').style.background = state.currentColor;
  applyStyleToSelected();
}

function applyStyleToSelected() {
  const idx = state.selectedLayerIndex;
  if (idx === undefined) return;
  
  const layer = state.layers[idx];
  if (!layer || !state.map.getLayer(layer.id)) return;
  
  try {
    const type = state.map.getLayer(layer.id).type;
    if (type === 'fill') {
      state.map.setPaintProperty(layer.id, 'fill-color', state.currentColor);
      state.map.setPaintProperty(layer.id, 'fill-opacity', state.currentOpacity);
    } else if (type === 'line') {
      state.map.setPaintProperty(layer.id, 'line-color', state.currentColor);
      state.map.setPaintProperty(layer.id, 'line-width', state.currentStrokeWidth);
    } else if (type === 'circle') {
      state.map.setPaintProperty(layer.id, 'circle-color', state.currentColor);
      state.map.setPaintProperty(layer.id, 'circle-radius', state.currentRadius);
    }
  } catch (e) {}
}

/* =====================================================
   颜色选择器
   ===================================================== */
function toggleColorPicker() {
  document.getElementById('colorDropdown').classList.toggle('show');
}

function selectColor(el) {
  document.querySelectorAll('#colorDropdown .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  state.currentColor = el.dataset.color;
  document.getElementById('currentColorSwatch').style.background = state.currentColor;
  document.getElementById('colorDropdown').classList.remove('show');
}

/* =====================================================
   导出
   ===================================================== */
function exportGeoJSON() {
  if (state.layers.length === 0) {
    showToast('无图层可导出', 'error');
    return;
  }
  
  const allFeatures = state.layers.flatMap(l => l.data?.features || []);
  const geojson = { type: 'FeatureCollection', features: allFeatures };
  
  const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geolibre_export_' + Date.now() + '.geojson';
  a.click();
  URL.revokeObjectURL(url);
  
  showToast('已导出 ' + allFeatures.length + ' 个要素');
}

function exportMapImage() {
  showToast('正在生成图片...');
  
  try {
    const canvas = state.map.getCanvas();
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = 'geolibre_map_' + Date.now() + '.png';
    a.click();
    showToast('图片已导出');
  } catch (e) {
    showToast('导出失败', 'error');
  }
}

/* =====================================================
   GPS
   ===================================================== */
function getLocation() {
  if (!navigator.geolocation) {
    showToast('浏览器不支持定位', 'error');
    return;
  }
  
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { longitude, latitude } = pos.coords;
      state.map.flyTo({ center: [longitude, latitude], zoom: 14 });
      addSearchMarker(longitude, latitude, 'GPS定位');
    },
    (e) => showToast('定位失败: ' + e.message, 'error')
  );
}

function toggleGPSTrack() {
  if (state.gpsEnabled) {
    if (state.gpsWatch) {
      navigator.geolocation.clearWatch(state.gpsWatch);
      state.gpsWatch = null;
    }
    state.gpsEnabled = false;
    document.getElementById('btnGPSTrack')?.classList.remove('active');
    showToast('GPS追踪已停止');
  } else {
    if (!navigator.geolocation) {
      showToast('浏览器不支持定位', 'error');
      return;
    }
    
    state.gpsWatch = navigator.geolocation.watchPosition(
      (pos) => {
        const { longitude, latitude } = pos.coords;
        
        if (state.gpsMarker) {
          state.gpsMarker.setLngLat([longitude, latitude]);
        } else {
          state.gpsMarker = new maplibregl.Marker({ color: '#22c55e' })
            .setLngLat([longitude, latitude])
            .addTo(state.map);
        }
        
        state.gpsTrack.push([longitude, latitude]);
        
        if (state.gpsTrack.length > 1) {
          if (state.map.getSource('gps_track')) {
            state.map.getSource('gps_track').setData({
              type: 'Feature',
              geometry: { type: 'LineString', coordinates: state.gpsTrack }
            });
          } else {
            state.map.addSource('gps_track', {
              type: 'geojson',
              data: { type: 'Feature', geometry: { type: 'LineString', coordinates: state.gpsTrack } }
            });
            state.map.addLayer({
              id: 'gps_track_line',
              type: 'line',
              source: 'gps_track',
              paint: { 'line-color': '#22c55e', 'line-width': 3 }
            });
          }
        }
      },
      (e) => showToast('追踪失败', 'error'),
      { enableHighAccuracy: true }
    );
    
    state.gpsEnabled = true;
    document.getElementById('btnGPSTrack')?.classList.add('active');
    showToast('GPS追踪已启动');
  }
}

/* =====================================================
   地图操作
   ===================================================== */
function resetMapView() {
  state.map.flyTo({ center: CONFIG.mapCenter, zoom: CONFIG.mapZoom, duration: 800 });
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function showShortcuts() {
  document.getElementById('shortcutHint').classList.toggle('show');
}

/* =====================================================
   弹窗
   ===================================================== */
function closeModal(id) {
  document.getElementById(id)?.classList.remove('show');
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
  document.getElementById('shortcutHint').classList.remove('show');
  document.getElementById('colorDropdown')?.classList.remove('show');
  cancelDraw();
  cancelMeasure();
}

/* =====================================================
   Toast
   ===================================================== */
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show' + (type ? ' ' + type : '');
  
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

/* =====================================================
   内存监控
   ===================================================== */
function updateMemUsage() {
  if (performance.memory) {
    const used = (performance.memory.usedJSHeapSize / 1048576).toFixed(0);
    document.getElementById('memUsage').textContent = '内存: ' + used + 'MB';
  }
}

/* =====================================================
   启动
   ===================================================== */
init();
</script>
