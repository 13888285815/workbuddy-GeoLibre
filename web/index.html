<!DOCTYPE html>
<html lang="zh-CN">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意念地球 - GeoLibre</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
:root{
  --accent:#7c5dfc;
  --accent-dark:#6b4fe6;
  --bg-primary:rgba(12,21,55,.94);
  --bg-secondary:rgba(10,18,46,.96);
  --text-primary:#eef2ff;
  --text-secondary:#9fb4d8;
  --border-color:rgba(255,255,255,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0f1639;color:#e6e8f5}

.container{display:flex;flex-direction:column;height:100vh}

/* 顶部栏 */
.top-bar{
  height:56px;flex-shrink:0;
  background:var(--bg-primary);
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:#fff}
.logo i{font-size:22px;color:var(--accent)}
.logo span{color:#8f98c8;font-size:12px;font-weight:400}

.search-global{position:relative;flex:1;min-width:0;max-width:420px}
.search-global input{
  width:100%;padding:10px 14px 10px 42px;
  border-radius:999px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,29,70,.9);color:#f4f6ff;font-size:14px;
}
.search-global input:focus{border-color:var(--accent)}
.search-global i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8f98c8}

.top-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.top-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(255,255,255,.04);color:#c7d1f4;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.top-btn:hover{background:rgba(124,93,252,.12);color:#fff}

/* 主内容 */
.main{display:flex;flex:1;min-height:0;overflow:hidden}

/* 侧边栏 */
.sidebar{
  width:300px;flex-shrink:0;
  background:var(--bg-secondary);
  border-right:1px solid var(--border-color);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar.collapsed{width:0;border-right:none}
.sidebar-header{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.sidebar-header h3{font-size:13px;color:#f2f5ff;font-weight:600}
.count{
  font-size:11px;color:#9aabc7;
  background:rgba(255,255,255,.06);
  padding:4px 10px;border-radius:999px;
}
.sidebar-actions{display:flex;gap:4px}
.sidebar-btn{
  width:28px;height:28px;border-radius:6px;border:none;
  background:rgba(255,255,255,.04);color:#8f98c8;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
}
.sidebar-btn:hover{background:rgba(124,93,252,.15);color:#fff}

.tree-search{padding:0 14px 12px}
.tree-search input{
  width:100%;padding:9px 12px;
  border-radius:10px;border:1px solid rgba(255,255,255,.08);
  background:rgba(22,33,70,.9);color:#eef2ff;font-size:13px;
}
.tree-search input:focus{border-color:var(--accent)}

.tree-wrap{flex:1;min-height:0;overflow-y:auto;padding:4px 6px 14px}
.tree-wrap::-webkit-scrollbar{width:6px}
.tree-wrap::-webkit-scrollbar-thumb{background:rgba(124,93,252,.3);border-radius:3px}

/* 树形结构 */
.tree-node{position:relative;margin:1px 0}
.tree-label{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;
  color:#c7d1f4;cursor:pointer;
  transition:background .15s,color .15s;
  border-radius:8px;margin:2px 4px;font-size:13px;
  user-select:none;min-height:38px;
}
.tree-label:hover{background:rgba(124,93,252,.12);color:#fff}
.tree-label.active{color:#fff;background:rgba(124,93,252,.32)}

.tree-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#8f9ecb;transition:transform .2s;font-size:9px;flex-shrink:0}
.tree-arrow.rotated{transform:rotate(90deg)}
.tree-arrow.empty{visibility:hidden}

.tree-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:13px}
.tree-icon.folder{color:#ffd166}
.tree-icon.file{color:var(--accent)}
.tree-icon.link{color:#4ade80}

.tree-name{flex:1;text-overflow:ellipsis;white-space:nowrap;overflow:hidden}
.tree-shortcut{font-size:10px;color:#8f98c8;background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;flex-shrink:0}
.tree-children{display:none;flex-direction:column;position:relative}
.tree-children.open{display:flex}
.tree-children::before{content:'';position:absolute;left:20px;top:0;bottom:6px;width:1px;background:rgba(255,255,255,.06)}
.tree-node.level-2>.tree-label{padding-left:28px}
.tree-node.level-3>.tree-label{padding-left:44px}
.highlight-match{background:rgba(124,93,252,.45);color:#fff;border-radius:3px;padding:0 2px}

/* 分隔条 */
.splitter{width:4px;background:transparent;cursor:col-resize;flex-shrink:0}
.splitter:hover{background:rgba(124,93,252,.3)}

/* 预览区 */
.preview-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* 工具栏 */
.toolbar{
  height:52px;flex-shrink:0;
  padding:0 16px;
  display:flex;align-items:center;gap:6px;
  background:rgba(12,20,49,.96);
  border-bottom:1px solid var(--border-color);
  overflow-x:auto;
}
.toolbar::-webkit-scrollbar{height:3px}

.tool-group{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tbtn{
  width:36px;height:36px;border-radius:9px;
  border:1px solid transparent;
  background:rgba(255,255,255,.04);color:#c7d1f4;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:13px;
}
.tbtn:hover{border-color:rgba(124,93,252,.35);background:rgba(124,93,252,.12);color:#fff}
.tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.tool-sep{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 4px}

.color-picker-wrap{position:relative;flex-shrink:0}
.color-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;
  background:rgba(20,30,60,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:12px;padding:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.35);
  z-index:500;min-width:140px;display:none;
}
.color-dropdown.show{display:block}
.color-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.color-row:last-child{margin-bottom:0}
.color-swatch{
  width:24px;height:24px;border-radius:6px;cursor:pointer;
  transition:transform .15s;border:2px solid transparent;
}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:#fff}

.coord-display{
  display:flex;align-items:center;gap:6px;
  margin-left:auto;font-size:12px;color:#9fb4d8;flex-shrink:0;
}
.coord-display input{
  width:64px;padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,28,61,.95);color:#fff;text-align:center;font-size:11px;
}

/* 地图 */
#map{flex:1;width:100%}

.maplibregl-ctrl-group{background:rgba(12,20,49,.96)!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:10px!important}
.maplibregl-ctrl-group button{background:rgba(255,255,255,.04)!important;color:#c7d1f4!important}
.maplibregl-ctrl-group button:hover{background:rgba(124,93,252,.12)!important}

/* 状态栏 */
.status-bar{
  height:32px;flex-shrink:0;
  padding:0 20px;
  display:flex;align-items:center;gap:16px;
  font-size:11px;color:#9fb4d8;
  background:rgba(12,20,47,.94);
  border-top:1px solid var(--border-color);
}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:6px}
.status-dot.offline{background:#f87171}

/* 弹窗 */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(6,11,28,.85);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  width:min(600px,100%);
  background:rgba(17,25,55,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:16px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
  max-height:80vh;display:flex;flex-direction:column;
}
.modal-header{
  padding:16px 20px;
  border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.modal-header h3{font-size:16px;color:#fff;font-weight:600}
.modal-close{
  background:none;border:none;color:#9fb4d8;cursor:pointer;
  padding:6px;border-radius:6px;
}
.modal-close:hover{background:rgba(124,93,252,.12);color:#fff}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-input{
  width:100%;padding:10px 14px;
  border-radius:8px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,28,61,.95);color:#fff;font-size:14px;margin-bottom:12px;
}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:8px;
  border:none;background:var(--accent);color:#fff;
  cursor:pointer;font-size:13px;
}
.modal-btn:hover{background:var(--accent-dark)}
.modal-btn.secondary{background:rgba(255,255,255,.08);color:#d2d8ff}
.modal-btn.secondary:hover{background:rgba(255,255,255,.12)}
.modal-btns{display:flex;gap:10px;margin-top:16px}

/* 底图网格 */
.basemap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.basemap-item{
  cursor:pointer;border-radius:10px;overflow:hidden;
  border:2px solid transparent;transition:all .2s;
  background:rgba(255,255,255,.04);
}
.basemap-item:hover{border-color:var(--accent)}
.basemap-item.active{border-color:var(--accent)}
.basemap-preview{
  height:60px;background:#1a2342;
  display:flex;align-items:center;justify-content:center;
  color:#7a89b8;font-size:20px;
}
.basemap-item span{display:block;padding:6px;text-align:center;font-size:11px;color:#eef2ff}

/* 搜索结果 */
.search-results{max-height:400px;overflow-y:auto}
.search-result-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:rgba(255,255,255,.03);
  border-radius:10px;cursor:pointer;
  transition:all .15s;margin-bottom:8px;
}
.search-result-item:hover{background:rgba(124,93,252,.08)}
.result-icon{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,93,252,.15);border-radius:8px;
  color:var(--accent);font-size:16px;
}
.result-info{flex:1;min-width:0}
.result-name{font-size:14px;color:#eef2ff;font-weight:500;margin-bottom:4px}
.result-address{font-size:12px;color:#9fb4d8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-source{font-size:10px;color:var(--accent)}
.result-coord{font-size:10px;color:#7a89b8;white-space:nowrap}

/* 图层列表 */
.layer-list{max-height:400px;overflow-y:auto}
.layer-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;background:rgba(255,255,255,.03);
  border-radius:8px;margin-bottom:8px;
}
.layer-item .layer-icon{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,93,252,.15);border-radius:6px;
  color:var(--accent);
}
.layer-item .layer-info{flex:1;min-width:0}
.layer-item .layer-name{font-size:13px;color:#eef2ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .layer-type{font-size:11px;color:#9fb4d8}
.layer-item .layer-controls{display:flex;gap:4px}
.layer-item .layer-controls button{
  width:26px;height:26px;border-radius:6px;
  border:none;background:rgba(255,255,255,.04);color:#c7d1f4;cursor:pointer;
}
.layer-item .layer-controls button:hover{background:rgba(124,93,252,.12)}

/* 样式面板 */
.style-panel{display:flex;flex-direction:column;gap:16px}
.style-section{background:rgba(255,255,255,.03);border-radius:10px;padding:14px}
.style-section h4{font-size:13px;color:#eef2ff;margin-bottom:12px;font-weight:600}
.style-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.style-row:last-child{margin-bottom:0}
.style-label{font-size:12px;color:#9fb4d8}
.style-value{font-size:12px;color:#eef2ff}
.slider-wrap{display:flex;align-items:center;gap:10px}
.slider-wrap input{flex:1;accent-color:var(--accent)}
.slider-value{font-size:11px;color:#9fb4d8;min-width:36px;text-align:right}

/* 测量结果显示 */
.measure-result{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(17,25,55,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:12px;padding:12px 20px;
  display:none;align-items:center;gap:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  z-index:100;
}
.measure-result.show{display:flex}
.measure-result span{font-size:13px;color:#eef2ff}
.measure-result strong{color:var(--accent);font-size:15px}

/* Toast */
.toast{
  position:fixed;bottom:30px;right:30px;
  padding:12px 18px;border-radius:12px;
  background:rgba(124,93,252,.95);color:#fff;font-size:13px;
  box-shadow:0 20px 60px rgba(18,25,68,.35);
  opacity:0;transform:translateY(10px);
  transition:.25s ease;pointer-events:none;z-index:3000;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:rgba(34,197,94,.95)}
.toast.error{background:rgba(239,68,68,.95)}

/* 快捷键 */
.shortcut-hint{
  position:fixed;bottom:80px;right:28px;
  background:rgba(17,25,55,.95);
  border:1px solid rgba(124,93,252,.2);
  border-radius:14px;padding:14px 18px;
  font-size:12px;color:#9fb4d8;z-index:2500;
  display:none;min-width:180px;
}
.shortcut-hint.show{display:block}
.shortcut-hint h4{color:#fff;margin-bottom:8px;font-size:13px;font-weight:600}
.shortcut-hint div{display:flex;justify-content:space-between;gap:12px;padding:3px 0}
.shortcut-hint kbd{
  background:rgba(124,93,252,.2);padding:2px 8px;
  border-radius:5px;color:#c7d1f4;font-size:11px;
}

/* 文件上传 */
.file-upload{
  border:2px dashed rgba(124,93,252,.3);
  border-radius:12px;padding:30px;
  text-align:center;cursor:pointer;
  transition:all .2s;
}
.file-upload:hover{border-color:var(--accent);background:rgba(124,93,252,.05)}
.file-upload i{font-size:32px;color:#7a89b8;margin-bottom:10px}
.file-upload p{font-size:13px;color:#9fb4d8}
.file-upload input{display:none}

/* 书签 */
.bookmark-list{max-height:400px;overflow-y:auto}
.bookmark-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;background:rgba(255,255,255,.03);
  border-radius:8px;margin-bottom:8px;cursor:pointer;
}
.bookmark-item:hover{background:rgba(124,93,252,.08)}
.bookmark-item i{color:var(--accent);font-size:14px}
.bookmark-name{flex:1;font-size:13px;color:#eef2ff}
.bookmark-coord{font-size:11px;color:#9fb4d8}
</style>
</head>
<body>
<div class="container">
  <header class="top-bar">
    <div class="logo">
      <i class="fas fa-globe-americas"></i>
      <span>意念地球</span>
    </div>
    
    <div class="search-global">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="搜索地名或坐标(经度,纬度)..." onkeydown="if(event.key==='Enter')performSearch(this.value)">
    </div>
    
    <div class="top-actions">
      <button class="top-btn" onclick="toggleSidebar()" title="切换侧边栏"><i class="fas fa-columns"></i></button>
      <button class="top-btn" onclick="toggleFullscreen()" title="全屏(F)"><i class="fas fa-expand"></i></button>
      <button class="top-btn" onclick="showShortcuts()" title="快捷键(?)"><i class="fas fa-keyboard"></i></button>
      <button class="top-btn" onclick="showBookmarkPanel()" title="书签"><i class="fas fa-bookmark"></i></button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-folder-tree"></i> 功能目录</h3>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="count" id="treeCount">0项</span>
          <div class="sidebar-actions">
            <button class="sidebar-btn" onclick="expandAll()" title="展开全部"><i class="fas fa-angle-double-down"></i></button>
            <button class="sidebar-btn" onclick="collapseAll()" title="收起全部"><i class="fas fa-angle-double-up"></i></button>
          </div>
        </div>
      </div>
      
      <div class="tree-search">
        <input type="text" id="treeSearch" placeholder="搜索功能..." oninput="debounceFilter(this.value,200)">
      </div>
      
      <div class="tree-wrap" id="treeContainer"></div>
    </aside>
    
    <div class="splitter" id="splitter"></div>

    <div class="preview-area">
      <div class="toolbar">
        <!-- 常用地图操作 -->
        <div class="tool-group">
          <button class="tbtn" onclick="if(state.map)state.map.zoomIn()" title="放大(+)"><i class="fas fa-plus"></i></button>
          <button class="tbtn" onclick="if(state.map)state.map.zoomOut()" title="缩小(-)"><i class="fas fa-minus"></i></button>
          <button class="tbtn" onclick="resetMapView()" title="重置视图(R)"><i class="fas fa-home"></i></button>
        </div>
        
        <span class="tool-sep"></span>
        
        <!-- 定位 -->
        <div class="tool-group">
          <button class="tbtn" onclick="getLocation()" title="GPS定位"><i class="fas fa-location-crosshairs"></i></button>
          <button class="tbtn" onclick="showLocateModal()" title="坐标定位(G)"><i class="fas fa-crosshairs"></i></button>
          <button class="tbtn" onclick="getLocationInfo()" title="位置信息"><i class="fas fa-info-circle"></i></button>
        </div>
        
        <span class="tool-sep"></span>
        
        <!-- 底图切换 -->
        <div class="tool-group">
          <button class="tbtn" onclick="switchBasemapByIndex(0)" title="街道图"><i class="fas fa-road"></i></button>
          <button class="tbtn" onclick="switchBasemapByIndex(4)" title="卫星图"><i class="fas fa-satellite"></i></button>
          <button class="tbtn" onclick="switchBasemapByIndex(5)" title="暗色图"><i class="fas fa-moon"></i></button>
          <button class="tbtn" onclick="showBasemapSelector()" title="更多底图"><i class="fas fa-layer-group"></i></button>
        </div>
        
        <span class="tool-sep"></span>
        
        <!-- 常用工具 -->
        <div class="tool-group">
          <button class="tbtn" onclick="promptLocalFile()" title="打开文件"><i class="fas fa-folder-open"></i></button>
          <button class="tbtn" onclick="showLayerPanel()" title="图层列表(L)"><i class="fas fa-list"></i></button>
          <button class="tbtn" onclick="startDraw('marker')" title="添加标注"><i class="fas fa-tag"></i></button>
        </div>
        
        <span class="tool-sep"></span>
        
        <!-- 测量 -->
        <div class="tool-group">
          <button class="tbtn" id="btnMeasureDist" onclick="startMeasure('distance')" title="距离测量"><i class="fas fa-ruler-combined"></i></button>
          <button class="tbtn" id="btnMeasureArea" onclick="startMeasure('area')" title="面积测量"><i class="fas fa-vector-square"></i></button>
        </div>
        
        <span class="tool-sep"></span>
        
        <!-- 绘制 -->
        <div class="tool-group">
          <button class="tbtn" id="btnDrawPoint" onclick="startDraw('point')" title="绘制点(P)"><i class="fas fa-map-marker-alt"></i></button>
          <button class="tbtn" id="btnDrawLine" onclick="startDraw('line')" title="绘制线"><i class="fas fa-route"></i></button>
          <button class="tbtn" id="btnDrawPoly" onclick="startDraw('polygon')" title="绘制面"><i class="fas fa-draw-polygon"></i></button>
        </div>
        
        <span class="tool-sep"></span>
        
        <!-- 分析 -->
        <div class="tool-group">
          <button class="tbtn" onclick="startBuffer()" title="缓冲区"><i class="fas fa-circle"></i></button>

/* =====================================================
   智能定位 - 获取用户位置
   ===================================================== */
async function detectUserLocation() {
  const DEFAULT_LOCATIONS = [
    { name: '北京', lon: 116.3975, lat: 39.9087, reason: '首都/默认' },
    { name: '上海', lon: 121.4737, lat: 31.2304, reason: '默认' },
    { name: '华盛顿', lon: -77.0369, lat: 38.9072, reason: '默认(西方)' }
  ];
  
  // 优先级1: GPS精确定位
  if (navigator.geolocation) {
    try {
      const position = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000, enableHighAccuracy: true });
      });
      return {
        lon: position.coords.longitude,
        lat: position.coords.latitude,
        name: 'GPS定位',
        accuracy: position.coords.accuracy,
        source: 'gps'
      };
    } catch (e) {
      console.log('GPS获取失败:', e.message);
    }
  }
  
  // 优先级2: IP地址定位 (使用ipapi.co)
  try {
    const res = await fetch('https://ipapi.co/json/', { timeout: 5000 });
    if (res.ok) {
      const data = await res.json();
      if (data.latitude && data.longitude) {
        return {
          lon: data.longitude,
          lat: data.latitude,
          name: data.city ? `${data.city}, ${data.country_name}` : data.country_name,
          city: data.city,
          country: data.country_name,
          region: data.region,
          source: 'ip'
        };
      }
    }
  } catch (e) {
    console.log('IP定位失败:', e.message);
  }
  
  // 优先级3: 通过浏览器语言/时区推断
  const lang = navigator.language || 'zh-CN';
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  
  // 中文环境默认北京
  if (lang.startsWith('zh')) {
    return { lon: 116.3975, lat: 39.9087, name: '北京(推断)', reason: '中文环境', source: 'inferred' };
  }
  
  // 台湾
  if (tz.includes('Taipei') || tz.includes('Taiwan')) {
    return { lon: 121.5654, lat: 25.0330, name: '台北(时区)', reason: '台湾时区', source: 'inferred' };
  }
  
  // 香港
  if (tz.includes('Hong_Kong')) {
    return { lon: 114.1694, lat: 22.3193, name: '香港(时区)', reason: '香港时区', source: 'inferred' };
  }
  
  // 日本
  if (tz.includes('Tokyo') || lang.startsWith('ja')) {
    return { lon: 139.6917, lat: 35.6895, name: '东京(时区)', reason: '日本时区', source: 'inferred' };
  }
  
  // 韩国
  if (tz.includes('Seoul') || lang.startsWith('ko')) {
    return { lon: 126.9780, lat: 37.5665, name: '首尔(时区)', reason: '韩国时区', source: 'inferred' };
  }
  
  // 新加坡
  if (tz.includes('Singapore')) {
    return { lon: 103.8198, lat: 1.3521, name: '新加坡(时区)', reason: '新加坡时区', source: 'inferred' };
  }
  
  // 东南亚
  if (['th', 'ms', 'id', 'vi', 'tl'].some(l => lang.startsWith(l))) {
    return { lon: 103.8198, lat: 1.3521, name: '新加坡(东南亚)', reason: '东南亚语言', source: 'inferred' };
  }
  
  // 欧洲
  if (['de', 'fr', 'es', 'it', 'pt', 'nl', 'ru', 'pl'].some(l => lang.startsWith(l))) {
    return { lon: 13.4050, lat: 52.5200, name: '柏林(推断)', reason: '欧洲时区', source: 'inferred' };
  }
  
  // 美洲英文
  if (['en-US', 'en-CA'].includes(lang) || tz.includes('America/New_York')) {
    return { lon: -74.0060, lat: 40.7128, name: '纽约(推断)', reason: '美国英语', source: 'inferred' };
  }
  
  // 默认北京
  return { lon: 116.3975, lat: 39.9087, name: '北京(默认)', reason: '国际惯例', source: 'default' };
}

/* =====================================================

async function init() {

    await loadCatalog();
    renderTree(state.catalog);
    document.getElementById('treeCount').textContent = countItems(state.catalog) + '项';
    
    // 智能定位
    const userLoc = await detectUserLocation();
    CONFIG.mapCenter = [userLoc.lon, userLoc.lat];
    console.log('定位成功:', userLoc);
    
    initMap(userLoc);
    initSplitter();
    initKeyboard();
    loadBookmarks();
    
    // 树形结构默认展开
    setTimeout(expandAll, 100);
    
    // 显示定位信息
    showToast('已定位到: ' + userLoc.name, 'success');
    
  } catch (e) {
    console.error('初始化失败:', e);
    state.catalog = getDefaultCatalog();
    state.basemaps = getDefaultBasemaps();
    renderTree(state.catalog);
    initMap();
    setTimeout(expandAll, 100);
  }
}

/* =====================================================
   目录加载
   ===================================================== */
async function loadCatalog() {
  const res = await fetch(CONFIG.catalogUrl);
  if (!res.ok) throw new Error();
  const data = await res.json();
  
  state.catalog = data.catalog || [];
  state.basemaps = data.basemaps?.length ? data.basemaps : getDefaultBasemaps();
  
  if (data.defaultConfig) {
    CONFIG.mapCenter = data.defaultConfig.mapCenter || CONFIG.mapCenter;
    CONFIG.mapZoom = data.defaultConfig.mapZoom || CONFIG.mapZoom;
  }
  
  if (data.appName) {
    document.querySelector('.logo span').textContent = data.appName;
    document.title = data.appName + ' - GeoLibre';
  }
}

function getDefaultCatalog() {
  return [
    { id: 'basic', label: '基础功能', icon: 'fa-map', children: [
      { id: 'basemap', label: '底图切换', icon: 'fa-layer-group', action: 'basemap', shortcut: 'B' },
      { id: 'locate', label: '坐标定位', icon: 'fa-crosshairs', action: 'locate', shortcut: 'G' }
    ]}
  ];
}

function getDefaultBasemaps() {
  return [
    { name: 'OpenStreetMap', url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png' },
    { name: 'CartoDB亮色', url: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png' },
    { name: 'CartoDB暗色', url: 'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png' },
    { name: 'Esri卫星', url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }
  ];
}

/* =====================================================
   树形结构
   ===================================================== */
function renderTree(items, parentEl = null) {
  const container = document.getElementById('treeContainer');
  if (!parentEl) container.innerHTML = '';
  
  items.forEach(item => {
    const node = createTreeNode(item);
    (parentEl || container).appendChild(node);
  });
}

function createTreeNode(item) {
  const li = document.createElement('div');
  li.className = 'tree-node';
  li.dataset.id = item.id;
  
  const hasChildren = item.children?.length;
  const isLink = item.action === 'link' && item.url;
  
  const label = document.createElement('div');
  label.className = 'tree-label';
  
  // 箭头
  const arrow = document.createElement('span');
  if (hasChildren) {
    arrow.className = 'tree-arrow';
    arrow.innerHTML = '<i class="fas fa-chevron-right"></i>';
    arrow.onclick = (e) => { e.stopPropagation(); toggleNode(li, arrow); };
  } else {
    arrow.className = 'tree-arrow empty';
  }
  label.appendChild(arrow);
  
  // 图标
  const icon = document.createElement('span');
  icon.className = 'tree-icon ' + (hasChildren ? 'folder' : (isLink ? 'link' : 'file'));
  icon.innerHTML = `<i class="fas ${item.icon || 'fa-file'}"></i>`;
  label.appendChild(icon);
  
  // 名称
  const name = document.createElement('span');
  name.className = 'tree-name';
  name.textContent = item.label;
  name.title = item.description || '';
  label.appendChild(name);
  
  // 快捷键
  if (item.shortcut) {
    const sc = document.createElement('span');
    sc.className = 'tree-shortcut';
    sc.textContent = item.shortcut;
    label.appendChild(sc);
  }
  
  label.onclick = () => handleItemClick(item, label);
  li.appendChild(label);
  
  // 子节点
  if (hasChildren) {
    const children = document.createElement('div');
    children.className = 'tree-children';
    item.children.forEach(child => children.appendChild(createTreeNode(child)));
    li.appendChild(children);
  }
  
  return li;
}

function toggleNode(li, arrow) {
  const children = li.querySelector('.tree-children');
  if (!children) return;
  
  const isOpen = children.classList.toggle('open');
  arrow.classList.toggle('rotated', isOpen);
  arrow.querySelector('i').className = isOpen ? 'fas fa-chevron-down' : 'fas fa-chevron-right';
}

function expandAll() {
  document.querySelectorAll('.tree-children').forEach(ch => ch.classList.add('open'));
  document.querySelectorAll('.tree-arrow:not(.empty)').forEach(a => { a.classList.add('rotated'); a.querySelector('i').className = 'fas fa-chevron-down'; });
  showToast('已展开全部');
}

function collapseAll() {
  document.querySelectorAll('.tree-children').forEach(ch => ch.classList.remove('open'));
  document.querySelectorAll('.tree-arrow.rotated').forEach(a => { a.classList.remove('rotated'); a.querySelector('i').className = 'fas fa-chevron-right'; });
  showToast('已收起全部');
}

function debounceFilter(keyword, delay) {
  if (state.filterTimer) clearTimeout(state.filterTimer);
  state.filterTimer = setTimeout(() => filterCatalog(keyword), delay);
}

function filterCatalog(keyword) {
  const nodes = document.querySelectorAll('.tree-node');
  const lower = keyword.toLowerCase().trim();
  
  nodes.forEach(node => {
    const label = node.querySelector('.tree-name');
    if (!label) return;
    
    const text = label.textContent.toLowerCase();
    const match = !lower || text.includes(lower);
    node.style.display = match ? '' : 'none';
    
    // 高亮
    if (lower && match) {
      const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      label.innerHTML = label.textContent.replace(regex, '<span class="highlight-match">$1</span>');
    } else {
      label.innerHTML = label.textContent;
    }
  });
  
  // 父节点
  document.querySelectorAll('.tree-children').forEach(ch => {
    const visible = Array.from(ch.children).some(c => c.style.display !== 'none');
    ch.style.display = visible ? '' : 'none';
  });
  
  // 自动展开匹配
  if (lower) {
    nodes.forEach(node => {
      if (node.style.display !== 'none') {
        let parent = node.parentElement;
        while (parent?.classList.contains('tree-children')) {
          parent.classList.add('open');
          parent.previousElementSibling?.querySelector('.tree-arrow')?.classList.add('rotated');
          parent = parent.parentElement;
        }
      }
    });
  }
}

function countItems(items) {
  let count = 0;
  items.forEach(item => {
    count++;
    if (item.children) count += countItems(item.children);
  });
  return count;
}

/* =====================================================
   功能点击处理 - 完整实现
   ===================================================== */
function handleItemClick(item, labelEl) {
  // 选中效果
  document.querySelectorAll('.tree-label.active').forEach(el => el.classList.remove('active'));
  labelEl?.classList.add('active');
  
  // 外部链接
  if (item.action === 'link' && item.url) {
    window.open(item.url, '_blank');
    return;
  }
  
  // 功能映射
  const actions = {
    // 基础
    basemap: showBasemapSelector,
    locate: showLocateModal,
    navigation: resetMapView,
    fullscreen: toggleFullscreen,
    
    // 测量
    measureDistance: () => startMeasure('distance'),
    measureArea: () => startMeasure('area'),
    buffer: startBuffer,
    heatmap: () => startHeatmap(),
    
    // 图层
    addGeoJSON: promptGeoJSONUrl,
    addTileLayer: promptTileUrl,
    layerList: showLayerPanel,
    layerStyle: showStylePanel,
    layerOpacity: showStylePanel,
    layerVisible: showLayerPanel,
    layerDelete: showLayerPanel,
    layerZoom: zoomToSelectedLayer,
    
    // 数据
    geojson: promptGeoJSONUrl,
    wms: promptWMSUrl,
    local: promptLocalFile,
    gpx: promptLocalFile,
    
    // 绘制
    drawPoint: () => startDraw('point'),
    drawLine: () => startDraw('line'),
    drawPoly: () => startDraw('polygon'),
    drawRect: () => startDraw('rect'),
    drawCircle: () => startDraw('circle'),
    drawMarker: () => startDraw('marker'),
    edit: () => startEdit(),
    delete: () => deleteSelected(),
    
    // 分析
    overlay: showOverlayPanel,
    clip: showClipPanel,
    intersect: showIntersectPanel,
    union: showUnionPanel,
    dissolve: showDissolvePanel,
    
    // 样式
    fillColor: showStylePanel,
    strokeColor: showStylePanel,
    strokeWidth: showStylePanel,
    opacity: showStylePanel,
    radius: showStylePanel,
    label: showLabelPanel,
    
    // 导出
    exportGeoJSON: exportGeoJSON,
    exportPNG: exportMapImage,
    
    // 书签
    bookmark: showBookmarkPanel,
    
    // 其他
    getLocation: getLocation
  };
  
  const action = actions[item.action];
  if (action) {
    action();
  } else if (hasChildren(item)) {
    const li = labelEl.parentElement;
    const arrow = li.querySelector('.tree-arrow');
    if (arrow) toggleNode(li, arrow);
  } else {
    showToast(item.description || '功能: ' + item.label, 'info');
  }
}

function hasChildren(item) {
  return item.children?.length > 0;
}

   地图初始化
   ===================================================== */
function initMap(userLoc) {
  state.map = new maplibregl.Map({
    container: 'map',
    style: createStyle(state.basemaps[0]),
    center: CONFIG.mapCenter,
    zoom: CONFIG.mapZoom,
    minZoom: 3,
    maxZoom: 18
  });
  
  state.map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');
  state.map.addControl(new maplibregl.ScaleControl({ maxWidth: 100 }), 'bottom-left');
  
  state.map.on('mousemove', (e) => {
    document.getElementById('lngDisplay').value = e.lngLat.lng.toFixed(4);
    document.getElementById('latDisplay').value = e.lngLat.lat.toFixed(4);
  });
  
  state.map.on('zoom', () => {
    document.getElementById('zoomLevel').textContent = '缩放级别: ' + Math.round(state.map.getZoom());
  });
  
  state.map.on('load', () => {
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('mapStatus').textContent = '在线';
    
    // 地图加载后显示用户位置
    if (userLoc) {
      addUserLocationMarker(userLoc);
    }
  });
  
  state.map.on('error', () => {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('mapStatus').textContent = '离线';
  });
  
  // 点击地图
  state.map.on('click', handleMapClick);
}

function addUserLocationMarker(loc) {
  const el = document.createElement('div');
  el.innerHTML = `
    <div style="
      width:40px;height:40px;
      background:rgba(124,93,252,0.3);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      border:3px solid #7c5dfc;
      box-shadow:0 0 20px rgba(124,93,252,0.5);
      animation:pulse-user 2s infinite;
    ">
      <div style="
        width:14px;height:14px;
        background:#fff;border-radius:50%;
      "></div>
    </div>
  `;
  
  const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([loc.lon, loc.lat])
    .setPopup(new maplibregl.Popup({ offset: 25 }).setHTML(`
      <div style="font-size:12px;padding:4px">
        <b>当前位置</b><br>
        <span style="color:#666">${loc.name}</span><br>
        <small style="color:#999">来源: ${loc.source}</small>
      </div>
    `))
    .addTo(state.map);
  
  // 添加脉冲动画样式
  const style = document.createElement('style');
  style.textContent = `
    @keyframes pulse-user {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  `;
  document.head.appendChild(style);
  
  // 更新状态栏显示
  document.getElementById('mapStatus').innerHTML = `<span class="status-dot"></span>${loc.name}`;
}

function createStyle(basemap) {
  return {
    version: 8,
    sources: { basemap: { type: 'raster', tiles: [basemap.url], tileSize: 256 } },
    layers: [{ id: 'basemap', type: 'raster', source: 'basemap' }]
  };
}

function handleMapClick(e) {
  // 测量模式
  if (state.measureMode) {
    state.measurePoints.push([e.lngLat.lng, e.lngLat.lat]);
    addMeasureMarker(e.lngLat);
    if (state.measurePoints.length >= 2) {
      calculateMeasure();
    }
    return;
  }
  
  // 绘制模式
  if (state.drawMode) {
    handleDrawClick(e.lngLat);
    return;
  }
}

function initSplitter() {

  splitter.addEventListener('mousedown', () => { resizing = true; document.body.style.cursor = 'col-resize'; });

}

/* =====================================================
   键盘快捷键
   ===================================================== */
function initKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    
    const shortcuts = {
      'f': toggleFullscreen,
      'r': resetMapView,
      'b': showBasemapSelector,
      'l': showLayerPanel,
      'g': showLocateModal,
      '/': () => document.getElementById('searchInput').focus(),
      '+': () => state.map?.zoomIn(),
      '=': () => state.map?.zoomIn(),
      '-': () => state.map?.zoomOut(),
      '?': showShortcuts,
      'escape': () => {
        closeModal('basemapModal');
        closeModal('searchModal');
        closeModal('layerModal');
        closeModal('styleModal');
        closeModal('bookmarkModal');
        document.getElementById('shortcutHint').classList.remove('show');
        document.getElementById('colorDropdown').classList.remove('show');
        cancelDraw();
        cancelMeasure();
      }
    };
    
    if (shortcuts[e.key.toLowerCase()]) {
      e.preventDefault();
      shortcuts[e.key.toLowerCase()]();
    }
  });
}

async function performSearch(query) {
  if (!query.trim()) return;
  
  const q = query.trim().toLowerCase();
  const results = [];
  
  // 1. 坐标搜索
  const coordMatch = q.match(/^(-?\d+\.?\d*)\s*[,，]\s*(-?\d+\.?\d*)$/);
  if (coordMatch) {
    const lng = parseFloat(coordMatch[1]);
    const lat = parseFloat(coordMatch[2]);
    if (lng >= -180 && lng <= 180 && lat >= -90 && lat <= 90) {
      flyToPoint(lng, lat, 14);
      addSearchMarker(lng, lat, query);
      showToast('已定位到坐标');
      return;
    }
  }
  
  showToast('搜索中...');
  
  // 2. 内置地点库搜索（快速、离线可用）
  const builtinResults = searchBuiltinPlaces(q);
  if (builtinResults.length > 0) {
    results.push(...builtinResults);
  }
  
  // 3. 在线搜索（OSM Nominatim）
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=8&accept-language=zh-CN`, {
      headers: { 'User-Agent': 'GeoLibre/1.0' }
    });
    if (res.ok) {
      const data = await res.json();
      const osmResults = data.map(r => ({
        lon: parseFloat(r.lon),
        lat: parseFloat(r.lat),
        name: r.display_name.split(',').slice(0, 2).join(','),
        address: r.display_name.substring(0, 80),
        type: getTypeLabel(r.type),
        source: 'OSM'
      })).filter(r => r.lon && r.lat);
      results.push(...osmResults);
    }
  } catch (e) { console.log('OSM搜索失败', e); }
  
  // 4. Komoot Photon 搜索
  try {
    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lang=zh`);
    if (res.ok) {
      const data = await res.json();
      if (data.features) {
        const photonResults = data.features.map(f => ({
          lon: f.geometry.coordinates[0],
          lat: f.geometry.coordinates[1],
          name: f.properties.name || '地点',
          address: [f.properties.city, f.properties.country].filter(Boolean).join(', ') || '',
          type: f.properties.type || '地点',
          source: 'Komoot'
        })).filter(r => r.lon && r.lat);
        results.push(...photonResults);
      }
    }
  } catch (e) { console.log('Komoot搜索失败', e); }
  
  // 去重
  const unique = [];
  const seen = new Set();
  results.forEach(r => {
    const key = `${r.lon.toFixed(3)},${r.lat.toFixed(3)}`;
    if (!seen.has(key)) {
      seen.add(key);
      unique.push(r);
    }
  });
  
  if (unique.length === 0) {
    showToast('未找到: ' + query, 'error');
    return;
  }
  
  // 显示所有结果
  clearSearchMarkers();
  unique.slice(0, 10).forEach((r, i) => {
    addSearchMarker(r.lon, r.lat, r.name, i + 1);
  });
  
  // 飞到第一个结果
  flyToPoint(unique[0].lon, unique[0].lat, 12);
  
  // 显示列表
  displaySearchResults(unique.slice(0, 10));
}

function searchBuiltinPlaces(query) {
  const q = query.toLowerCase();
  return BUILTIN_PLACES.filter(p => {
    return p.name.toLowerCase().includes(q) ||
           p.alias.some(a => a.toLowerCase().includes(q));
  }).map(p => ({
    lon: p.lon,
    lat: p.lat,
    name: p.name,
    address: p.type,
    type: p.type,
    source: '内置'
  }));
}

   图层管理

function showLayerPanel() {

  } else {
    list.innerHTML = state.layers.map((layer, i) => `
      <div class="layer-item" onclick="selectLayer(${i})">
        <div class="layer-icon"><i class="fas fa-layer-group"></i></div>
        <div class="layer-info">
          <div class="layer-name">${layer.name}</div>
          <div class="layer-type">${layer.type} · ${layer.count || 0}要素</div>
        </div>
        <div class="layer-controls" onclick="event.stopPropagation()">
          <button onclick="toggleLayerVisibility(${i})" title="${layer.visible ? '隐藏' : '显示'}"><i class="fas fa-eye${layer.visible ? '' : '-slash'}"></i></button>

function selectLayer(index) {
  state.selectedLayerIndex = index;
  showToast('已选中: ' + state.layers[index].name);
}

function showLayerStyle(index) {
  state.selectedLayerIndex = index;
  showStylePanel();
}

function toggleLayerVisibility(index) {
  const layer = state.layers[index];
  if (layer) {
    layer.visible = !layer.visible;
    try {
      state.map.setLayoutProperty(layer.id, 'visibility', layer.visible ? 'visible' : 'none');
    } catch (e) {}
    showLayerPanel();
  }
}

function zoomToLayer(index) {
  const layer = state.layers[index];
  if (layer?.bounds) {
    state.map.fitBounds(layer.bounds, { padding: 50 });
    showToast('已缩放至: ' + layer.name);
  } else {
    showToast('无法获取图层范围', 'error');
  }
}

function zoomToSelectedLayer() {
  if (state.selectedLayerIndex !== undefined) {
    zoomToLayer(state.selectedLayerIndex);
  } else {
    showToast('请先选择一个图层', 'error');
  }
}

function removeLayerItem(index) {
  const layer = state.layers[index];
  if (layer) {
    try {
      if (state.map.getLayer(layer.id)) state.map.removeLayer(layer.id);
      if (state.map.getSource(layer.id)) state.map.removeSource(layer.id);
      if (layer.marker) layer.marker.remove();
    } catch (e) {}
    state.layers.splice(index, 1);
    updateCounts();
    showLayerPanel();
    showToast('图层已删除');
  }
}

function updateCounts() {
  document.getElementById('layerCount').textContent = `图层: ${state.layers.length}`;
  let total = 0;
  state.layers.forEach(l => total += l.count || 0);
  document.getElementById('featureCount').textContent = `要素: ${total}`;
}

/* =====================================================
   数据加载
   ===================================================== */
function promptGeoJSONUrl() {
  const url = prompt('请输入GeoJSON文件URL:');
  if (url) loadGeoJSONFromUrl(url);
}

async function loadGeoJSONFromUrl(url) {
  try {
    showToast('正在加载...');
    const res = await fetch(url);
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    addGeoJSONLayer(data, url.split('/').pop().replace('.json', '').replace('.geojson', '') || 'GeoJSON');
  } catch (e) {
    showToast('加载失败: ' + e.message, 'error');
  }
}

function promptTileUrl() {
  const url = prompt('请输入瓦片服务URL:\n支持XYZ格式: https://example.com/{z}/{x}/{y}.png');
  if (url) addTileLayer(url, url.split('/').pop() || '瓦片');
}

function addTileLayer(url, name) {
  const id = 'tile_' + Date.now();
  try {
    state.map.addSource(id, { type: 'raster', tiles: [url], tileSize: 256 });
    state.map.addLayer({ id: id, type: 'raster', source: id });
    state.layers.push({ id, name, type: '瓦片', visible: true, count: 0 });
    updateCounts();
    showToast('已添加瓦片: ' + name);
  } catch (e) {
    showToast('添加失败: ' + e.message, 'error');
  }
}

function promptWMSUrl() {
  const url = prompt('请输入WMS服务URL:\n示例: https://example.com/wms?service=WMS');
  if (url) {
    showToast('WMS功能加载中...');
    addTileLayer(url, 'WMS图层');
  }
}

function promptLocalFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,.geojson,.kml,.gpx';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const text = await file.text();
    try {
      const data = JSON.parse(text);
      addGeoJSONLayer(data, file.name.replace('.json', '').replace('.geojson', ''));
    } catch (e) {
      showToast('文件格式错误', 'error');
    }
  };
  input.click();
}

function addGeoJSONLayer(data, name) {
  const id = 'layer_' + Date.now();
  const features = data.features || [];
  
  try {
    state.map.addSource(id, { type: 'geojson', data: data });
    
    const type = features[0]?.geometry?.type || 'point';
    let layerType = 'circle';
    let paint = { 'circle-color': state.currentColor, 'circle-radius': state.currentRadius };
    
    if (type.includes('Line')) {
      layerType = 'line';
      paint = { 'line-color': state.currentColor, 'line-width': state.currentStrokeWidth };
    } else if (type.includes('Polygon')) {
      layerType = 'fill';
      paint = { 'fill-color': state.currentColor, 'fill-opacity': state.currentOpacity };
    }
    
    state.map.addLayer({ id: id, type: layerType, source: id, paint: paint });
    
    // 计算边界
    let bounds = null;
    if (features.length) {
      const coords = features.flatMap(f => f.geometry?.coordinates || []);
      if (coords.length) {
        bounds = coords.reduce((b, c) => {
          return [[Math.min(b[0][0], c[0]), Math.min(b[0][1], c[1])], [Math.max(b[1][0], c[0]), Math.max(b[1][1], c[1])]];
        }, [[180, 90], [-180, -90]]);
      }
    }
    
    state.layers.push({ id, name, type: 'GeoJSON', visible: true, count: features.length, bounds, data });
    updateCounts();
    
    // 自动缩放
    if (bounds) {
      state.map.fitBounds(bounds, { padding: 50 });
    }
    
    showToast('已添加: ' + name + ' (' + features.length + '要素)');
  } catch (e) {
    showToast('添加失败: ' + e.message, 'error');
  }
}

/* =====================================================
   绘制
   ===================================================== */
function startDraw(type) {
  if (state.drawMode === type) {
    cancelDraw();
    return;
  }
  
  state.drawMode = type;
  state.drawPoints = [];
  
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('btnDrawPoint').classList.toggle('active', type === 'point');
  document.getElementById('btnDrawLine').classList.toggle('active', type === 'line');
  document.getElementById('btnDrawPoly').classList.toggle('active', type === 'polygon');
  
  showToast('绘制' + (type === 'point' ? '点' : type === 'line' ? '线' : '面') + ': 点击添加,双击完成');
}

function handleDrawClick(lngLat) {
  if (!state.drawMode) return;
  
  state.drawPoints.push([lngLat.lng, lngLat.lat]);
  
  // 添加临时标记
  new maplibregl.Marker({ color: state.currentColor })
    .setLngLat([lngLat.lng, lngLat.lat])
    .addTo(state.map);
  
  if (state.drawPoints.length >= 2 && state.drawMode !== 'point') {
    showToast('双击完成绘制');
  }
  
  if (state.drawMode === 'point') {
    const name = prompt('请输入标注名称:', '标注_' + Date.now());
    if (name) {
      const marker = new maplibregl.Marker({ color: state.currentColor })
        .setLngLat([lngLat.lng, lngLat.lat])
        .setPopup(new maplibregl.Popup().setHTML(`<b>${name}</b>`))
        .addTo(state.map);
      
      state.layers.push({
        id: 'marker_' + Date.now(),
        name: name,
        type: '标注',
        visible: true,
        count: 1,
        marker: marker
      });
      updateCounts();
      showToast('已添加标注: ' + name);
    }
    cancelDraw();
  }
}

state.map?.on('dblclick', (e) => {
  if (!state.drawMode || state.drawMode === 'point') return;
  e.preventDefault();
  finishDraw();
});

function finishDraw() {
  if (!state.drawPoints.length) return;
  
  let geojson;
  if (state.drawMode === 'line') {
    geojson = { type: 'Feature', geometry: { type: 'LineString', coordinates: state.drawPoints } };
  } else if (state.drawMode === 'polygon') {
    geojson = { type: 'Feature', geometry: { type: 'Polygon', coordinates: [state.drawPoints.concat([state.drawPoints[0]])] } };
  }
  
  if (geojson) {
    addGeoJSONLayer({ type: 'FeatureCollection', features: [geojson] }, '绘制_' + Date.now());
  }
  
  cancelDraw();
}

function cancelDraw() {
  state.drawMode = null;
  state.drawPoints = [];
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  showToast('已退出绘制');
}

/* =====================================================
   测量
   ===================================================== */
function startMeasure(type) {
  if (state.measureMode === type) {
    cancelMeasure();
    return;
  }
  
  state.measureMode = type;
  state.measurePoints = [];
  
  document.getElementById('btnMeasureDist').classList.toggle('active', type === 'distance');
  document.getElementById('btnMeasureArea').classList.toggle('active', type === 'area');
  document.getElementById('measureResult').classList.add('show');
  
  showToast('点击地图测量' + (type === 'distance' ? '距离' : '面积'));
}

function addMeasureMarker(lngLat) {
  new maplibregl.Marker({ color: '#fbbf24' })
    .setLngLat([lngLat.lng, lngLat.lat])
    .addTo(state.map);
}

function calculateMeasure() {
  const points = state.measurePoints;
  if (points.length < 2) return;
  
  if (state.measureMode === 'distance') {
    let dist = 0;
    for (let i = 0; i < points.length - 1; i++) {
      dist += state.map.unproject(points[i]).distanceTo(state.map.unproject(points[i + 1]));
    }
    const unit = dist > 1000 ? (dist / 1000).toFixed(2) + ' km' : dist.toFixed(0) + ' m';
    document.getElementById('measureValue').textContent = unit;
    showToast('距离: ' + unit);
  } else if (state.measureMode === 'area') {
    // 简化的面积计算
    let area = 0;
    for (let i = 0; i < points.length - 1; i++) {
      area += points[i][0] * points[i + 1][1] - points[i + 1][0] * points[i][1];
    }
    area = Math.abs(area / 2) * 111319.9 * 111319.9;
    const unit = area > 1000000 ? (area / 1000000).toFixed(2) + ' km²' : area.toFixed(0) + ' m²';
    document.getElementById('measureValue').textContent = unit;
    showToast('面积: ' + unit);
  }
}

function clearMeasure() {
  cancelMeasure();
  document.getElementById('measureResult').classList.remove('show');
}

function cancelMeasure() {
  state.measureMode = null;
  state.measurePoints = [];
  document.getElementById('btnMeasureDist').classList.remove('active');
  document.getElementById('btnMeasureArea').classList.remove('active');
}

/* =====================================================
   缓冲区
   ===================================================== */
function startBuffer() {
  const distance = prompt('请输入缓冲区半径(米):', '1000');
  if (!distance) return;
  
  if (state.selectedLayerIndex !== undefined) {
    const layer = state.layers[state.selectedLayerIndex];
    if (layer) {
      showToast('缓冲区分析: ' + layer.name + ' (' + distance + '米)');
      // 简化实现：添加圆形覆盖
      const center = layer.bounds ? [
        (layer.bounds[0][0] + layer.bounds[1][0]) / 2,
        (layer.bounds[0][1] + layer.bounds[1][1]) / 2
      ] : CONFIG.mapCenter;
      
      // 添加示意圆形
      addGeoJSONLayer({
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: {
            type: 'Point',
            coordinates: center
          },
          properties: { buffer: distance }
        }]
      }, '缓冲区_' + distance + 'm');
      
      showToast('已创建缓冲区 (示意)');
    }
  } else {
    showToast('请先选择要分析的图层', 'error');
  }
}

function startHeatmap() {

      type: 'heatmap',

      paint: {
        'heatmap-weight': 1,
        'heatmap-intensity': 1,

          0, 'rgba(0,0,0,0)',
          0.2, 'rgb(0,100,255)',
          0.4, 'rgb(0,255,128)',
          0.6, 'rgb(255,220,0)',

          1, 'rgb(255,0,0)'
        ],
        'heatmap-radius': 30,
        'heatmap-opacity': 0.8

function selectStyleColor(el) {

  el.classList.add('selected');
  state.currentColor = el.dataset.color;
  applyStyleToSelected();
}

function updateStyleOpacity(val) {
  document.getElementById('styleOpacityValue').textContent = val + '%';
  state.currentOpacity = val / 100;
  applyStyleToSelected();
}

function updateStyleStrokeWidth(val) {
  document.getElementById('styleStrokeWidthValue').textContent = val + 'px';
  state.currentStrokeWidth = parseInt(val);
  applyStyleToSelected();
}

function updateStyleRadius(val) {
  document.getElementById('styleRadiusValue').textContent = val + 'px';
  state.currentRadius = parseInt(val);
  applyStyleToSelected();
}

function applyStyleToSelected() {
  const idx = state.selectedLayerIndex;
  if (idx === undefined) {
    showToast('请先选择一个图层', 'error');
    return;
  }
  
  const layer = state.layers[idx];
  if (!layer || !state.map.getLayer(layer.id)) return;
  
  try {
    const type = state.map.getLayer(layer.id).type;
    if (type === 'fill') {
      state.map.setPaintProperty(layer.id, 'fill-color', state.currentColor);
      state.map.setPaintProperty(layer.id, 'fill-opacity', state.currentOpacity);
    } else if (type === 'line') {
      state.map.setPaintProperty(layer.id, 'line-color', state.currentColor);
      state.map.setPaintProperty(layer.id, 'line-width', state.currentStrokeWidth);
    } else if (type === 'circle') {
      state.map.setPaintProperty(layer.id, 'circle-color', state.currentColor);
      state.map.setPaintProperty(layer.id, 'circle-radius', state.currentRadius);
    }
    showToast('样式已更新');
  } catch (e) {
    showToast('样式更新失败', 'error');
  }
}

/* =====================================================
   定位
   ===================================================== */
function getLocation() {
  if (!navigator.geolocation) {
    showToast('浏览器不支持定位', 'error');
    return;
  }
  
  showToast('正在定位...');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { longitude, latitude } = pos.coords;
      flyToPoint(longitude, latitude, 15);
      addSearchMarker(longitude, latitude, 'GPS定位');
      showToast('已定位到您的位置 (精度: ' + Math.round(pos.coords.accuracy) + 'm)');
    },
    () => showToast('GPS定位失败', 'error')
  );
}

async function getLocationInfo() {
  const info = [];
  const center = state.map.getCenter();
  const zoom = state.map.getZoom();
  
  info.push(`📍 当前中心: ${center.lng.toFixed(6)}, ${center.lat.toFixed(6)}`);
  info.push(`🔍 缩放级别: ${zoom.toFixed(1)}`);
  
  // 浏览器信息
  info.push(`🌐 浏览器: ${navigator.userAgent.includes('Chrome') ? 'Chrome' : navigator.userAgent.includes('Firefox') ? 'Firefox' : navigator.userAgent.includes('Safari') ? 'Safari' : '其他'}`);
  info.push(`🗣️ 语言: ${navigator.language}`);
  info.push(`🕐 时区: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`);
  
  // 屏幕信息
  info.push(`📐 屏幕: ${screen.width}×${screen.height}`);
  
  // 获取IP位置
  try {
    const res = await fetch('https://ipapi.co/json/', { timeout: 5000 });
    if (res.ok) {
      const data = await res.json();
      if (data.city) {
        info.push(`🏠 IP位置: ${data.city}, ${data.country_name}`);
        info.push(`📡 ISP: ${data.org || '未知'}`);
      }
    }
  } catch (e) {}
  
  // GPS位置
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        info.push(`📌 GPS: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`);
        info.push(`🎯 精度: ${Math.round(pos.coords.accuracy)}米`);
        showLocationInfoModal(info.join('\n'));
      },
      () => {
        info.push('📌 GPS: 不可用');
        showLocationInfoModal(info.join('\n'));
      }
    );
  } else {
    info.push('📌 GPS: 不支持');
    showLocationInfoModal(info.join('\n'));
  }
}

function showLocationInfoModal(content) {
  const modal = document.getElementById('locateModal');
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-info-circle"></i> 位置信息</h3>
        <button class="modal-close" onclick="closeModal('locateModal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <pre style="white-space:pre-wrap;font-size:12px;color:#eef2ff;line-height:1.8">${content}</pre>
        <div class="modal-btns">
          <button class="modal-btn" onclick="copyLocationInfo()"><i class="fas fa-copy"></i> 复制</button>
          <button class="modal-btn secondary" onclick="closeModal('locateModal')">关闭</button>
        </div>
      </div>
    </div>
  `;
  modal.classList.add('show');
  window._locationInfoContent = content;
}

function copyLocationInfo() {
  if (window._locationInfoContent) {
    navigator.clipboard.writeText(window._locationInfoContent).then(() => {
      showToast('已复制到剪贴板');
    });
  }
}

function switchBasemapByIndex(index) {
  if (state.basemaps[index]) {
    state.currentBasemap = index;
    state.map.setStyle(createStyle(state.basemaps[index]));
    showToast('已切换: ' + state.basemaps[index].name);
  }
}

/* =====================================================
   坐标定位弹窗
   ===================================================== */
function showLocateModal() {
  const center = state.map.getCenter();
  document.getElementById('coordInput').value = center.lng.toFixed(4) + ',' + center.lat.toFixed(4);
  document.getElementById('locateModal').classList.add('show');
  document.getElementById('locateModal').innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-crosshairs"></i> 坐标定位</h3>
        <button class="modal-close" onclick="closeModal('locateModal')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <input type="text" class="modal-input" id="coordInput" placeholder="输入经度,纬度 例如: 116.4,39.9">
        <div class="modal-btns">
          <button class="modal-btn" onclick="goToCoord()"><i class="fas fa-location-arrow"></i> 定位</button>
          <button class="modal-btn secondary" onclick="closeModal('locateModal')">取消</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('locateModal').classList.add('show');
}

function goToCoord() {
  const input = document.getElementById('coordInput').value;
  const match = input.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if (match) {
    const lng = parseFloat(match[1]);
    const lat = parseFloat(match[2]);
    if (lng >= -180 && lng <= 180 && lat >= -90 && lat <= 90) {
      flyToPoint(lng, lat, 14);
      addSearchMarker(lng, lat, '坐标点');
      closeModal('locateModal');
      showToast('已定位到: ' + lng.toFixed(4) + ', ' + lat.toFixed(4));
      return;
    }
  }
  showToast('请输入有效坐标', 'error');
}

/* =====================================================
   颜色选择
   ===================================================== */
function toggleColorPicker() {
  document.getElementById('colorDropdown').classList.toggle('show');
}

function selectColor(el) {
  document.querySelectorAll('#colorDropdown .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  state.currentColor = el.dataset.color;
  document.getElementById('colorDropdown').classList.remove('show');
}

/* =====================================================
   导出
   ===================================================== */
function exportMapImage() {
  const url = state.map.getCanvas().toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geolibre-' + Date.now() + '.png';
  a.click();
  showToast('地图图片已导出');
}

function exportGeoJSON() {
  const features = [];
  state.layers.forEach(layer => {
    if (layer.data?.features) {
      features.push(...layer.data.features);
    }
  });
  
  if (!features.length) {
    showToast('暂无可导出的数据', 'error');
    return;
  }
  
  const geojson = { type: 'FeatureCollection', features };
  const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geolibre-export.geojson';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出 ' + features.length + ' 个要素');
}

/* =====================================================
   其他
   ===================================================== */
function resetMapView() {
  state.map.flyTo({ center: CONFIG.mapCenter, zoom: CONFIG.mapZoom });
  showToast('视图已重置');
}

function toggleFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
}

function showShortcuts() {
  document.getElementById('shortcutHint').classList.toggle('show');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 2500);
}

/* =====================================================
   启动
   ===================================================== */
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
