<!DOCTYPE html>
<html lang="zh-CN">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意念地球 - GeoLibre</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
/* ============ 全局变量 ============ */
:root{
  --top-bar-height:56px;
  --toolbar-height:52px;
  --status-bar-height:36px;
  --sidebar-width:300px;
  --sidebar-min:240px;
  --accent:#7c5dfc;
  --accent-dark:#6b4fe6;
  --bg-primary:rgba(12,21,55,.94);
  --bg-secondary:rgba(10,18,46,.96);
  --bg-dark:rgba(9,15,38,.98);
  --text-primary:#eef2ff;
  --text-secondary:#9fb4d8;
  --border-color:rgba(255,255,255,.06);
}

/* ============ 全局基础 ============ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0f1639;color:#e6e8f5;-webkit-font-smoothing:antialiased}

/* ============ 容器布局 ============ */
.container{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}

/* ============ 顶部栏 ============ */
.top-bar{
  flex-shrink:0;
  height:var(--top-bar-height);
  background:var(--bg-primary);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0}
.logo i{font-size:22px;color:var(--accent)}
.logo span{color:#8f98c8;font-size:12px;font-weight:400;margin-left:4px}

.search-global{position:relative;flex:1;min-width:0;max-width:420px}
.search-global input{
  width:100%;padding:10px 14px 10px 42px;
  border-radius:999px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,29,70,.9);color:#f4f6ff;font-size:14px;
  transition:all .2s;
}
.search-global input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,93,252,.12)}
.search-global i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8f98c8;font-size:14px}

.top-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.top-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(255,255,255,.04);color:#c7d1f4;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:13px;
}
.top-btn:hover{background:rgba(124,93,252,.12);color:#fff}

/* ============ 主内容区 ============ */
.main{display:flex;flex:1;min-height:0;overflow:hidden}

/* ============ 左侧边栏 - 树形结构 ============ */
.sidebar{
  flex-shrink:0;
  width:var(--sidebar-width);
  min-width:var(--sidebar-min);
  background:var(--bg-secondary);
  border-right:1px solid var(--border-color);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .3s ease;
}
.sidebar.collapsed{width:0;min-width:0;border-right:none}

.sidebar-header{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;flex-shrink:0;
}
.sidebar-header h3{font-size:13px;color:#f2f5ff;letter-spacing:.02em;font-weight:600}
.sidebar-header .count{
  font-size:11px;color:#9aabc7;
  background:rgba(255,255,255,.06);
  padding:4px 10px;border-radius:999px;font-weight:500;
}
.sidebar-actions{display:flex;gap:4px}
.sidebar-action-btn{
  width:28px;height:28px;border-radius:6px;border:none;
  background:rgba(255,255,255,.04);color:#8f98c8;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:11px;
}
.sidebar-action-btn:hover{background:rgba(124,93,252,.15);color:#fff}
.sidebar-action-btn.active{background:rgba(124,93,252,.2);color:var(--accent)}

.tree-search{padding:0 14px 12px;flex-shrink:0}
.tree-search input{
  width:100%;padding:9px 12px;
  border-radius:10px;border:1px solid rgba(255,255,255,.08);
  background:rgba(22,33,70,.9);color:#eef2ff;font-size:13px;
  transition:border .2s;
}
.tree-search input:focus{border-color:var(--accent)}
.tree-search input::placeholder{color:#7a89b8}

.tree-wrap{
  flex:1;min-height:0;
  overflow-y:auto;overflow-x:hidden;
  padding:4px 6px 14px;
}
.tree-wrap::-webkit-scrollbar{width:6px}
.tree-wrap::-webkit-scrollbar-thumb{background:rgba(124,93,252,.3);border-radius:3px}
.tree-wrap::-webkit-scrollbar-track{background:transparent}

/* ============ 树形结构 ============ */
.tree-node{position:relative;margin:1px 0}
.tree-label{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;
  color:#c7d1f4;cursor:pointer;
  transition:background .15s,color .15s;
  border-radius:8px;margin:2px 4px;font-size:13px;
  user-select:none;position:relative;min-height:38px;
}
.tree-label:hover{background:rgba(124,93,252,.12);color:#fff}
.tree-label.active{color:#fff;background:rgba(124,93,252,.32)}
.tree-label.selected{color:#fff;background:rgba(124,93,252,.45)}

.tree-arrow{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:#8f9ecb;transition:transform .2s;font-size:9px;flex-shrink:0}
.tree-arrow.rotated{transform:rotate(90deg)}
.tree-arrow.empty{visibility:hidden}

.tree-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.tree-icon.folder{color:#ffd166}
.tree-icon.file{color:var(--accent)}
.tree-icon.link{color:#4ade80}
.tree-icon.level-1{color:#ffd166}
.tree-icon.level-2{color:#6bb3ff}
.tree-icon.level-3{color:#8f9cf5}

.tree-name{flex:1;text-overflow:ellipsis;white-space:nowrap;overflow:hidden;line-height:1.4}
.tree-shortcut{
  font-size:10px;color:#8f98c8;
  background:rgba(255,255,255,.06);
  padding:2px 6px;border-radius:4px;
  flex-shrink:0;font-family:monospace;
}
.tree-children{display:none;flex-direction:column;position:relative}
.tree-children.open{display:flex}
.tree-children::before{
  content:'';position:absolute;left:20px;top:0;bottom:6px;
  width:1px;background:rgba(255,255,255,.06);
}
.tree-node.level-2>.tree-label{padding-left:28px}
.tree-node.level-3>.tree-label{padding-left:44px}
.highlight-match{background:rgba(124,93,252,.45);color:#fff;border-radius:3px;padding:0 2px}

/* ============ 拖拽分隔条 ============ */
.splitter{width:4px;background:transparent;cursor:col-resize;transition:background .2s;flex-shrink:0}
.splitter:hover{background:rgba(124,93,252,.3)}

/* ============ 预览区域 ============ */
.preview-area{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  background:linear-gradient(180deg,rgba(15,21,55,.98),rgba(9,15,38,.98));
}

/* ============ 工具栏 ============ */
.toolbar{
  flex-shrink:0;
  height:var(--toolbar-height);
  padding:0 16px;
  display:flex;align-items:center;gap:6px;
  background:rgba(12,20,49,.96);
  border-bottom:1px solid var(--border-color);
  overflow-x:auto;overflow-y:hidden;
}
.toolbar::-webkit-scrollbar{height:3px}
.toolbar::-webkit-scrollbar-thumb{background:rgba(124,93,252,.25);border-radius:2px}

.tool-group{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tbtn{
  width:36px;height:36px;border-radius:9px;
  border:1px solid transparent;
  background:rgba(255,255,255,.04);color:#c7d1f4;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;font-size:13px;
}
.tbtn:hover{border-color:rgba(124,93,252,.35);background:rgba(124,93,252,.12);color:#fff}
.tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tbtn:disabled{opacity:.4;cursor:not-allowed}

.tool-sep{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0;margin:0 4px}

.toolbar-label{
  font-size:11px;color:#8f98c8;
  padding:0 8px;white-space:nowrap;
}

.color-picker-wrap{position:relative;flex-shrink:0}
.color-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;
  background:rgba(20,30,60,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:12px;padding:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.35);
  z-index:500;min-width:140px;
  display:none;
}
.color-dropdown.show{display:block}
.color-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.color-row:last-child{margin-bottom:0}
.color-swatch{
  width:24px;height:24px;border-radius:6px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  border:2px solid transparent;flex-shrink:0;
}
.color-swatch:hover{transform:scale(1.15);box-shadow:0 0 10px rgba(124,93,252,.4)}
.color-swatch.selected{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}

.coord-display{
  display:flex;align-items:center;gap:6px;
  margin-left:auto;font-size:12px;color:#9fb4d8;flex-shrink:0;
}
.coord-display input{
  width:68px;padding:6px 8px;
  border-radius:6px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,28,61,.95);color:#fff;
  text-align:center;font-size:11px;
}
.coord-display span{color:#7a89b8}

/* ============ 地图区域 ============ */
#map{flex:1;width:100%;height:100%}

.maplibregl-ctrl-group{
  background:rgba(12,20,49,.96)!important;
  border:1px solid rgba(255,255,255,.1)!important;
  border-radius:10px!important;
  box-shadow:0 4px 12px rgba(0,0,0,.2)!important;
}
.maplibregl-ctrl-group button{
  background:rgba(255,255,255,.04)!important;color:#c7d1f4!important;
}
.maplibregl-ctrl-group button:hover{background:rgba(124,93,252,.12)!important;color:#fff!important}
.maplibregl-ctrl-attrib{background:rgba(12,20,49,.8)!important}

/* ============ 状态栏 ============ */
.status-bar{
  flex-shrink:0;
  height:var(--status-bar-height);
  padding:0 20px;
  display:flex;align-items:center;gap:16px;
  font-size:11px;color:#9fb4d8;
  background:rgba(12,20,47,.94);
  border-top:1px solid var(--border-color);
}
.status-bar span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:6px}
.status-dot.offline{background:#f87171}
.status-dot.loading{background:#fbbf24;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ============ 弹窗 ============ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(6,11,28,.85);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  width:min(560px,100%);
  background:rgba(17,25,55,.98);
  border:1px solid rgba(124,93,252,.25);
  border-radius:16px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
}
.modal-header{
  padding:16px 20px;
  border-bottom:1px solid var(--border-color);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-header h3{font-size:16px;color:#fff;font-weight:600}
.modal-close{
  background:none;border:none;color:#9fb4d8;
  cursor:pointer;padding:6px;border-radius:6px;
  transition:all .15s;
}
.modal-close:hover{background:rgba(124,93,252,.12);color:#fff}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-body::-webkit-scrollbar{width:6px}
.modal-body::-webkit-scrollbar-thumb{background:rgba(124,93,252,.3);border-radius:3px}

.modal-input{
  width:100%;padding:10px 14px;
  border-radius:8px;border:1px solid rgba(255,255,255,.1);
  background:rgba(18,28,61,.95);color:#fff;font-size:14px;
  margin-bottom:12px;
}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-input::placeholder{color:#7a89b8}

.modal-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:8px;
  border:none;background:var(--accent);color:#fff;
  cursor:pointer;font-size:13px;transition:all .15s;
}
.modal-btn:hover{background:var(--accent-dark)}
.modal-btn.secondary{background:rgba(255,255,255,.08);color:#d2d8ff}
.modal-btn.secondary:hover{background:rgba(255,255,255,.12)}
.modal-btn-group{display:flex;gap:10px;margin-top:16px}

/* 底图网格 */
.basemap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.basemap-item{
  cursor:pointer;border-radius:10px;overflow:hidden;
  border:2px solid transparent;transition:all .2s;
  background:rgba(255,255,255,.04);
}
.basemap-item:hover{border-color:var(--accent)}
.basemap-preview{
  height:60px;background:#1a2342;
  display:flex;align-items:center;justify-content:center;
  color:#7a89b8;font-size:20px;
}
.basemap-item span{
  display:block;padding:6px;
  text-align:center;font-size:11px;color:#eef2ff;
}

/* 搜索结果 */
.search-results{max-height:400px;overflow-y:auto}
.search-result-item{
  display:flex;align-items:center;gap:12px;
  padding:12px;background:rgba(255,255,255,.03);
  border-radius:10px;cursor:pointer;
  transition:all .15s;margin-bottom:8px;
}
.search-result-item:hover{background:rgba(124,93,252,.08)}
.result-icon{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,93,252,.15);border-radius:8px;
  color:var(--accent);font-size:16px;
}
.result-info{flex:1;min-width:0}
.result-name{font-size:14px;color:#eef2ff;font-weight:500;margin-bottom:4px}
.result-address{font-size:12px;color:#9fb4d8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-source{font-size:10px;color:var(--accent)}

/* 图层列表 */
.layer-list{max-height:400px;overflow-y:auto}
.layer-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;background:rgba(255,255,255,.03);
  border-radius:8px;margin-bottom:8px;
}
.layer-item .layer-icon{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(124,93,252,.15);border-radius:6px;
  color:var(--accent);
}
.layer-item .layer-info{flex:1;min-width:0}
.layer-item .layer-name{font-size:13px;color:#eef2ff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-item .layer-type{font-size:11px;color:#9fb4d8}
.layer-item .layer-controls{display:flex;gap:4px}
.layer-item .layer-controls button{
  width:26px;height:26px;border-radius:6px;
  border:none;background:rgba(255,255,255,.04);color:#c7d1f4;cursor:pointer;
}
.layer-item .layer-controls button:hover{background:rgba(124,93,252,.12)}

/* 快捷键提示 */
.shortcut-hint{
  position:fixed;bottom:80px;right:28px;
  background:rgba(17,25,55,.95);
  border:1px solid rgba(124,93,252,.2);
  border-radius:14px;padding:14px 18px;
  font-size:12px;color:#9fb4d8;z-index:2500;
  display:none;min-width:180px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.shortcut-hint.show{display:block}
.shortcut-hint h4{color:#fff;margin-bottom:8px;font-size:13px;font-weight:600}
.shortcut-hint div{display:flex;justify-content:space-between;gap:12px;padding:3px 0}
.shortcut-hint kbd{
  background:rgba(124,93,252,.2);padding:2px 8px;
  border-radius:5px;color:#c7d1f4;
  font-family:inherit;font-size:11px;
}

/* Toast */
.toast{
  position:fixed;bottom:30px;right:30px;
  padding:12px 18px;border-radius:12px;
  background:rgba(124,93,252,.95);color:#fff;font-size:13px;
  box-shadow:0 20px 60px rgba(18,25,68,.35);
  opacity:0;transform:translateY(10px);
  transition:.25s ease;pointer-events:none;z-index:3000;
  max-width:calc(100vw - 56px);
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:rgba(34,197,94,.95)}
.toast.error{background:rgba(239,68,68,.95)}

/* 加载遮罩 */
.loading-overlay{
  position:absolute;inset:0;
  background:rgba(10,16,40,.85);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:50;
}
.loading-overlay.show{display:flex}
.loading-spinner{
  width:42px;height:42px;
  border:4px solid rgba(124,93,252,.2);
  border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}

/* 功能工具栏按钮 - 新增的快捷功能入口 */
.func-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);color:#c7d1f4;
  cursor:pointer;font-size:12px;transition:all .15s;
  white-space:nowrap;
}
.func-btn:hover{background:rgba(124,93,252,.12);color:#fff;border-color:rgba(124,93,252,.3)}
.func-btn i{font-size:12px}
.func-btn.disabled{opacity:.4;cursor:not-allowed}

/* 全屏模式 */
body.fullscreen .sidebar,
body.fullscreen .status-bar{display:none!important}
body.fullscreen .preview-area{border-radius:0}
</style>
</head>
<body>
<div class="container">
  <!-- 顶部栏 -->
  <header class="top-bar">
    <div class="logo">
      <i class="fas fa-globe-americas"></i>
      <span>意念地球</span>
    </div>
    
    <div class="search-global">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="搜索地名或坐标(经度,纬度)..." onkeydown="if(event.key==='Enter')performSearch(this.value)">
    </div>
    
    <div class="top-actions">
      <button class="top-btn" onclick="toggleSidebar()" title="切换侧边栏"><i class="fas fa-columns"></i></button>
      <button class="top-btn" onclick="toggleFullscreen()" title="全屏(F)"><i class="fas fa-expand"></i></button>
      <button class="top-btn" onclick="showShortcuts()" title="快捷键(?)"><i class="fas fa-keyboard"></i></button>
      <button class="top-btn" onclick="showHelp()" title="帮助"><i class="fas fa-question-circle"></i></button>
    </div>
  </header>

  <!-- 主内容 -->
  <div class="main">
    <!-- 左侧边栏 - 树形结构 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-folder-tree"></i> 功能目录</h3>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="count" id="treeCount">0项</span>
          <div class="sidebar-actions">
            <button class="sidebar-action-btn" onclick="expandAll()" title="展开全部"><i class="fas fa-angle-double-down"></i></button>
            <button class="sidebar-action-btn" onclick="collapseAll()" title="收起全部"><i class="fas fa-angle-double-up"></i></button>
          </div>
        </div>
      </div>
      
      <div class="tree-search">
        <input type="text" id="treeSearch" placeholder="搜索功能..." oninput="debounceFilter(this.value,300)">
      </div>
      
      <div class="tree-wrap" id="treeContainer">
        <div class="loading-overlay show" id="treeLoading">
          <div class="loading-spinner"></div>
          <span style="color:#9fb4d8;font-size:13px">加载中...</span>
        </div>
      </div>
    </aside>
    
    <!-- 拖拽分隔条 -->
    <div class="splitter" id="splitter"></div>

    <!-- 预览区域 -->
    <div class="preview-area">
      <!-- 工具栏 -->
      <div class="toolbar">
        <!-- 地图操作 -->
        <div class="tool-group">
          <button class="tbtn" onclick="if(state.map)state.map.zoomIn()" title="放大(+)"><i class="fas fa-plus"></i></button>
          <button class="tbtn" onclick="if(state.map)state.map.zoomOut()" title="缩小(-)"><i class="fas fa-minus"></i></button>
          <button class="tbtn" onclick="resetMapView()" title="重置视图(R)"><i class="fas fa-home"></i></button>
        </div>
        
        <span class="tool-sep"></span>
        
        <!-- 底图切换 -->
        <div class="tool-group">

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
/* =====================================================
   状态管理
   ===================================================== */
const CONFIG = {
  catalogUrl: './data/catalog.json',
  mapCenter: [116.4, 39.9],
  mapZoom: 10,
  minZoom: 3,
  maxZoom: 18
};

const state = {
  map: null,
  catalog: [],
  basemaps: [],
  layers: [],
  currentBasemap: 0,
  currentColor: '#7c5dfc',
  currentOpacity: 0.5,
  drawMode: null,
  measureMode: null,
  sidebarOpen: true,
  treeExpanded: new Set()
};

// 防抖定时器
let filterTimer = null;

/* =====================================================
   初始化
   ===================================================== */
async function init() {
  try {
    // 加载目录
    await loadCatalog();
    
    // 渲染树形结构
    renderTree(state.catalog);
    document.getElementById('treeCount').textContent = countItems(state.catalog) + '项';
    document.getElementById('treeLoading').classList.remove('show');
    
    // 初始化地图
    initMap();
    
    // 初始化拖拽分隔条
    initSplitter();
    
    // 初始化键盘快捷键
    initKeyboard();
    
  } catch (e) {
    console.error('初始化失败:', e);
    showToast('初始化失败，使用默认配置', 'error');
    state.catalog = getDefaultCatalog();
    state.basemaps = getDefaultBasemaps();
    renderTree(state.catalog);
    initMap();
  }
}

/* =====================================================
   目录加载
   ===================================================== */
async function loadCatalog() {
  const res = await fetch(CONFIG.catalogUrl);
  if (!res.ok) throw new Error('加载目录失败');
  const data = await res.json();
  
  state.catalog = data.catalog || [];
  state.basemaps = data.basemaps && data.basemaps.length > 0 ? data.basemaps : getDefaultBasemaps();
  
  if (data.defaultConfig) {
    CONFIG.mapCenter = data.defaultConfig.mapCenter || CONFIG.mapCenter;
    CONFIG.mapZoom = data.defaultConfig.mapZoom || CONFIG.mapZoom;
  }
  
  if (data.appName) {
    document.querySelector('.logo span').textContent = data.appName;
    document.title = data.appName + ' - GeoLibre';
  }
}

function getDefaultCatalog() {
  return [
    { id: 'basic', label: '基础功能', icon: 'fa-map', children: [
      { id: 'basemap', label: '底图切换', icon: 'fa-layer-group', action: 'basemap', shortcut: 'B' },
      { id: 'locate', label: '坐标定位', icon: 'fa-crosshairs', action: 'locate', shortcut: 'G' }
    ]},
    { id: 'layer', label: '图层管理', icon: 'fa-layer-group', children: [
      { id: 'addGeoJSON', label: '添加GeoJSON', icon: 'fa-code', action: 'addGeoJSON' }
    ]}
  ];
}

function getDefaultBasemaps() {
  return [
    { name: 'OpenStreetMap', url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png' },
    { name: 'CartoDB亮色', url: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png' },
    { name: 'CartoDB暗色', url: 'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png' },
    { name: 'Esri卫星', url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' }
  ];
}

/* =====================================================
   树形结构 - 高效渲染
   ===================================================== */
function renderTree(items, parentEl = null) {
  const container = document.getElementById('treeContainer');
  if (!parentEl) {
    container.innerHTML = '';
    parentEl = container;
  }
  
  items.forEach(item => {
    const node = createTreeNode(item);
    parentEl.appendChild(node);
  });
}

function createTreeNode(item) {
  const li = document.createElement('div');
  li.className = 'tree-node';
  li.dataset.id = item.id;
  
  const hasChildren = item.children && item.children.length > 0;
  const isLink = item.action === 'link' && item.url;
  
  // 标签
  const label = document.createElement('div');
  label.className = 'tree-label';
  label.dataset.action = item.action || '';
  label.dataset.url = item.url || '';
  
  // 箭头
  const arrow = document.createElement('span');
  if (hasChildren) {
    arrow.className = 'tree-arrow';
    arrow.innerHTML = '<i class="fas fa-chevron-right"></i>';
    arrow.onclick = (e) => { e.stopPropagation(); toggleNode(li, arrow); };
  } else {
    arrow.className = 'tree-arrow empty';
  }
  label.appendChild(arrow);
  
  // 图标
  const icon = document.createElement('span');
  icon.className = 'tree-icon ' + (hasChildren ? 'folder' : (isLink ? 'link' : 'file'));
  icon.innerHTML = `<i class="fas ${item.icon || 'fa-file'}"></i>`;
  label.appendChild(icon);
  
  // 名称
  const name = document.createElement('span');
  name.className = 'tree-name';
  name.textContent = item.label;
  name.title = item.description || item.label;
  label.appendChild(name);
  
  // 快捷键
  if (item.shortcut) {
    const shortcut = document.createElement('span');
    shortcut.className = 'tree-shortcut';
    shortcut.textContent = item.shortcut;
    label.appendChild(shortcut);
  }
  
  label.onclick = () => handleItemClick(item, label);
  li.appendChild(label);
  
  // 子节点
  if (hasChildren) {
    const children = document.createElement('div');
    children.className = 'tree-children';
    item.children.forEach(child => {
      children.appendChild(createTreeNode(child));
    });
    li.appendChild(children);
  }
  
  return li;
}

function toggleNode(li, arrow) {
  const children = li.querySelector('.tree-children');
  if (!children) return;
  
  const isOpen = children.classList.toggle('open');
  arrow.classList.toggle('rotated', isOpen);
  arrow.querySelector('i').className = isOpen ? 'fas fa-chevron-down' : 'fas fa-chevron-right';
  
  // 记录状态
  if (isOpen) {
    state.treeExpanded.add(li.dataset.id);
  } else {
    state.treeExpanded.delete(li.dataset.id);
  }
}

function expandAll() {
  document.querySelectorAll('.tree-children').forEach(ch => ch.classList.add('open'));
  document.querySelectorAll('.tree-arrow:not(.empty)').forEach(arrow => {
    arrow.classList.add('rotated');
    arrow.querySelector('i').className = 'fas fa-chevron-down';
  });
  showToast('已展开全部');
}

function collapseAll() {
  document.querySelectorAll('.tree-children').forEach(ch => ch.classList.remove('open'));
  document.querySelectorAll('.tree-arrow.rotated').forEach(arrow => {
    arrow.classList.remove('rotated');
    arrow.querySelector('i').className = 'fas fa-chevron-right';
  });
  showToast('已收起全部');
}

// 防抖搜索
function debounceFilter(keyword, delay) {
  if (filterTimer) clearTimeout(filterTimer);
  filterTimer = setTimeout(() => filterCatalog(keyword), delay);
}

function filterCatalog(keyword) {
  const nodes = document.querySelectorAll('.tree-node');
  const lower = keyword.toLowerCase().trim();
  
  nodes.forEach(node => {
    const label = node.querySelector('.tree-name');
    if (!label) return;
    
    const text = label.textContent.toLowerCase();
    const match = !lower || text.includes(lower);
    
    // 显示/隐藏
    node.style.display = match ? '' : 'none';
    
    // 高亮匹配
    if (lower && match) {
      const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      label.innerHTML = label.textContent.replace(regex, '<span class="highlight-match">$1</span>');
    } else {
      label.innerHTML = label.textContent;
    }
  });
  
  // 确保父节点可见
  document.querySelectorAll('.tree-children').forEach(ch => {
    const visible = Array.from(ch.children).some(child => child.style.display !== 'none');
    ch.style.display = visible ? '' : 'none';
  });
  
  // 自动展开匹配项的父节点
  if (lower) {
    nodes.forEach(node => {
      if (node.style.display !== 'none') {
        let parent = node.parentElement;
        while (parent && parent.classList.contains('tree-children')) {
          parent.classList.add('open');
          parent.previousElementSibling?.querySelector('.tree-arrow')?.classList.add('rotated');
          parent = parent.parentElement;
        }
      }
    });
  }
}

function countItems(items) {
  let count = 0;
  items.forEach(item => {
    count++;
    if (item.children) count += countItems(item.children);
  });
  return count;
}

/* =====================================================
   功能项点击处理
   ===================================================== */
function handleItemClick(item, labelEl) {
  // 清除之前的选中状态
  document.querySelectorAll('.tree-label.selected').forEach(el => el.classList.remove('selected'));
  labelEl?.classList.add('selected');
  
  // 外部链接
  if (item.action === 'link' && item.url) {
    window.open(item.url, '_blank');
    return;
  }
  
  // 根据 action 执行
  const actions = {
    basemap: showBasemapSelector,
    locate: showLocateModal,
    navigation: resetMapView,
    fullscreen: toggleFullscreen,
    addGeoJSON: promptGeoJSONUrl,
    addTileLayer: promptTileUrl,
    layerList: showLayerPanel,
    layerStyle: showLayerPanel,
    addRaster: () => showToast('栅格图层功能开发中'),
    addKML: () => showToast('KML加载功能开发中'),
    geojson: promptGeoJSONUrl,
    mvt: () => showToast('矢量瓦片(MVT)功能开发中'),
    raster: () => showToast('栅格影像功能开发中'),
    wms: promptWMSUrl,
    wmts: () => showToast('WMTS功能开发中'),
    tms: () => showToast('TMS功能开发中'),
    arcgis: () => showToast('ArcGIS服务功能开发中'),
    local: promptGeoJSONUrl,
    gpx: () => showToast('GPX轨迹功能开发中'),
    drawPoint: () => startDraw('point'),
    drawLine: () => startDraw('line'),
    drawPoly: () => startDraw('polygon'),
    drawRect: () => showToast('矩形绘制功能开发中'),
    drawCircle: () => showToast('圆形绘制功能开发中'),
    drawMarker: () => showToast('标注功能开发中'),
    edit: () => showToast('编辑功能开发中'),
    delete: () => showToast('删除功能开发中'),
    copy: () => showToast('复制功能开发中'),
    move: () => showToast('移动功能开发中'),
    measureDistance: () => startMeasure('distance'),
    measureArea: () => startMeasure('area'),
    buffer: startBuffer,
    overlay: () => showToast('叠加分析功能开发中'),
    clip: () => showToast('裁剪分析功能开发中'),
    intersect: () => showToast('相交分析功能开发中'),
    union: () => showToast('合并分析功能开发中'),
    dissolve: () => showToast('融合分析功能开发中'),
    heatmap: () => showToast('热力图功能开发中'),
    fillColor: toggleColorPicker,
    strokeColor: toggleColorPicker,
    strokeWidth: () => showToast('边框宽度设置开发中'),
    strokeStyle: () => showToast('边框样式设置开发中'),
    opacity: showLayerPanel,
    radius: () => showToast('点半径设置开发中'),
    dashArray: () => showToast('虚线样式设置开发中'),
    label: () => showToast('标注设置开发中'),
    exportGeoJSON: exportGeoJSON,
    exportPNG: exportMapImage,
    exportSVG: () => showToast('SVG导出功能开发中'),
    exportPDF: () => showToast('PDF导出功能开发中'),
    exportProject: () => showToast('项目导出功能开发中'),
    importProject: () => showToast('项目导入功能开发中'),
    layerZoom: () => showToast('缩放至图层开发中'),
    layerVisible: showLayerPanel,
    layerDelete: showLayerPanel
  };
  
  const action = actions[item.action];
  if (action) {
    action();
  } else if (item.children) {
    // 折叠/展开
    const li = labelEl.parentElement;
    const arrow = li.querySelector('.tree-arrow');
    if (arrow) toggleNode(li, arrow);
  }
}

/* =====================================================
   地图初始化
   ===================================================== */
function initMap() {
  state.map = new maplibregl.Map({
    container: 'map',
    style: createStyle(state.basemaps[0]),
    center: CONFIG.mapCenter,
    zoom: CONFIG.mapZoom,
    minZoom: CONFIG.minZoom,
    maxZoom: CONFIG.maxZoom
  });
  
  // 控件
  state.map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');
  state.map.addControl(new maplibregl.ScaleControl({ maxWidth: 100 }), 'bottom-left');
  state.map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
  
  // 事件
  state.map.on('mousemove', (e) => {
    document.getElementById('lngDisplay').value = e.lngLat.lng.toFixed(4);
    document.getElementById('latDisplay').value = e.lngLat.lat.toFixed(4);
    document.getElementById('cursorPos').textContent = `坐标: ${e.lngLat.lng.toFixed(4)}, ${e.lngLat.lat.toFixed(4)}`;
  });
  
  state.map.on('zoom', () => {
    document.getElementById('zoomLevel').textContent = '缩放级别: ' + Math.round(state.map.getZoom());
  });
  
  state.map.on('load', () => {
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('mapStatus').textContent = '在线';
  });
  
  state.map.on('error', () => {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('mapStatus').textContent = '离线模式';
  });
}

function createStyle(basemap) {
  return {
    version: 8,
    sources: {
      basemap: { type: 'raster', tiles: [basemap.url], tileSize: 256 }
    },
    layers: [{ id: 'basemap', type: 'raster', source: 'basemap' }]
  };
}

/* =====================================================
   拖拽分隔条
   ===================================================== */
function initSplitter() {
  const splitter = document.getElementById('splitter');
  const sidebar = document.getElementById('sidebar');
  let isResizing = false;
  
  splitter.addEventListener('mousedown', (e) => {
    isResizing = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const width = Math.max(200, Math.min(500, e.clientX));
    sidebar.style.width = width + 'px';
  });
  
  document.addEventListener('mouseup', () => {
    if (isResizing) {
      isResizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
}

/* =====================================================
   键盘快捷键
   ===================================================== */
function initKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    
    const key = e.key.toLowerCase();
    
    // 功能快捷键
    const shortcuts = {
      'f': toggleFullscreen,
      'r': resetMapView,
      'b': showBasemapSelector,
      'l': showLayerPanel,
      'g': showLocateModal,
      '/': () => document.getElementById('searchInput').focus(),
      '+': () => state.map?.zoomIn(),
      '=': () => state.map?.zoomIn(),
      '-': () => state.map?.zoomOut(),
      '?': showShortcuts
    };
    
    if (shortcuts[key]) {
      e.preventDefault();
      shortcuts[key]();
    }
    
    // 关闭弹窗
    if (key === 'escape') {
      closeModal('basemapModal');
      closeModal('searchModal');
      closeModal('layerModal');
      closeModal('locateModal');
      document.getElementById('shortcutHint').classList.remove('show');
      document.getElementById('colorDropdown').classList.remove('show');
    }
  });
}

/* =====================================================
   侧边栏切换
   ===================================================== */
function toggleSidebar() {
  state.sidebarOpen = !state.sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !state.sidebarOpen);
}

/* =====================================================
   底图切换
   ===================================================== */
function showBasemapSelector() {
  const grid = document.getElementById('basemapGrid');
  grid.innerHTML = state.basemaps.map((bm, i) => `
    <div class="basemap-item" onclick="switchBasemap(${i})" style="${i === state.currentBasemap ? 'border-color:var(--accent)' : ''}">
      <div class="basemap-preview">🗺️</div>
      <span>${bm.name}</span>
    </div>
  `).join('');
  document.getElementById('basemapModal').classList.add('show');
}

function switchBasemap(index) {
  if (state.basemaps[index]) {
    state.currentBasemap = index;
    state.map.setStyle(createStyle(state.basemaps[index]));
    showToast('已切换到底图: ' + state.basemaps[index].name);
  }
  closeModal('basemapModal');
}

/* =====================================================
   图层管理
   ===================================================== */
function showLayerPanel() {
  const list = document.getElementById('layerList');
  if (state.layers.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#7a89b8">暂无图层<br><button class="modal-btn" onclick="promptGeoJSONUrl()" style="margin-top:12px"><i class="fas fa-plus"></i> 添加GeoJSON</button></div>';
  } else {
    list.innerHTML = state.layers.map((layer, i) => `
      <div class="layer-item">
        <div class="layer-icon"><i class="fas fa-layer-group"></i></div>
        <div class="layer-info">
          <div class="layer-name">${layer.name}</div>
          <div class="layer-type">${layer.type}</div>
        </div>
        <div class="layer-controls">
          <button onclick="toggleLayerVisibility(${i})" title="${layer.visible ? '隐藏' : '显示'}">
            <i class="fas fa-eye${layer.visible ? '' : '-slash'}"></i>
          </button>
          <button onclick="removeLayerItem(${i})" title="删除">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('layerModal').classList.add('show');
  updateLayerCount();
}

function toggleLayerVisibility(index) {
  const layer = state.layers[index];
  if (layer) {
    layer.visible = !layer.visible;
    try {
      state.map.setLayoutProperty(layer.id, 'visibility', layer.visible ? 'visible' : 'none');
    } catch (e) {}
    showLayerPanel();
  }
}

function removeLayerItem(index) {
  const layer = state.layers[index];
  if (layer) {
    try {
      if (state.map.getLayer(layer.id)) state.map.removeLayer(layer.id);
      if (state.map.getSource(layer.id)) state.map.removeSource(layer.id);
    } catch (e) {}
    state.layers.splice(index, 1);
    showToast('图层已删除');
    showLayerPanel();
  }
}

function updateLayerCount() {
  document.getElementById('layerCount').textContent = `图层: ${state.layers.length}`;
}

/* =====================================================
   数据加载
   ===================================================== */
function promptGeoJSONUrl() {
  const url = prompt('请输入GeoJSON文件URL:');
  if (url) loadGeoJSONFromUrl(url);
}

async function loadGeoJSONFromUrl(url) {
  try {
    showToast('正在加载...');
    const res = await fetch(url);
    if (!res.ok) throw new Error('加载失败');
    const data = await res.json();
    addGeoJSONLayer(data, url.split('/').pop() || 'GeoJSON');
  } catch (e) {
    showToast('加载失败: ' + e.message, 'error');
  }
}

function addGeoJSONLayer(data, name = 'GeoJSON') {
  const id = 'layer_' + Date.now();
  state.map.addSource(id, { type: 'geojson', data: data });
  
  const type = data.features?.[0]?.geometry?.type || 'point';
  const layerType = type.includes('Point') ? 'circle' : (type.includes('Line') ? 'line' : 'fill');
  
  const paint = {
    'fill-color': state.currentColor,
    'fill-opacity': state.currentOpacity
  };
  
  if (layerType === 'circle') {
    paint['circle-radius'] = 6;
    paint['circle-color'] = state.currentColor;
  } else if (layerType === 'line') {
    paint['line-color'] = state.currentColor;
    paint['line-width'] = 2;
  }
  
  state.map.addLayer({ id: id, type: layerType, source: id, paint: paint });
  state.layers.push({ id, name, type: 'GeoJSON', visible: true });
  
  showToast('已添加图层: ' + name);
  updateLayerCount();
}

function promptTileUrl() {
  const url = prompt('请输入瓦片服务URL (支持XYZ格式):\n示例: https://example.com/{z}/{x}/{y}.png');
  if (url) {
    const name = url.split('/').pop() || '瓦片图层';
    addTileLayer(url, name);
  }
}

function addTileLayer(url, name = '瓦片图层') {
  const id = 'tile_' + Date.now();
  state.map.addSource(id, { type: 'raster', tiles: [url], tileSize: 256 });
  state.map.addLayer({ id: id, type: 'raster', source: id });
  state.layers.push({ id, name, type: '瓦片', visible: true });
  showToast('已添加瓦片图层: ' + name);
  updateLayerCount();
}

function promptWMSUrl() {
  const url = prompt('请输入WMS服务URL:');
  if (url) showToast('WMS功能开发中');
}

/* =====================================================
   绘制功能
   ===================================================== */
function startDraw(type) {
  if (state.drawMode === type) {
    state.drawMode = null;
    document.querySelectorAll('#btnDrawPoint,#btnDrawLine,#btnDrawPoly').forEach(btn => btn.classList.remove('active'));
    showToast('已退出绘制模式');
    return;
  }
  
  state.drawMode = type;
  document.querySelectorAll('#btnDrawPoint,#btnDrawLine,#btnDrawPoly').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btnDraw' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
  
  const typeNames = { point: '点', line: '线', polygon: '面' };
  showToast('绘制' + typeNames[type] + '模式: 点击地图添加节点，双击完成绘制');
  
  // 简单实现：点击添加标记
  state.map.once('click', (e) => {
    const marker = new maplibregl.Marker({ color: state.currentColor })
      .setLngLat(e.lngLat)
      .addTo(state.map);
    
    const name = prompt('请输入标注名称:', '标注_' + Date.now());
    if (name) {
      state.layers.push({
        id: 'marker_' + Date.now(),
        name: name,
        type: '标注',
        visible: true,
        marker: marker
      });
      updateLayerCount();
    }
    
    state.drawMode = null;
    document.querySelectorAll('#btnDrawPoint,#btnDrawLine,#btnDrawPoly').forEach(btn => btn.classList.remove('active'));
  });
}

/* =====================================================
   测量功能
   ===================================================== */
function startMeasure(type) {
  showToast(type === 'distance' ? '距离测量: 点击测量距离' : '面积测量: 点击测量区域');
  state.measureMode = type;
}

/* =====================================================
   缓冲区分析
   ===================================================== */
function startBuffer() {
  const distance = prompt('请输入缓冲区距离(米):', '1000');
  if (distance) {
    showToast('缓冲区分析功能开发中 (距离: ' + distance + '米)');
  }
}

/* =====================================================
   坐标定位
   ===================================================== */
function showLocateModal() {
  document.getElementById('coordInput').value = CONFIG.mapCenter.join(',');
  document.getElementById('locateModal').classList.add('show');
  document.getElementById('coordInput').focus();
}

function goToCoord() {
  const input = document.getElementById('coordInput').value;
  const match = input.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if (match) {
    const lng = parseFloat(match[1]);
    const lat = parseFloat(match[2]);
    if (lng >= -180 && lng <= 180 && lat >= -90 && lat <= 90) {
      state.map.flyTo({ center: [lng, lat], zoom: 14 });
      showToast('已定位到: ' + lng.toFixed(4) + ', ' + lat.toFixed(4));
      closeModal('locateModal');
      return;
    }
  }
  showToast('请输入有效坐标 (经度,纬度)', 'error');
}

/* =====================================================
   颜色选择
   ===================================================== */
function toggleColorPicker() {
  document.getElementById('colorDropdown').classList.toggle('show');
}

function selectColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  state.currentColor = el.dataset.color;
  document.getElementById('colorBtn').querySelector('span').style.background = state.currentColor;
  updateLayerStyles();
  document.getElementById('colorDropdown').classList.remove('show');
}

function updateLayerStyles() {
  state.layers.forEach(layer => {
    if (state.map.getLayer(layer.id)) {
      try {
        state.map.setPaintProperty(layer.id, 'fill-color', state.currentColor);
        state.map.setPaintProperty(layer.id, 'circle-color', state.currentColor);
        state.map.setPaintProperty(layer.id, 'line-color', state.currentColor);
      } catch (e) {}
    }
  });
}

/* =====================================================
   搜索
   ===================================================== */
async function performSearch(query) {
  if (!query.trim()) return;
  
  // 坐标搜索
  const match = query.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
  if (match) {
    const lng = parseFloat(match[1]);
    const lat = parseFloat(match[2]);
    if (lng >= -180 && lng <= 180 && lat >= -90 && lat <= 90) {
      state.map.flyTo({ center: [lng, lat], zoom: 14 });
      showToast('已定位到坐标');
      return;
    }
  }
  
  showToast('搜索中...');
  const results = [];
  
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&accept-language=zh-CN`, {
      headers: { 'User-Agent': 'GeoLibre/1.0' }
    });
    if (res.ok) {
      const data = await res.json();
      results.push(...data.map(r => ({
        lon: r.lon, lat: r.lat,
        name: r.display_name.split(',')[0],
        address: r.display_name.substring(0, 80),
        source: 'OSM'
      })));
    }
  } catch (e) {}
  
  if (results.length === 0) {
    showToast('未找到相关地点', 'error');
    return;
  }
  
  const container = document.getElementById('searchResults');
  container.innerHTML = results.map(r => `
    <div class="search-result-item" onclick="flyToSearchResult(${r.lon}, ${r.lat}, '${r.name.replace(/'/g, "\\'")}')">
      <div class="result-icon"><i class="fas fa-map-marker-alt"></i></div>
      <div class="result-info">
        <div class="result-name">${r.name}</div>
        <div class="result-address">${r.address}</div>
        <div class="result-source">${r.source}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('searchModal').classList.add('show');
}

function flyToSearchResult(lng, lat, name) {
  state.map.flyTo({ center: [parseFloat(lng), parseFloat(lat)], zoom: 14 });
  closeModal('searchModal');
  showToast('已定位到: ' + name);
}

/* =====================================================
   地图操作
   ===================================================== */
function resetMapView() {
  state.map.flyTo({ center: CONFIG.mapCenter, zoom: CONFIG.mapZoom });
  showToast('视图已重置');
}

function exportMapImage() {
  const url = state.map.getCanvas().toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'geolibre-' + Date.now() + '.png';
  a.click();
  showToast('地图图片已导出');
}

function exportGeoJSON() {
  if (state.layers.length === 0) {
    showToast('暂无图层可导出', 'error');
    return;
  }
  showToast('导出功能开发中');
}

function toggleFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    document.documentElement.requestFullscreen();
  }
}

function showHelp() {
  showToast('快捷键: F全屏 R重置 B底图 L图层 /搜索 ESC关闭');
}

function showShortcuts() {
  document.getElementById('shortcutHint').classList.toggle('show');
}

/* =====================================================
   弹窗控制
   ===================================================== */
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

/* =====================================================
   Toast 提示
   ===================================================== */
function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 2500);
}

/* =====================================================
   启动
   ===================================================== */
document.addEventListener('DOMContentLoaded', init);
</script>
